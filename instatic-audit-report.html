o the dnd layer never has to know about removals. Add a regression test in src/__tests__/editor-store/multiSelect.test.ts that reorders a same-parent multi-selection (e.g. [A,B] after D in [A,B,C,D,E] => [C,D,A,B,E]) and asserts the result. Also test N=3 to cover off-by-N."},{"id":"ISS-018","finder":"bug-persistence","title":"CmsAdapter.saveSite is non-atomic across three endpoints, leaving the site in a mixed-version state on partial failure","category":"data-integrity","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-662: Improper Synchronization (non-atomic multi-step write); related CWE-460: Improper Cleanup on Thrown Exception (no rollback of the committed shell write)","file":"src/core/persistence/cms.ts","lineStart":36,"lineEnd":66,"description":"`saveSite` writes the shell (PUT /site), then writes pages (PUT /pages) and components (PUT /components) in parallel, asserting each response's ok status in sequence afterward. There is no transaction spanning the three writes and no rollback. If the shell write succeeds but the pages write fails (network drop, 500, server restart between requests), the persisted site now has a new shell but stale pages — or new pages but stale components after a components failure. Because pages reference VCs by id, a failure that lands new pages but leaves old components (or vice versa) produces refs that no longer resolve, which the very next load will then silently strip (see the cascading-deletion finding). The function throws after the fact, but the half-applied write is already durable on the server.","impact":"An interrupted save (common: laptop sleep, flaky wifi, server redeploy) leaves the stored document internally inconsistent — e.g. pages referencing components that were never written, or a shell describing breakpoints/colors the pages were not updated for. Combined with the load-time strip behavior, the inconsistency can escalate into silent content loss on the subsequent load.","reproduction":"1. Begin a save that changes shell, pages, and components together (e.g. add a new VC, reference it from a page, change a breakpoint). 2. Let the shell PUT complete but interrupt the network before the pages PUT lands (or have the server 500 on /pages). 3. The shell is now persisted with the new VC-related config but the page still lacks the ref, or the components roster is updated while pages are stale — the stored document is inconsistent and saveSite throws without undoing the shell write.","evidence":"const shellRes = await this.fetchImpl(`${this.basePath}/site`, { method: 'PUT', ... })\nawait assertOk(shellRes, ...)\nconst [pagesRes, componentsRes] = await Promise.all([\n  this.fetchImpl(`${this.basePath}/pages`, { method: 'PUT', ... }),\n  this.fetchImpl(`${this.basePath}/components`, { method: 'PUT', ... }),\n])\nawait assertOk(pagesRes, ...)\nawait assertOk(componentsRes, ...)","suggestedFix":"Persist the full document through a single transactional endpoint (one PUT that the server applies inside one DB transaction), or make the client write order dependency-safe and re-fetch/reconcile after a partial failure. The three-call split with no rollback should not be the durable save path for an interdependent document.","assessment":"The report's factual core is accurate and verified by reading the code: saveSite (src/core/persistence/cms.ts:36-66) issues three independent PUTs (shell, then pages+components in parallel) with no cross-call transaction and no rollback. Each server endpoint commits in its own db.transaction, so a partial failure leaves the durable DRAFT document internally inconsistent. The claimed escalation to silent content loss is also real: stripOneNodeMap (validate.ts:317) deletes page subtrees referencing VCs absent from the persisted roster on the next load. So isReal=true. However the severity claim (medium) is too high for this product context. This is the admin-only DRAFT save path, gated by site.structure.edit / site.read capabilities — no unauthenticated/public/plugin/untrusted-content reachability and no privilege-boundary crossing; the only actor is a trusted single-tenant operator. The defect is also strongly mitigated and self-healing: on any partial failure saveSite throws WITHOUT clearing the unsaved flag, so the in-memory document remains authoritative and both the auto-save loop and the beforeunload flush re-persist the complete document, repairing the server. Durable loss requires the additional, low-probability conjunction of (a) the components request specifically failing while the parallel pages request succeeds and references a not-yet-persisted VC, and (b) the operator discarding in-memory state via a hard reload before a successful re-save. That makes it a genuine but edge-case data-integrity defect, not a security issue — downgraded to low.","replicationSteps":"Traced path: Admin editor -> usePersistence.saveCurrentSite (src/admin/pages/site/hooks/usePersistence.ts:105-118) -> CmsAdapter.saveSite (src/core/persistence/cms.ts:36-66). saveSite does PUT /admin/api/cms/site (shell), then Promise.all of PUT /admin/api/cms/pages and PUT /admin/api/cms/components, asserting ok afterward. Each server handler commits in its OWN db.transaction (e.g. server/handlers/cms/pages.ts:94-114); there is no transaction spanning the three calls and no rollback. Concrete inconsistency: shell PUT commits, then the pages PUT succeeds (writing a page that references a newly-added VC) while the components PUT fails (server 500 / connection drop). The page row now references a componentId that was never persisted to the components roster. On the next load (CmsAdapter.loadSite -> validatePages -> stripDanglingVCRefsInPages -> stripOneNodeMap, src/core/persistence/validate.ts:284-319), the entire subtree of the visual-component-ref node whose componentId is not in the known VC set is deleted (delete nodes[id], line 317) -> silent page content loss. WHAT MAKES THIS NON-ROUTINE: (1) saveSite only throws on partial failure; it never calls setHasUnsavedChanges(false), so the in-memory editor document stays dirty and authoritative. The auto-save subscription (usePersistence.ts:258-272) and the beforeunload flush (usePersistence.ts:277-286) both re-attempt the FULL write, which self-heals the server state. (2) Durable content loss therefore additionally requires the operator to discard in-memory state (hard browser reload) before any successful re-save, AND the failure to land specifically on /components while /pages succeeds. The path is real and reachable but conditional on an injected fault plus loss of in-memory state.","falsePositiveReason":"","refinedFix":"Best fix matching the project's architecture and content model: collapse the three-call save into a SINGLE server endpoint that applies shell + pages + components inside ONE db.transaction. Add PUT /admin/api/cms/site/document (body { site, pages, components }) whose handler runs the existing shell-diff validation, validatePages, and the pages/components reconcile loops all inside one db.transaction(async (tx) => { ... }) so a failure rolls everything back atomically; require the strongest of the three current capabilities (site.structure.edit). Then make CmsAdapter.saveSite issue that single PUT and delete the split client logic. This removes the partial-commit window entirely and is the clean, no-backward-compat refactor the repo favors. (The independent PUT /pages, /site, /components endpoints used by other flows can remain, but the editor's durable save must go through the transactional document endpoint.) Defense-in-depth already present: stripDanglingVCRefs self-heals on load, and the dirty-flag retry re-saves — keep both. Validate the new body with TypeBox via readValidatedBody, returning the { error } envelope on failure. CWE- context: this is a transactional-integrity/atomicity defect, not an injection or auth issue."},{"id":"ISS-019","finder":"bug-moduleengine","title":"Form field with an intentionally empty value attribute renders without value=\"\", changing submitted data","category":"data-integrity","provisionalSeverity":"low","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-20: Improper Input Validation (data-integrity; incorrect default value semantics)","file":"src/modules/base/forms/index.ts","lineStart":521,"lineEnd":526,"description":"The shared attrs() helper filters out any attribute whose value is the empty string (value !== ''). This is correct for most attributes, but it also strips a deliberately-empty value=\"\" from \u003coption>, \u003cinput>, etc. For a \u003cselect>, an option authored as a placeholder with an empty value (the standard pattern: \u003coption value=\"\">Choose…\u003c/option>) is emitted as just \u003coption>Choose…\u003c/option>. Per the HTML spec, when an option has no value attribute the submitted value is the option's text content, so selecting that option submits the label text (e.g. \"Choose…\") instead of an empty string. The same applies to \u003cinput value=\"\"> where an author wants to force an empty initial value.","impact":"CMS-native and custom forms silently submit the wrong data for empty-value options: a placeholder option that should yield an empty/absent field value instead submits its visible label, corrupting collected submissions (e.g. a required-field guard that checks for empty value is bypassed, or a data row stores 'Choose a country' as the country).","reproduction":"In the editor add a base.select with a base.option whose Value is left blank and Label is 'Choose…'. Publish. Inspect the rendered HTML: the option is \u003coption>Choose…\u003c/option> with no value attribute. Submit the form selecting that option — the field value submitted is 'Choose…' rather than ''.","evidence":"function attrs(values: Array\u003c[string, string | number | null | undefined]>): string {\n  return values\n    .filter(([, value]) => value !== undefined && value !== null && value !== '')\n    .map(([name, value]) => ` ${name}=\"${String(value)}\"`)\n    .join('')\n}","suggestedFix":"Do not blanket-drop empty strings for attributes where '' is meaningful. Split the helper: keep the empty-drop behavior for optional attributes (placeholder, autocomplete, min, max, pattern) but always emit value (and name/id) when the prop is a defined string, including ''. E.g. add an explicit list of always-emit attribute names, or pass a flag per attribute: ['value', props.value, { allowEmpty: true }].","assessment":"The finding is real for the \u003cselect>/\u003coption> path. attrs() (line 523) blanket-drops empty-string attribute values, OptionModule renders value via that helper, and OptionPropsSchema defaults value to '' — so the standard placeholder pattern `\u003coption value=\"\">Choose…\u003c/option>` is emitted as `\u003coption>Choose…\u003c/option>`. Because the form runtime serializes submissions with the native FormData API (formRuntime.ts:142-156), an option without a value attribute submits its text content per the HTML spec, silently storing the label (e.g. \"Choose a country\") instead of \"\". This bypasses empty-value/required intent and corrupts collected submissions.\n\nImpact is bounded: it is a data-integrity bug only, no security boundary is crossed (no XSS/RCE/sandbox escape; published HTML additionally passes through DOMPurify at the publisher boundary). Forms are authored by trusted admin operators, and the corrupted data lands in the operator's own submission store on a single-tenant install. The report's secondary claim about `\u003cinput value=\"\">` changing submitted data is incorrect — for inputs, an absent value attribute does not alter submitted data. Low severity is correct and confirmed.","replicationSteps":"Confirmed end-to-end against the actual code:\n\n1. attrs() at src/modules/base/forms/index.ts:521-526 filters out any attribute whose value === '' (line 523: `value !== ''`).\n2. OptionModule.render (line 359) emits `\u003coption${attrs([['value', props.value]])}...>${props.label}\u003c/option>`. When props.value === '' the value attribute is dropped, yielding `\u003coption>Label\u003c/option>`.\n3. OptionPropsSchema (lines 114-119) defaults `value` to '' and `label` to 'Option'. So a freshly-added base.option, or any option an author intentionally leaves blank for a placeholder, renders with NO value attribute.\n4. The published page's CMS-native form is wired to server/forms/formRuntime.ts. collectValues() (lines 142-156) builds the submission with the browser-native `new FormData(form)`. Per the WHATWG HTML spec, a \u003cselect> contributes the selected \u003coption>'s value, which is the option's `value` attribute IF PRESENT, otherwise its text content. With no value attribute, FormData therefore submits the text content (e.g. \"Choose…\") instead of \"\".\n5. That payload is POSTed to /_instatic/form/submit (server/forms/handler.ts:125) and stored as the form submission.\n\nSo selecting a placeholder option submits and stores the visible label text rather than an empty string — a concrete, reachable data-integrity defect.\n\nCaveat that refutes part of the report: the claim that `\u003cinput value=\"\">` also \"changes submitted data\" is WRONG. For text/number inputs, omitting value=\"\" only affects the initial DISPLAYED value, not the submitted value — browsers submit whatever the user typed (or \"\" if untouched), and the absent-value default is \"\" anyway. Only the \u003cselect>/\u003coption> case actually corrupts submitted data.","falsePositiveReason":"","refinedFix":"Make value an always-emit attribute for option/input/select/textarea/choice renders so an intentionally-empty value=\"\" is preserved, while keeping the empty-drop behavior for genuinely-optional attributes (placeholder, autocomplete, min, max, pattern, minlength, maxlength).\n\nConcrete approach: split attrs into two helpers, or add a per-attribute allowEmpty flag. Minimal version — add a dedicated helper that always renders a defined string attribute:\n\n  function requiredAttr(name: string, value: string): string {\n    return ` ${name}=\"${escapeAttr(value)}\"`\n  }\n\nThen in OptionModule.render use `requiredAttr('value', props.value)` instead of `attrs([['value', props.value]])`. Apply the same to the value attribute in InputModule (line 261) and the choiceModule input (line 515) only where an empty initial value must be explicit (for inputs this is cosmetic, so option is the load-bearing case). Note: attrs() also does not HTML-escape attribute values (`${String(value)}`); since DOMPurify runs at the publish boundary this is currently mitigated, but the new requiredAttr should escape its value via escapeAttr to keep the module self-safe. Add/extend a unit test asserting `base.option` with value:'' renders `value=\"\"` and that a placeholder select option submits '' rather than its label."},{"id":"ISS-024","finder":"bug-siteimport","title":"Unbounded recursion in HTML import walk crashes on deeply-nested markup","category":"bug","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-674: Uncontrolled Recursion","file":"src/core/htmlImport/walkAndMap.ts","lineStart":209,"lineEnd":247,"description":"processElement() recurses into mapChildNodes() which recurses back into processElement() with no depth limit. The recursion depth equals the DOM nesting depth of the input HTML. There is no guard anywhere in the htmlImport module (confirmed: no MAX_DEPTH / depth counter). DOMParser/happy-dom retains arbitrarily deep nesting (verified: a 20,000-level \u003cdiv> chain parses to a 20,000-deep element tree), so a single deeply-nested document drives the recursive walk past the JS engine call-stack limit and throws an uncaught RangeError, aborting the entire import.","impact":"A single pathological or adversarial HTML document crashes the whole import with an uncaught RangeError instead of a handled warning. importHtml() is the shared entry point for the paste-HTML modal, the AI agent insertHtml/replaceNodeHtml tools, and the headless full-site Super Import (makeHtmlPagePlan). For Super Import, one over-nested page among many takes down the entire batch build. Real-world builder/export markup routinely nests wrapper divs hundreds deep; AI-generated or hand-crafted input can trivially exceed the limit. The error is not caught by any try/catch in the walk, so it surfaces as a hard crash rather than a 'this page could not be imported' message.","reproduction":"Build an HTML string of N nested \u003cdiv> elements wrapping a text node, then call importHtml('\u003c!doctype html>\u003chtml>\u003cbody>' + html + '\u003c/body>\u003c/html>'). At N≈5000 it succeeds; at N≈15000 it throws 'RangeError: Maximum call stack size exceeded' (verified via bun test with @modules/base registered: '5000 => OK 5001', '15000 => THREW RangeError: Maximum call stack size exceeded'). The exact threshold depends on available stack but is well within reach of real exported sites.","evidence":"function processElement(el: Element, ctx: WalkContext): string {\n  const rule = matchRule(el)\n  ...\n  if (shouldRecurse) {\n    ...\n    node.children = mapChildNodes(el, childCtx)   // recurses -> processElement -> mapChildNodes ...\n  }\n  ctx.nodes[node.id] = node\n  return node.id\n}","suggestedFix":"Convert the walk to an explicit work-stack (iterative DFS) so depth is bounded by heap not call stack, or add an explicit depth parameter to processElement/mapChildNodes and, past a sane cap (e.g. 1000), stop recursing and emit a warning (treat the over-deep subtree as a leaf container capturing textContent). Wrap the per-element mapping so a failure degrades to a warning rather than aborting the whole importHtml() call.","assessment":"The recursion-without-depth-limit is genuinely present, but the finder's impact framing is a false positive. (1) Every importHtml/makeHtmlPagePlan consumer is wrapped in try/catch, so the RangeError never escapes as an uncaught crash — it surfaces as a modal error message, an error toast, or an aiToolError. (2) The pipeline is 100% browser-side admin/AI tooling — no unauthenticated route, no public request, no plugin RPC, no server batch process reaches it (server/ has zero references). The only actor who can trigger it is the trusted single-tenant operator (pasting HTML, running their own AI agent, or running Super Import on files they supplied) or AI/imported content the operator chose to import. No privilege boundary is crossed, no data loss, no sandbox escape, fully recoverable (remove the bad input, retry). For a self-hosted single-tenant CMS this is a robustness/UX defect, not a security issue. The one legitimate, narrow improvement: Super Import's per-page loop (applyImport.ts:95-103) should isolate each page so one over-deep page degrades to a warning instead of failing the whole batch — but even today that failure is caught and reported, not a hard crash. Net: real bug, but provisional medium is too high; correct severity is low.","replicationSteps":"The mutual recursion is real and unbounded. processElement (src/core/htmlImport/walkAndMap.ts:209-247) calls mapChildNodes (lines 136-200), which calls back into processElement for each element child (lines 144, 194). There is no depth counter / MAX_DEPTH anywhere in the htmlImport module (verified by reading the whole file and grepping). Recursion depth equals DOM nesting depth, so a ~15k-deep \u003cdiv> chain throws RangeError: Maximum call stack size exceeded — consistent with the finder's bun-test result.\n\nHOWEVER, the report's claim that this is an UNCAUGHT crash is false. I traced all three (and only three) consumers of importHtml, all browser-side, none server-side (grep of server/ for importHtml/walkAndMap/siteImport returned nothing):\n\n1. Paste-HTML modal (src/admin/modals/ImportHtml/ImportHtmlModal.tsx): importHtml runs only inside parseImportPreview's try/catch (line 140-145, returns null) and handleInsert's try/catch (lines 241-281, sets errorMsg). Caught.\n2. AI insertHtml/replaceNodeHtml tools (src/admin/pages/site/agent/executor.ts:327, 423): both run() functions are dispatched through executeAgentTool, which wraps the entire switch in try/catch (lines 640-682) and converts any thrown Error — RangeError is an Error subclass with message \"Maximum call stack size exceeded\" — into aiToolError(message). Caught.\n3. Super Import (src/core/siteImport/applyImport.ts:98 -> makeHtmlPagePlan -> importHtml): the per-page loop (lines 95-103) has NO try/catch, so one over-nested page aborts the whole buildImportPlan call. But buildImportPlan is reached only via finalizePlan in SiteImportModal.tsx, and all three finalizePlan call sites (lines 233, 247, 270) are inside try/catch that pushes an error toast (\"Could not add files\"). Caught.\n\nRangeError on stack overflow is catchable by ordinary try/catch in Bun/V8/JSC (standard JS semantics; the finder itself observed a thrown RangeError). So no uncaught crash, no process termination. The real residual defect is narrower and Super-Import-specific: because the loop lacks per-page error isolation, a single pathological page fails the ENTIRE batch instead of degrading to a per-page warning + skip.","falsePositiveReason":"Not a false positive on existence, but the severity-driving claims are wrong: the error is NOT uncaught (all three call paths wrap it in try/catch — ImportHtmlModal.tsx:140/278, executor.ts:640-682, SiteImportModal.tsx:233/247/270), it does NOT cause a process/whole-app crash, and it is reachable only by the trusted single-tenant operator via browser-side admin tooling (no server route, no public/unauthenticated path, no plugin RPC). It is recoverable and crosses no privilege boundary. The \"hard crash / aborts the entire import uncaught\" framing that justified medium does not hold.","refinedFix":"Two-part, low-priority hardening. (1) Bound recursion depth in walkAndMap.ts: add a depth field to WalkContext and increment it in processElement when recursing; past a sane cap (e.g. 1000) stop recursing and treat the element as a leaf container that captures el.textContent (synthesize a base.text child via createTextNode), so the subtree imports as a flattened block rather than throwing. This is preferable to converting to an explicit work-stack because the leaf-capture path preserves content and the cap is far above any legitimate page nesting. (2) Add per-page error isolation to the Super Import loop in src/core/siteImport/applyImport.ts:95-103: wrap the makeHtmlPagePlan call in try/catch and on failure push a warning (e.g. { kind: 'page-skipped', path: f.path, reason: getErrorMessage(err, ...) }) and `continue`, so one malformed page degrades to a skipped-with-warning result instead of failing the whole batch. The existing modal try/catch already prevents an app crash, so this is a UX/robustness improvement, not a security fix."},{"id":"ISS-025","finder":"bug-siteimport","title":"resolveHref/resolveRelativePath silently collapse over-escaping '..' segments, mapping links to the wrong bundled file","category":"bug","provisionalSeverity":"low","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-22","file":"src/core/siteImport/htmlPagePlan.ts","lineStart":170,"lineEnd":210,"description":"resolveHref() resolves a relative href via joinPaths() BEFORE checking the traversal guard. joinPaths() pops a segment for each '..' but silently ignores any '..' that would escape the root (when resolved.length===0 it does nothing). By the time the guard `normalized.startsWith('../') || normalized.includes('/../')` runs, every '..' has already been consumed, so an href that escapes the import root resolves to an unrelated in-bundle path and the guard never fires. The identical pattern exists in assetPlan.resolveRelativePath (lines 477-488), so CSS url() payloads have the same defect.","impact":"An href/url that points outside the imported bundle (e.g. into a sibling project) is silently rewritten to a different file that happens to exist inside the bundle. In linkRewrite this can turn an intentionally-external/broken link into a cms:page ref pointing at the wrong imported page; in assetPlan it can bind a CSS background or img src to the wrong bundled asset. The result is silently-corrupted link/asset mapping with no warning. Severity is low because it requires an over-escaping relative path whose collapsed form coincidentally matches another bundled file.","reproduction":"resolveHref('../../foo/x.png','css/page.html') returns 'foo/x.png' (verified via bun test), and resolveHref('../../../x.png','a/b/page.html') returns 'x.png' — both escape the root yet are accepted instead of returning null. If the bundle also contains foo/x.png, the over-escaping reference is silently rewritten to that unrelated file.","evidence":"const normalized = href.startsWith('/')\n  ? href.slice(1)\n  : joinPaths(dirname(htmlFilePath), href)\n// Must not escape to a parent-of-root path\nif (!normalized || normalized.startsWith('../') || normalized.includes('/../')) return null","suggestedFix":"Track escape attempts in joinPaths (e.g. return null / a sentinel when a '..' is encountered with an empty resolved stack), or count the leading '..' against the base depth before joining and return null when the reference escapes the root. Apply the same fix to assetPlan.resolveRelativePath.","assessment":"The reported code behavior is genuinely present and reproducible — this is a real correctness quirk in joinPaths/resolveHref/resolveRelativePath. But it is not a security vulnerability and the report's impact narrative overstates it. Resolution is pure string math feeding in-memory dictionary lookups against the uploaded bundle; there is no filesystem traversal, so an over-escaping path can never reference anything outside the operator-supplied bundle. The only consequence is that an href/url that should have been rejected (it pointed above the bundle root) instead gets rebound to a coincidentally-matching sibling file the operator themselves uploaded — a silently-wrong link or asset mapping at import time, fully visible and editable in the admin editor afterward. The single entry point is the admin Site Import modal, driven by a trusted operator on a self-hosted single-tenant CMS; no privilege boundary is crossed, no public request reaches it, no data loss, no RCE, no sandbox escape. I keep isReal=true because the bug exists, but as a security finding it is effectively a non-issue; as a correctness bug it is minor (matching the finder's own 'low'). Worth fixing for hygiene/correctness, not as a security priority.","replicationSteps":"The described behavior is real and reproduced. joinPaths() in src/core/siteImport/htmlPagePlan.ts (lines 194-210) pops a segment per '..' and silently does nothing when resolved.length===0, so an over-escaping path collapses instead of producing a leading '../'. By the time resolveHref's guard at line 179 (normalized.startsWith('../') || normalized.includes('/../')) runs, every '..' has already been consumed, so it never fires. I verified with bun test: resolveHref('../../foo/x.png','css/page.html') returns 'foo/x.png' and resolveHref('../../../x.png','a/b/page.html') returns 'x.png' instead of null. The identical pattern is in assetPlan.resolveRelativePath (lines 477-488) with its own joinPaths (line 508).\n\nHowever, the SECURITY trigger path does NOT exist. End-to-end: the only caller is buildImportPlan (src/core/siteImport/applyImport.ts:69) -> makeHtmlPagePlan (line 98), invoked solely from the admin Site Import modal (src/admin/modals/SiteImport/SiteImportModal.tsx) by a trusted, authenticated operator uploading their own HTML/CSS bundle. The resolved key is used ONLY as an in-memory dictionary lookup: fileMap.files[resolved] (htmlPagePlan.ts:57), assetMap/fileMap.files[fileMapKey] (assetPlan.ts:454), and pageIdBySource.get(resolved) (linkRewrite.ts:85). There is no fs access, so nothing can escape to disk or a 'sibling project' — the report's framing of leaking outside the bundle is incorrect. For any visible effect, the collapsed path must coincidentally match another file the operator themselves included in the same upload. There is no public/unauthenticated route, no plugin RPC, and no stored-document path reaching this code.","falsePositiveReason":"Real as a correctness bug, but a false positive as a security issue. The resolved value is never used for filesystem access — only as a key into in-memory maps (fileMap.files, assetMap, pageIdBySource), so nothing escapes the uploaded bundle. The only trigger is a trusted authenticated admin importing their own bundle via the Site Import modal; no public/unauthenticated/plugin/stored-document path reaches it, and no privilege boundary is crossed. Worst case is a cosmetically mis-mapped intra-bundle link/asset that requires a coincidental filename collision, with no data loss, RCE, disclosure, or sandbox escape. The report's claim of mapping 'into a sibling project' on disk is incorrect.","refinedFix":"Make joinPaths signal escape instead of silently collapsing. Have it return null (or a sentinel) when a '..' is encountered with an empty resolved stack, and propagate that null through resolveHref and assetPlan.resolveRelativePath so an over-escaping reference resolves to null (treated as external/unresolvable) rather than a coincidental in-bundle file. Concretely in both copies of joinPaths: change `if (part === '..') { if (resolved.length > 0) resolved.pop() }` to return null when `resolved.length === 0`, change the signature to `string | null`, and update callers to `const normalized = joinPaths(...); if (normalized === null) return null` before the existing guard. Since both htmlPagePlan.ts and assetPlan.ts carry an identical private joinPaths, factor it into one shared helper (e.g. a pathJoin util in siteImport) and delete the duplicate to avoid the two implementations drifting. After this change the residual startsWith('../')/includes('/../') guard becomes belt-and-suspenders but can stay. This is a correctness/hardening fix, low priority given the admin-only, in-memory, contained scope."},{"id":"ISS-028","finder":"bug-forms","title":"Required multiSelect field can be bypassed by submitting an empty array","category":"data-integrity","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-20: Improper Input Validation","file":"src/core/forms/validation.ts","lineStart":158,"lineEnd":168,"description":"`coerceFieldValue` for a `multiSelect` field returns `{ ok: true, value: [] }` when given an empty array (Array.isArray branch maps to an empty array). `validateCoercedValue` then checks `required && (value === null || value === '')` — an empty array is neither `null` nor `''`, so the required check passes, and the empty-array branch in the option check (`value.some(...)`) is vacuously false. The required-enforcement loop at lines 81-97 only fires when the key is ABSENT from `input.values`; here the key is present with `[]`, so it is skipped. A required multi-select therefore accepts an empty selection.","impact":"A required multi-select field can be satisfied with no selection by a caller that posts the key with an empty array, defeating required-field enforcement and allowing rows that the form author intended to forbid. Same vacuous-pass applies to a required `relation`/`media` field coerced to `[]`.","reproduction":"Author a form with a multiSelect-bound control marked required. POST to /_instatic/form/submit with `values: { \u003cname>: [] }` (a valid challenge/token). validateFormSubmission returns ok with `cells[fieldId] = []`, and createDataRow persists a row despite the empty required field.","evidence":"coerce: `case 'multiSelect': return Array.isArray(value) ? { ok: true, value: value.map(String) } : ...`  /  validate: `if (required && (value === null || value === '')) { ... } if (value === null) return null`","suggestedFix":"In `validateCoercedValue`, treat an empty array as empty for required fields: `if (required && (value === null || value === '' || (Array.isArray(value) && value.length === 0)))` return the required error.","assessment":"The report is accurate at the code level and the trigger path is real and reachable by an unauthenticated public client. coerceFieldValue's empty-check (line 107) only covers '', null, undefined — not empty arrays. multiSelect/relation(allowMultiple)/media(allowMultiple) coerce to [], which passes the required check (line 165 only tests null/''), passes the option-membership check vacuously (line 227-232 .some over []), and is not caught by the absent-key required loop (line 86 Object.hasOwn is true). I confirmed: (a) the route is public/unauthenticated (handlePublicFormRequest gated only by POST + origin + challenge + rate-limit + honeypot, none of which validate field contents); (b) the body schema accepts an arbitrary array under any value key; (c) there is no downstream required re-check in createDataRow. So a required multi-value field can be satisfied with an empty selection. I downgrade severity from medium to low for this single-tenant CMS: no privilege boundary is crossed, no RCE/data-loss/sandbox-escape; the only effect is that a public submitter can persist a data row that violates the operator-authored required-field contract for array-typed fields (a data-integrity/spam-quality issue, not a security breach). Note the parallel honeypot/required model is anti-spam, so the practical worst case is junk rows missing a required tag/relation.","replicationSteps":"End-to-end public path verified:\n1. Operator authors a published page with a form whose control binds to a multiSelect (or relation/media with allowMultiple) field and is marked required (control.required or field.required).\n2. An unauthenticated client hits POST /_instatic/form/challenge (server/forms/handler.ts:41) with the published pageId/formId and the page token to obtain a valid challenge+token. This is the normal public flow exercised by form-runtime.js (server/forms/formRuntime.ts:102).\n3. Client POSTs /_instatic/form/submit (handler.ts:57) with body.values = { \"\u003ccontrolName>\": [] }. The body schema PublicFormSubmitBodySchema (src/core/forms/schemas.ts:38) types values as Record\u003cString, Unknown>, so an empty array passes body validation. Honeypot/rate-limit/origin checks are anti-spam and do not inspect field values.\n4. validateFormSubmission (validation.ts:95 call). For the empty array: coerceFieldValue line 107 does NOT treat [] as empty (only '', null, undefined), so the multiSelect branch (line 127-130) returns { ok: true, value: [] } since [].map(String) === [].\n5. validateCoercedValue line 165: required && (value === null || value === '') is false for []; line 168 value===null is false; the multiSelect option check line 227-232 uses value.some(...) which is vacuously false on []. Returns null (no error).\n6. The required-enforcement loop (lines 81-97) is skipped because Object.hasOwn(input.values, name) is true (line 86) — the key is present with [].\n7. validation.ok === true, cells[field.id] = [], and createDataRow (handler.ts:104) persists a row with an empty required field. Same vacuous pass applies to required relation/media fields with allowMultiple coerced to [] (lines 131-144).","falsePositiveReason":"","refinedFix":"Treat empty arrays as empty for the required check in validateCoercedValue (src/core/forms/validation.ts:165). Replace:\n\n  if (required && (value === null || value === '')) {\n    return { fieldId: field.id, code: 'required', message: 'This field is required.' }\n  }\n\nwith:\n\n  const isEmpty = value === null || value === '' || (Array.isArray(value) && value.length === 0)\n  if (required && isEmpty) {\n    return { fieldId: field.id, code: 'required', message: 'This field is required.' }\n  }\n\nThis catches multiSelect, and relation/media with allowMultiple, which all coerce to []. The subsequent `if (value === null) return null` and array option-membership checks remain correct for non-empty arrays. Add regression tests under src/core/forms covering: (1) required multiSelect submitted as [] returns a 'required' error; (2) required relation/media with allowMultiple submitted as [] returns 'required'; (3) non-required multiSelect with [] still passes. Optionally also short-circuit empty arrays to null in coerceFieldValue for storage consistency, but the validateCoercedValue change is the minimal correct fix. CWE-20 (improper input validation) / CWE-690-style missing-check on a boundary; closest fit is improper input validation of a required constraint."},{"id":"ISS-034","finder":"leak-timers-observers","title":"In-flight uploads never aborted on unmount in useUploadQueue (orphaned XHRs + setState-after-unmount)","category":"memory-leak","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-404: Improper Resource Shutdown or Release","file":"src/admin/pages/media/hooks/useUploadQueue.ts","lineStart":80,"lineEnd":277,"description":"useUploadQueue spawns XMLHttpRequests stored in transfersRef and registers onload/onprogress/onerror/onabort callbacks that all call patchItem() -> setItems(). There is no useEffect(() => () => { ... }, []) teardown that aborts the in-flight transfers when the hook unmounts. Every other resource-holding hook in this codebase (uploadMediaInline removes its abort listener on every terminal path; useDebouncedSave clears its timer and flushes on unmount; useCanvas clears its timers on unmount) has explicit unmount cleanup — this hook does not. The hook is mounted by useMediaWorkspace, which is consumed not only by the full MediaPage but also by MediaPickerModal (src/admin/pages/media/components/MediaPickerModal/MediaPickerModal.tsx:85), a modal that opens and closes inside other workspaces (Content/Site editors). When that modal is closed — or the user navigates away from the Media workspace — while uploads are in flight, the hook unmounts but the XHRs keep running to completion. On completion their onload/onprogress handlers call setItems on an unmounted component, and the connection stays open until the server finishes the (potentially large) upload.","impact":"Large file uploads (each capped at the size limit, up to `concurrency` = 3 in parallel) continue consuming an HTTP connection and CPU after the owning UI is gone, and fire React setState on an unmounted tree. Repeatedly opening/closing the media picker mid-upload accumulates orphaned transfers and stale callbacks. No data corruption, but wasted connections + React warning noise + unnecessary bandwidth.","reproduction":"1. Open the media picker (or Media workspace) and drop a large file so a POST /admin/api/cms/media XHR starts. 2. Before it finishes, close the picker modal / navigate to another admin workspace so useUploadQueue unmounts. 3. The XHR keeps running; when it resolves, onload runs patchItem -> setItems on the unmounted component, and the connection was held open the whole time.","evidence":"const transfersRef = useRef\u003cMap\u003cstring, ActiveTransfer>>(new Map())\n...\nconst xhr = new XMLHttpRequest()\ntransfersRef.current.set(item.id, { xhr })\n...\nxhr.onload = async () => { ... patchItem(item.id, ...) ... }\n// (no useEffect(() => () => { for (const {xhr} of transfersRef.current.values()) xhr.abort() }, []) anywhere)","suggestedFix":"Add an unmount cleanup that aborts all active transfers: `useEffect(() => () => { for (const { xhr } of transfersRef.current.values()) { try { xhr.abort() } catch { /* already done */ } } transfersRef.current.clear() }, [])`. If uploads are intended to survive workspace navigation, hoist the queue to a module-level/store singleton instead of a component hook so it is not tied to a mount that can unmount mid-flight.","assessment":"The reported code-level facts are accurate and the triggering path is real and reproducible: no unmount teardown exists, and MediaPickerModal truly unmounts the hook mid-upload. However the impact is overstated. (1) The \"fires setState on an unmounted component / React warning noise\" claim is outdated — the unmounted-setState warning was removed in React 18, and this project runs React 19.2.5 (package.json), so there is no console warning and no crash; the stale callback just no-ops against a detached fiber. (2) There is no unbounded leak: each orphaned XHR completes, runs its handler once, and becomes GC-eligible; nothing pins the unmounted component tree alive beyond that. (3) The remaining genuine cost is transient — up to concurrency(3) × 50 MB in-flight transfers continue to hold connections/bandwidth until the server finishes, which on a self-hosted single-tenant box is the trusted operator's own resources. No privilege boundary is crossed: this requires a trusted admin to perform a self-inflicted action sequence; it is not reachable by unauthenticated/public requests, untrusted plugins, or untrusted imported content. Real bug, correct fix, but low severity under this threat model.","replicationSteps":"Traced end-to-end. (1) useUploadQueue (src/admin/pages/media/hooks/useUploadQueue.ts:80-277) stores each upload's XMLHttpRequest in transfersRef (line 124) and registers onload/onprogress/onload/onabort handlers that call patchItem -> setItemsAndMirror -> setItems. The hook has NO unmount-cleanup useEffect; the only places that call xhr.abort() are the user-driven remove() (line 257) and cancelAll() (line 268). (2) The hook is consumed via useMediaWorkspace (useMediaWorkspace.ts:316), which is mounted by both MediaPage and MediaPickerModal. (3) MediaPickerModal (MediaPickerModal.tsx:68) renders `if (!open) return null`, so the inner MediaPickerModalBody — and therefore useMediaWorkspace/useUploadQueue — genuinely unmounts when the modal closes. Concrete trigger: an admin opens the media picker inside the Content/Site editor, drops a file (POST /admin/api/cms/media XHR begins via xhr.send at line 206), then closes the picker (Escape or pick) before the upload finishes. The hook unmounts but the XHR is never aborted; it runs to completion and its onload handler invokes patchItem on the unmounted tree. Bounded by concurrency (default 3) and the 50 MB hard cap in src/core/files/upload.ts.","falsePositiveReason":"","refinedFix":"Add an unmount-cleanup effect to abort in-flight transfers and stop the pump from doing more work after teardown. In useUploadQueue, after the `useEffect(() => { pumpRef.current = pump }, [pump])` line, add:\n\nuseEffect(() => () => {\n  for (const { xhr } of transfersRef.current.values()) {\n    try { xhr.abort() } catch { /* xhr already settled */ }\n  }\n  transfersRef.current.clear()\n  inFlightRef.current = 0\n}, [])\n\nxhr.abort() fires the existing onabort handler synchronously; that handler calls patchItem during teardown, which is harmless (React 19 ignores it) but if you want it fully silent you can null the handlers before aborting. Optionally guard with a `mountedRef` set false in the same cleanup and short-circuit patchItem when unmounted, to avoid the pointless map allocation in the abort handler. Separately, the doc comment at lines 11-14 (\"uploads survive folder navigation\") is about folder navigation within the Media page, not modal close — it is consistent with the fix since aborting only happens on true unmount of the workspace. If the product genuinely wants uploads to survive picker close, the alternative is to hoist the queue to a Zustand store singleton rather than a component-scoped hook; but given the picker is explicitly designed to mount/unmount per open, aborting on unmount is the correct behavior."},{"id":"ISS-035","finder":"leak-timers-observers","title":"Plugin outbound fetch has no timeout — slow allowlisted host holds a host-side socket open indefinitely","category":"performance","provisionalSeverity":"low","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-400: Uncontrolled Resource Consumption (missing outbound request timeout)","file":"server/plugins/host/network.ts","lineStart":72,"lineEnd":93,"description":"performGatedFetch issues fetch() with only the per-call AbortController's signal and no timeout. The controller is aborted only by an explicit plugin network.abort RPC, or by plugin unload/crash teardown (rpc.ts unloadPluginInWorker / crash recovery). The QuickJS eval has a wall-clock deadline (server/plugins/quickjs/eval.ts) and a MAX_BATCHES poll cap, so the VM side gives up and the worker replies — but that does NOT cancel the host-side fetch promise: the underlying socket to the upstream host stays open until the upstream (or OS) closes it. A plugin that fetches a slow/never-responding host in its allowlist therefore leaks an open connection on the host process for each such call until upstream timeout, independent of the VM deadline.","impact":"A buggy or hostile-but-allowlisted upstream can cause host-side sockets/connections to pile up: each plugin route handler / scheduled job that fetches a hanging host leaves a live connection after the VM has already abandoned the call. Bounded by the manifest allowlist (operator-controlled) and per-plugin worker, so impact is limited on a single-tenant self-hosted box, but a high-frequency schedule pointed at a slow host degrades the host over time.","reproduction":"Install a plugin with network.outbound + an allowlisted host that never responds (or responds very slowly). Have the plugin call fetch() from a route/schedule handler without supplying an abortId. The VM eval aborts after DEFAULT_EVAL_TIMEOUT_MS, but the host fetch() promise and its socket stay alive until the upstream closes — the controller is never aborted because no network.abort and no unload occurs.","evidence":"const controller = new AbortController()\nconst abortId = init.abortId\nif (abortId) entry.inflightFetches.set(abortId, controller)\ntry {\n  const response = await fetch(urlString, {\n    method: init.method ?? 'GET',\n    headers: init.headers,\n    body: init.body,\n    signal: controller.signal,\n  })","suggestedFix":"Always race the fetch against a host-side deadline: derive a timeout (e.g. min(maxDurationMs, a network cap) and call `controller.abort()` via `setTimeout`, clearing it in the finally. AbortSignal.timeout(ms) combined with the existing controller signal (AbortSignal.any([controller.signal, AbortSignal.timeout(cap)])) bounds every outbound request regardless of plugin behavior.","assessment":"The reported mechanism is real and I reproduced the host-side leak path. performGatedFetch issues fetch() with only the per-call AbortController signal and no timeout; that controller is aborted solely by network.abort RPC, plugin unload, or crash recovery. The VM eval deadline only aborts QuickJS execution and replies to the HTTP/schedule caller — it does not abort the host fetch, and a slow eval does not terminate the worker or unload the plugin, so inflightFetches and the underlying socket persist until upstream closes. One factual inaccuracy in the report: it states the plugin calls fetch \"without supplying an abortId,\" but the VM shim ALWAYS mints an abortId (fetch.ts:64-66), so an entry IS registered in inflightFetches. This does not change the outcome — registration alone does nothing; network.abort is only fired when the plugin passes an AbortSignal and aborts it, which the no-signal path never does. So the leak still occurs for the common `await fetch(url)` (no-signal) case. Severity is correctly low for a single-tenant self-hosted CMS: the upstream hosts are operator-controlled via the manifest allowlist, each plugin runs in its own worker, and the worst case is gradual socket/connection accumulation under a high-frequency schedule pointed at a hanging host (resource exhaustion / slow degradation), not RCE, data loss, or a sandbox/privilege boundary crossing. It is a robustness/DoS-hardening gap, not an exploitable vulnerability against a trusted operator's own plugins.","replicationSteps":"Traced end-to-end on the host side:\n1. Operator installs a plugin that holds network.outbound and lists a slow/hanging host in manifest.networkAllowedHosts (e.g. slow.example.com).\n2. The plugin's route or schedule handler calls `await fetch('https://slow.example.com/...')` WITHOUT passing an AbortSignal in init.\n3. VM-side shim (server/plugins/quickjs/bootstrap/fetch.ts:53-95): mints an abortId, posts `network.fetch` via __hostCall, then since no signal is supplied takes the `if (!signal)` branch (line 70-73) and simply `await hostPromise` — it never installs an abort listener, so `network.abort` is never fired by the VM.\n4. Host dispatch (server/plugins/host/workerPool.ts:130-149 → dispatchValidatedApiCall → apiDispatch 'network.fetch' → handlers/network.ts:24-33) calls `performGatedFetch` (server/plugins/host/network.ts:46-94). It registers the controller in entry.inflightFetches and issues `await fetch(urlString, { signal: controller.signal })` with NO timeout (lines 72-81).\n5. The VM eval has a 5s wall-clock deadline (server/plugins/quickjs/eval.ts withDeadline + MAX_BATCHES=10_000 poll cap, DEFAULT_EVAL_TIMEOUT_MS=5000 in limits.ts). When it expires, evalResolvedInner throws (\"VM promise did not settle\" / interrupted) and runRouteInWorker / runScheduleInWorker resolve with an error to the HTTP caller. The worker is NOT terminated and the plugin is NOT unloaded on a slow-but-not-crashed eval.\n6. Because no network.abort and no unload occurred, controller.abort() is never called. The host-side fetch() promise and its upstream socket stay alive until the upstream or OS closes the connection — independent of the VM giving up.\nConfirmed the only abort triggers are: explicit `network.abort` RPC (handlers/network.ts:35-51, only reachable if the plugin aborts a supplied signal), unloadPluginInWorker (rpc.ts:90-93), and crash recovery (crashRecovery.ts:103-106). None of these fire on a normal slow eval timeout.","falsePositiveReason":"","refinedFix":"Add an unconditional host-side timeout to performGatedFetch so every outbound request is bounded regardless of plugin behavior. In server/plugins/host/network.ts, compose the per-call controller's signal with a timeout signal and clear it in finally:\n\nconst controller = new AbortController()\nconst abortId = init.abortId\nif (abortId) entry.inflightFetches.set(abortId, controller)\nconst timeout = AbortSignal.timeout(NETWORK_FETCH_TIMEOUT_MS) // e.g. 30_000, define alongside DEFAULT_EVAL_TIMEOUT_MS\ntry {\n  const response = await fetch(urlString, {\n    method: init.method ?? 'GET',\n    headers: init.headers,\n    body: init.body,\n    signal: AbortSignal.any([controller.signal, timeout]),\n  })\n  ...\n} finally {\n  if (abortId) entry.inflightFetches.delete(abortId)\n}\n\nAbortSignal.any() (supported by Bun) tears down the socket when either the explicit plugin/teardown abort OR the timeout fires. Add `NETWORK_FETCH_TIMEOUT_MS` as a named constant (a host-network cap independent of the VM eval deadline; the eval deadline only governs in-VM time, while this caps the upstream request). For schedules with a higher maxDurationMs, optionally pass the budget through so the cap can be min(maxDurationMs, hard network ceiling). Also stream/cap the response body: `await response.text()` (network.ts:84) can buffer an unbounded body from a hostile allowlisted host into host memory — consider a max-bytes guard there as a companion hardening. CWE-400 (uncontrolled resource consumption); the missing-timeout aspect maps to CWE-1088 / CWE-770."},{"id":"ISS-036","finder":"leak-timers-observers","title":"AI chat browser-bridge entry leaks if the browser never POSTs a tool-result and never disconnects","category":"memory-leak","provisionalSeverity":"low","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-772: Missing Release of Resource after Effective Lifetime","file":"server/ai/runtime/transport.ts","lineStart":61,"lineEnd":99,"description":"createBridge.callBrowser() returns a Promise that is settled ONLY when resolveBridgeToolResult is called (browser POSTs /admin/api/ai/tool-result) or when destroy() runs in the chat handler's finally block. The promise has no association with req.signal. The handler's finally (chat.ts:237-239) only runs after runChat() returns, and runChat awaits driver.stream(), which awaits bridge.callBrowser() for a browser-bridged write tool. If the browser receives the toolRequest but never POSTs a result AND never disconnects the NDJSON stream (e.g. the tab is stuck/frozen but the socket stays open, or a proxy holds the connection), req.signal never aborts, the SDK call awaits callBrowser forever, runChat never returns, finally/destroy never runs, and the activeBridges entry plus its pending Map leak for the lifetime of the process.","impact":"On a self-hosted single-tenant box this is narrow (the normal client aborts the fetch on error/close, which fires req.signal -> SDK abort -> runChat throws -> finally -> destroy). But a wedged/idle browser holding the stream open with an outstanding tool request leaves a permanently-pending bridge entry and an open HTTP response with no server-side timeout to reclaim it.","reproduction":"Start an AI chat that triggers a browser-bridged write tool (toolRequest emitted). Keep the NDJSON connection open at the socket level but never POST /admin/api/ai/tool-result (and never abort). runChat stays awaiting callBrowser; the activeBridges entry and pending resolver are never freed.","evidence":"callBrowser(toolName, input) {\n  const requestId = nanoid()\n  return new Promise\u003cAiToolOutput>((resolve, reject) => {\n    entry.pending.set(requestId, { resolve, reject })\n    emit({ type: 'toolRequest', requestId, toolName, input })\n  })\n}\n// no signal wiring; settled only by resolveBridgeToolResult or destroy()","suggestedFix":"Tie callBrowser's pending promise to req.signal: in callBrowser, add a one-shot signal.addEventListener('abort', () => reject(...)) (removed on settle), and/or apply a per-tool-request timeout that rejects the pending promise so runChat unwinds into its finally/destroy even when the client neither responds nor disconnects cleanly.","assessment":"The report's mechanism is accurate and, if anything, understated. callBrowser (transport.ts:71-77) settles only via resolveBridgeToolResult or destroy(), and destroy() runs in the handler's finally only after runChat returns — which is structurally blocked while an in-flight callBrowser is awaited inside the SDK tool callback. I verified there is no compensating guard: no cancel() on the ReadableStream, no per-request timeout, and notably the Anthropic driver does not even pass req.signal into the SDK query() (buildQueryOptions sets systemPrompt/model/env/canUseTool but no signal), so the report's assumed \"normal abort unwinds it\" safety net is itself weaker than described for that driver. server/index.ts:74 (idleTimeout:0) intentionally disables the only socket-level reclamation. So a wedged/idle browser leaves a permanently-pending bridge entry and an open response. This is a genuine resource leak (CWE-401 / CWE-772). Severity stays low for a self-hosted single-tenant CMS: the trigger requires an authenticated, trusted operator with ai.tools.write, the leak is small and per-stream (one BridgeEntry + a one-entry pending Map + one held connection), there is no privilege boundary crossed, no data loss, no RCE, no sandbox escape, and no amplification by an unauthenticated or untrusted party. It is operator-local degradation under a degenerate client state, not an exploitable attack.","replicationSteps":"Traced end-to-end:\n1. POST /admin/api/ai/chat/site by an authenticated user holding ai.chat AND ai.tools.write (so selectToolsForScope registers a browser-execution write tool). handleAiChat (chat.ts:87) opens a ReadableStream and calls createBridge(emit) (chat.ts:202), then runChat (chat.ts:227).\n2. runChat (runner.ts) iterates driver.stream(request). For the Anthropic driver (anthropic.ts:120 runAnthropicStream -> buildQueryOptions), the model emits a tool call. The SDK invokes the MCP tool callback callTool (anthropic.ts:268). For execution!=='server' it does `await bridge.callBrowser(name, validated)` (anthropic.ts:306).\n3. callBrowser (transport.ts:71-77) registers a PendingToolResolver in entry.pending and emits a `toolRequest` NDJSON event, then awaits a Promise settled ONLY by resolveBridgeToolResult (browser POSTs /admin/api/ai/tool-result) or destroy().\n4. Wedge condition: the browser receives the toolRequest but the tab freezes / a proxy holds the socket open — it never POSTs /admin/api/ai/tool-result and never aborts the fetch, so req.signal never fires.\n5. Backstops are all absent: (a) callBrowser does not listen to any AbortSignal; (b) the ReadableStream in chat.ts has NO cancel(reason) callback; (c) the Anthropic driver never passes req.signal to the SDK query() options (buildQueryOptions, anthropic.ts:204 — signal is threaded only into server-tool ToolContext at anthropic.ts:294, not the SDK call nor callBrowser); (d) server/index.ts:74 sets idleTimeout:0, deliberately disabling Bun's socket idle reclamation; (e) there is no setTimeout/per-tool-request timeout anywhere in server/ai/.\n6. Result: callBrowser stays pending forever -> callTool stays awaiting -> the SDK query iterator never advances -> runChat never returns -> chat.ts finally (line 238) never runs -> destroy() never runs -> the activeBridges entry (transport.ts:49 module-global Map) plus its pending resolver + the open HTTP Response leak for the process lifetime.\n\nCould not disprove the mechanism; the deliberate idleTimeout:0 removes the only socket-level backstop the report assumed might exist.","falsePositiveReason":"","refinedFix":"Make a pending bridge call self-terminating so it cannot outlive the request, independent of whether the client aborts cleanly. Two layers:\n\n1. Tie the pending promise to the request signal AND a bounded timeout, in transport.ts callBrowser. Thread req.signal into createBridge (or accept it on callBrowser). On settle, remove the listener and clear the timer:\n\n  callBrowser(toolName, input) {\n    const requestId = nanoid()\n    return new Promise\u003cAiToolOutput>((resolve, reject) => {\n      const settle = () => { entry.pending.delete(requestId); cleanup() }\n      const onAbort = () => { settle(); reject(new Error('AI chat stream aborted before tool result arrived.')) }\n      const timer = setTimeout(() => { settle(); reject(new Error('Browser tool result timed out.')) }, BRIDGE_TOOL_TIMEOUT_MS)\n      const cleanup = () => { clearTimeout(timer); signal.removeEventListener('abort', onAbort) }\n      if (signal.aborted) { reject(new Error('AI chat stream already aborted.')); return }\n      signal.addEventListener('abort', onAbort, { once: true })\n      entry.pending.set(requestId, { resolve: (r) => { cleanup(); resolve(r) }, reject: (e) => { cleanup(); reject(e) } })\n      emit({ type: 'toolRequest', requestId, toolName, input })\n    })\n  }\n\nThis guarantees runChat unwinds into its finally (-> destroy()) on either client disconnect or a stalled browser, even when the client neither responds nor aborts.\n\n2. Add a cancel(reason) callback to the ReadableStream in chat.ts so an explicit reader cancel also runs destroyBridge()/closeStream() promptly, rather than relying solely on req.signal:\n\n  const stream = new ReadableStream\u003cUint8Array>({\n    async start(controller) { /* existing */ },\n    cancel() { if (destroyBridge) destroyBridge(); streamClosed = true },\n  })\n\nOptionally pass req.signal into the Anthropic SDK query() options (if the SDK supports an abortSignal/abort field) so the SDK call itself terminates on disconnect, matching the OpenAI driver which already passes signal. Keep the chosen BRIDGE_TOOL_TIMEOUT_MS generous (e.g. a few minutes) so it does not fight the deliberate idleTimeout:0 / long model thinking gaps — its purpose is reclamation of a truly wedged client, not normal flow."},{"id":"ISS-037","finder":"conc-publish","title":"Concurrent full publishes race on the same inactive slot, corrupting current/","category":"concurrency","provisionalSeverity":"high","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-362","file":"server/repositories/publish.ts","lineStart":304,"lineEnd":355,"description":"publishDraftSite performs prepareInactiveSlot -> writeArtefact*N -> swapSlot with NO mutual exclusion around the whole operation. The inactive slot is chosen by reading the `current` symlink (getInactiveSlot). If two full publishes (or a full publish + scheduled-publish tick + an admin-triggered republish) overlap, both read the same active slot, so both pick the SAME inactive slot (e.g. both choose `b`). They then interleave: P1 wipes `b` and starts writing; P2's prepareInactiveSlot runs `rm -rf b` (staticArtefact.ts:211) again, deleting P1's already-written files; both write a partial set of pages into `b`; both swapSlot to `b`. The slot `current` ends up pointing at a directory containing an arbitrary interleaving of two publishes' files (and possibly missing files one publish deleted from under the other). The two-slot scheme only guarantees atomicity for a SINGLE writer — it assumes serialized publishes, which nothing enforces.","impact":"The live site's `current/` slot can contain a corrupted mix of two content generations: stale pages, missing pages (404s while readArtefact retries then returns null), or assets from one publish referenced by HTML from another. There is no production data loss in the DB, but the publicly-served static export is corrupted until the next clean (serialized) publish.","reproduction":"Trigger two publishes concurrently: e.g. click Publish in admin while a scheduled-publish tick fires publishDataRow, or call the publish endpoint twice in quick succession (publishDraftSite has no in-process lock and the scheduler advisory lock only gates the scheduler's own leader election, not admin-initiated publishes). Both resolve getInactiveSlot to the same slot and interleave their rm/write/swap.","evidence":"const { slot, slotDir } = await prepareInactiveSlot(uploadsDir)\n... writeStaticAsset / writeArtefact loop ...\nawait swapSlot(uploadsDir, slot)","suggestedFix":"Serialize all slot-mutating publish operations behind a single in-process async mutex (and, for multi-instance Postgres deploys, a pg advisory lock) so prepareInactiveSlot -> writeArtefact -> swapSlot for publishDraftSite, and updateArtefactInPlace/removeArtefactInPlace for publishDataRow, never interleave. The mutex must wrap the entire slot-write-to-swap sequence, not individual file ops.","assessment":"The race condition described is real at the code level: publishDraftSite's prepareInactiveSlot/write/swapSlot sequence runs outside the DB transaction with no mutual exclusion, and the inactive-slot selection plus rm -rf are not serialized. However, the report over-states reachability and impact. Reachability: the sole trigger is one capability-gated + step-up-gated admin endpoint; only a trusted admin operator can cause overlap (two sessions or a scripted double-POST), and the UI already disables the button per-session. No unauthenticated, public, plugin-sandbox, or untrusted-imported-content path reaches it, so no privilege boundary is crossed. Impact: the report claims '404s', 'corrupted mix', and 'assets from one publish referenced by HTML from another'. In reality, a missing/partial artefact transparently falls through to the live DB renderer (publicRouter), the DB is never corrupted, both racing publishes render the same committed draft, and content-hashed asset filenames eliminate cross-generation asset mismatch. The realistic worst case is a transient, self-healing performance regression (live-render fallthrough for some routes) until the next clean publish. That is a low-severity concurrency defect for a single-tenant CMS, not the high-severity public-data-corruption described. The suggested fix (in-process async mutex around the full slot sequence) is correct and worth applying.","replicationSteps":"The slot-write sequence is genuinely unguarded. In server/repositories/publish.ts:305-355, publishDraftSite runs prepareInactiveSlot -> write loop -> swapSlot AFTER the DB transaction commits (tx ends at line 283), with no mutex. prepareInactiveSlot (staticArtefact.ts:201-217) chooses the inactive slot by reading the `current` symlink (getInactiveSlot -> getActiveSlot) and then `rm -rf`s that directory (line 211).\n\nTrigger path: the ONLY caller of publishDraftSite is POST /admin/api/cms/publish (server/handlers/cms/publish.ts:36-53), gated by requireCapability('pages.publish') + requireStepUp. To race, a trusted admin (valid session + step-up within 15 min) must fire two overlapping requests, e.g. a scripted double-POST: `curl -b cookies POST /admin/api/cms/publish & curl -b cookies POST /admin/api/cms/publish &`. Bun.serve interleaves async handlers at await points. Both calls' getInactiveSlot read the same active slot ('a') and both pick 'b'; P2's prepareInactiveSlot rm -rf's 'b' while P1 is mid-write; both swap current->b. The slot can end up under-populated.\n\nThe admin UI disables the Publish button while isPublishing (PublishButton.tsx:156), so a single-session double-click cannot trigger it; two separate browser sessions or a scripted call are required.\n\nIMPORTANT mitigation that bounds impact: a missing static artefact is NOT a 404. publicRouter.ts (lines 28, 214-225) falls through to the live DB renderer on readArtefact miss, and the DB (source of truth) committed both publishes correctly inside serialized transactions. Both publishes render the SAME committed draft, and CSS/JS use content-hashed filenames, so there is no cross-generation asset mismatch. Worst observable outcome: some routes briefly served by the live renderer instead of the static cache until the next clean publish rebuilds the slot.","falsePositiveReason":"Not a false positive at the code level — the missing mutex is real. The severity is downgraded (high -> low): trigger requires a trusted admin with capability + step-up auth deliberately issuing overlapping publishes (no privilege boundary crossed, UI already guards single-session), and the impact is self-healing because artefact misses fall through to the live DB renderer rather than 404ing, with the DB never corrupted and content-hashed assets preventing the claimed cross-generation mismatch.","refinedFix":"Serialize the slot-mutating phase of all publishes behind a single in-process async mutex shared by publishDraftSite (full publish) and writeDataRowArtefact's updateArtefactInPlace/removeArtefactInPlace (incremental publish), since both write into the slot tree. Add a tiny promise-chain mutex (no new dep): in a small module, keep `let tail = Promise.resolve()` and a `withPublishLock(fn)` that does `const run = tail.then(fn, fn); tail = run.catch(() => {}); return run`. Wrap the entire prepareInactiveSlot -> write-loop -> swapSlot block (publish.ts:305-351) and the in-place artefact ops in writeDataRowArtefact (data/publish.ts) in withPublishLock so the whole sequence cannot interleave. Keep bumpPublishVersion outside or at the end of the locked region so the version counter still advances exactly once per publish. For multi-instance Postgres deployments (publishing from more than one host), additionally gate the full-publish slot phase with a pg_advisory_lock keyed like the scheduler's leader lock so cross-process publishes serialize too; on SQLite the advisory call is a no-op and the in-process mutex suffices. Add a concurrency regression test that fires two publishDraftSite calls via Promise.all against a temp uploadsDir and asserts current/ ends up complete (all expected page files present)."},{"id":"ISS-013","finder":"sec-publicrouter","title":"Shared-hole Layer B cache key omits the originating page path (`u`), enabling cross-page content bleed and cache poisoning","category":"data-integrity","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"medium","replicated":false,"cwe":"CWE-524 (cache key omits a response-determining input); related CWE-639 for the unvalidated `u` parameter","file":"server/handlers/cms/hole.ts","lineStart":287,"lineEnd":309,"description":"The shared (non-per-visitor) hole fragment is cached via `getOrRender` with key `urlPath = /_instatic/hole/\u003cnodeId>` and `queryString = v=\u003cversion>&\u003cnormalizeQuery(pageUrl.searchParams)>`. The cache key therefore depends ONLY on the nodeId, publish version, and the QUERY STRING of the forwarded page URL `u`. It does NOT include the PATHNAME of `u`. However, `renderHoleFragment` builds the render context from the full `pageUrl`: `buildRouteFrame(pageUrl.toString())` derives `route.path`, `route.slug`, and `route.segments` from the pathname, and these are exposed to template token interpolation (`{route.path}`, `{route.slug}`) and to plugin `requestDependent` loop sources via `ctx.request.path` / `ctx.request.slug`. Two hole requests for the same node + version + query but DIFFERENT `u` pathnames collide on the same cache slot, so the first render is served for all subsequent path values. Because `u` is fully attacker-controlled and only `?v=` (trivially read from the public page's `data-instatic-version` attribute) is required to be valid, an attacker can pre-populate the shared slot with a fragment rendered against an attacker-chosen `route.path`/`route.slug`, and a legitimate visitor hitting the same node/query then receives that poisoned fragment.","impact":"A shared hole that surfaces `route.path`/`route.slug`/`route.segments` (directly via a token, or indirectly via a plugin `requestDependent` loop source that filters on `ctx.request.path`/`ctx.request.slug`) returns content rendered for a different (or attacker-chosen) page path. This is a content-integrity / cache-poisoning defect: wrong fragment content served to real visitors, and an attacker can seed the shared cache with a path/slug value of their choosing until the next publish bumps the version.","reproduction":"1. Publish a site containing a shared hole node whose template references `{route.path}` or `{route.slug}` (or a plugin requestDependent loop source that reads ctx.request.path/slug). 2. Read the current publishVersion N from the page's `data-instatic-version` attribute. 3. GET `/_instatic/hole/\u003cnodeId>?v=N&u=/attacker/path` (no query) — this caches the fragment under key `/_instatic/hole/\u003cnodeId>` + `v=N&`. 4. A normal visitor GET `/_instatic/hole/\u003cnodeId>?v=N&u=/real/page` (no query) hits the same key and receives the fragment rendered with route.path=`/attacker/path`.","evidence":"const cached = await getOrRender(\n  {\n    urlPath: `${HOLE_PATH_PREFIX}${nodeId}`,\n    queryString: `v=${currentVersion}&${normalizeQuery(pageUrl.searchParams)}`,\n  },\n  async () => {\n    const html = await renderHoleFragment(nodeId, foundPage, snap.site, ctx.db, pageUrl, request)\n    ...","suggestedFix":"Include the originating page pathname in the shared-hole cache key, e.g. `queryString: \\`v=${currentVersion}&p=${encodeURIComponent(pageUrl.pathname)}&${normalizeQuery(pageUrl.searchParams)}\\``. Additionally validate that `u` resolves to a same-origin path that actually contains `nodeId` (the snapshot already knows the node's owning page permalink) and reject/normalise mismatches so `u` cannot be set to an arbitrary attacker path.","assessment":"The cache-key omission is a genuine correctness defect: the shared-hole Layer B key excludes pageUrl.pathname even though render output depends on it via route.path/slug/segments and ctx.request.path/slug, and `u` is attacker-controlled and unvalidated on a public endpoint — so isReal=true at the code level. But the report's headline exploit is overstated. Its claimed reproduction relies on a shared hole surfacing {route.path}/{route.slug}, which the dynamic-detection walker explicitly treats as publish-time deterministic — such a node is statically baked and never reaches the shared-hole cache path. The only real triggering path needs an untrusted plugin loop source that deliberately keys output on ctx.request.path/slug, plus the same nodeId reachable from multiple paths. No first-party code does this, and the single-page-per-nodeId index plus per-publish wholesale eviction narrow it further. A defense-in-depth correctness fix is warranted, but practical exploitability on a default install is very low and the report's primary repro is invalid.","replicationSteps":"Mechanical cache-key omission confirmed in hole.ts:296-300: shared (non-perVisitor) holes are keyed on { urlPath: /_instatic/hole/\u003cnodeId>, queryString: v=\u003cversion>&\u003cnormalizeQuery(pageUrl.searchParams)> } — pageUrl.pathname is absent — while the render (line 302) passes the full pageUrl into renderHoleFragment where buildRouteFrame(pageUrl.toString()) (contextFrames.ts:99-115) derives route.path/slug/segments from the pathname, and ctx.request.path/slug (lines 290-294) are pathname-derived. `u` is attacker-controlled and unvalidated (lines 255-261: only parse-error fallback). The route is public/unauthenticated (router.ts:165-167). Could NOT replicate the report's stated trigger: its primary repro (a shared hole referencing {route.path}/{route.slug}) is impossible because dynamicDetection.ts:65-83 classifies route.path/route.slug as PUBLISH-TIME deterministic (only route.query/route.query.* are request-dependent), so such a node is statically baked and never becomes a hole (walker rules at dynamicDetection.ts:186-269). The only surviving avenue is a plugin-registered requestDependent loop source whose fetch() filters on ctx.request.path/slug (SourceRequestContext exposes them, types.ts:141-153). No built-in source qualifies (no requestDependent/perVisitor source reads path/slug). Triggering needs an untrusted plugin AND the same nodeId reachable under multiple paths; the nodeIndex maps a nodeId to one owning page (hole.ts:102-108) and currentEntry is not forwarded to holes, so a nodeId normally corresponds to one permalink. Impact self-corrects on next publish (wholesale eviction).","falsePositiveReason":"Not a clean false positive — the missing pathname in the cache key is a real bug — but the report's severity and concrete reproduction are wrong. route.path/route.slug are publish-time deterministic (dynamicDetection.ts:65-83), so a node referencing {route.path}/{route.slug} is never promoted to a hole and cannot reach the shared-hole cache, making the stated repro non-existent. The only residual avenue requires an untrusted plugin to author a requestDependent loop source filtering on request path/slug, combined with the same nodeId appearing on multiple paths — which no shipped code triggers and which the single-page nodeIndex and per-publish eviction make a narrow, self-healing content-integrity glitch rather than a generally-reachable poisoning primitive.","refinedFix":"Include the originating page pathname in the shared-hole cache key so renders depending on route.path/slug/segments cannot collide across paths. In hole.ts change the getOrRender key queryString to: `v=${currentVersion}&p=${encodeURIComponent(pageUrl.pathname)}&${normalizeQuery(pageUrl.searchParams)}`. Additionally harden the unvalidated `u`: after resolving pageUrl, verify its pathname resolves to the page owning nodeId (the snapshot already knows foundPage's permalink via buildPageFrame(foundPage)); on mismatch, fall back to the page's own permalink instead of honoring the attacker path. This removes the collision and prevents `u` from pointing at an arbitrary path. Leave the per-visitor branch unaffected (it bypasses Layer B). Add a regression test asserting two hole requests with the same nodeId+version+query but different `u` pathnames produce distinct cache slots."},{"id":"ISS-012","finder":"sec-secrets","title":"Dev localhost origins shipped in the CORS + CSRF allowlist unconditionally (no NODE_ENV gate)","category":"security","provisionalSeverity":"medium","severity":"medium","status":"false-positive","confidence":"high","replicated":false,"cwe":"CWE-942: Permissive Cross-domain Policy with Untrusted Domains","file":"server/auth/security.ts","lineStart":23,"lineEnd":30,"description":"DEV_ORIGIN_ALLOWLIST hardcodes http://localhost:5173, http://127.0.0.1:5173, http://localhost:5174, http://127.0.0.1:5174 with no environment guard. The same constant is used in two security-relevant places: (1) server/index.ts corsHeaders() echoes the requesting Origin back with Access-Control-Allow-Origin + Access-Control-Allow-Credentials: true whenever the Origin is on this list, and (2) server/auth/security.ts originAllowed() (consumed by server/handlers/cms/index.ts:69 and server/ai/handlers/index.ts:32) returns true for these origins, bypassing the Origin-based CSRF defense-in-depth for all state-changing admin/AI requests. These dev entries remain active in a production build because nothing strips them when NODE_ENV=production.","impact":"In production, a state-changing admin/AI request whose Origin header is http://localhost:5173 (or :5174) passes the originAllowed() CSRF check, and a cross-origin XHR from such a page receives a credentialed CORS response. Concretely: if an admin victim is induced to load a page served from one of these well-known local dev ports (a very common port for Vite/CRA dev servers many developers run), that page's Origin defeats the server's CSRF Origin check. The remaining barrier is the session cookie's SameSite=Lax (server/handlers/cms/session.ts:40), so this is a degradation of defense-in-depth rather than a clean one-click CSRF, but it ships an attacker-controllable trusted origin on by default in production. It also opens credentialed CORS reads to those origins.","reproduction":"Build/run the server for production (Caddy in front, NODE_ENV=production). From any page whose document Origin is http://localhost:5173 (e.g. a malicious local tool the victim runs, or any service bound to that port), issue a credentialed fetch to a state-changing admin endpoint. originAllowed() returns true (DEV_ORIGIN_ALLOWLIST.includes('http://localhost:5173')), so the server's Origin CSRF gate does not reject it; corsHeaders() also returns ACAO=that origin with Allow-Credentials:true. Verify by inspecting server/index.ts:50-62 and server/handlers/cms/index.ts:69.","evidence":"export const DEV_ORIGIN_ALLOWLIST: string[] = [\n  'http://localhost:5173',\n  'http://127.0.0.1:5173',\n  'http://localhost:5174',\n  'http://127.0.0.1:5174',\n  process.env.VITE_ALLOWED_ORIGIN ?? '',\n].filter(Boolean)","suggestedFix":"Gate the dev entries on environment: in production, DEV_ORIGIN_ALLOWLIST should contain only the operator-configured origin(s) (e.g. VITE_ALLOWED_ORIGIN / DOMAIN), never the hardcoded localhost ports. e.g. const devOrigins = process.env.NODE_ENV === 'production' ? [] : ['http://localhost:5173', ...]; const allowlist = [...devOrigins, process.env.VITE_ALLOWED_ORIGIN ?? ''].filter(Boolean). Update the architecture/CSRF doc and the corresponding test.","assessment":"The report correctly observes that DEV_ORIGIN_ALLOWLIST hardcodes localhost dev ports with no NODE_ENV gate, and that the same constant feeds originAllowed() (CSRF defense-in-depth), corsHeaders() (server/index.ts), and publicFormOriginAllowed() (server/forms/handler.ts:133). However, the claimed exploit is not realizable. The Origin header is browser-controlled and cannot be spoofed by a remote attacker — producing `Origin: http://localhost:5173` requires the attacker to already control a server on the
