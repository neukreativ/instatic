 victim's loopback, which presupposes local access (or is the victim's own dev tooling). Independently, the session cookie is SameSite=Lax (session.ts:40), so a cross-site state-changing fetch from a localhost-origin page does not carry the cookie and is rejected by the per-route auth checks; the origin gate is explicitly defense-in-depth, not the auth boundary. The credentialed-CORS angle is similarly neutralized: no cookie is sent cross-site, so nothing authenticated can be read. The report itself concedes this is 'a degradation of defense-in-depth rather than a clean one-click CSRF.' The degraded layer (origin check) only matters when SameSite fails, and SameSite=Lax does not fail for cross-site mutating requests in current mainstream browsers. This is a legitimate hardening/hygiene nit (dev origins should not ship in a production allowlist), not an exploitable vulnerability. Severity downgraded from medium to low: no privilege boundary is crossed by any reachable path.","replicationSteps":"Attempted to trace the claimed cross-origin CSRF/CORS path end-to-end; it is blocked by two independent guards:\n\n1) Origin spoofing precondition is unsatisfiable remotely. For any request to arrive with `Origin: http://localhost:5173` (or the :5174 / 127.0.0.1 variants), the requesting document must actually be served from that loopback port on the VICTIM's machine. Browsers set the `Origin` header and JS cannot override it, so a remote attacker site (evil.com) cannot produce that Origin. The only way to satisfy it is (a) the attacker already runs a server on the victim's loopback (= pre-existing local code execution; game over independently), or (b) it is the victim's own Vite dev server (trusted). There is no remote entry point.\n\n2) SameSite=Lax blocks the credentialed cross-site mutating request. server/handlers/cms/session.ts:40 sets the session cookie to `Path=/admin; HttpOnly; SameSite=Lax`. A page at http://localhost:5173 issuing fetch(..., {credentials:'include'}) to a production origin (e.g. https://cms.example.com) is a CROSS-SITE request; under SameSite=Lax the cookie is NOT attached to POST/PUT/PATCH/DELETE (only to top-level GET navigations). Each route group under handleCmsRequest (server/handlers/cms/index.ts:76-113) does its own session/auth check; the origin check at line 69 is documented as defense-in-depth only. So the forged request arrives without a session cookie and is rejected as unauthenticated regardless of originAllowed() returning true.\n\n3) The credentialed CORS-read concern (server/index.ts:50-62 corsHeaders echoes ACAO + Allow-Credentials:true for allowlisted origins) is likewise defeated by SameSite=Lax: the cross-site read carries no session cookie, so there is no authenticated body to exfiltrate even though ACAO matches.\n\nNet: no concrete trigger path from an unauthenticated/remote/public position to a successful state change or credentialed read exists.","falsePositiveReason":"No concrete triggering path exists. (1) The Origin header cannot be forged by a remote attacker; obtaining Origin=http://localhost:5173 requires the attacker to control a loopback server on the victim's host, i.e. pre-existing local access (or the victim's own trusted dev server). (2) Even granting that Origin, SameSite=Lax (server/handlers/cms/session.ts:40) prevents the session cookie from being sent on cross-site POST/PUT/PATCH/DELETE, so the request is unauthenticated and rejected by per-route auth — the originAllowed() bypass never reaches an authorized action. (3) The credentialed CORS read is moot for the same SameSite reason: no cookie, no authenticated data. The report itself acknowledges it is at most a defense-in-depth degradation, and that layer is only relevant precisely when SameSite fails — which it does not here.","refinedFix":"Hardening only (no security-critical bug). Gate the hardcoded dev origins so they never ship in production builds, keeping the operator-configured origin via env. In server/auth/security.ts:\n\nconst devOrigins = process.env.NODE_ENV === 'production'\n  ? []\n  : ['http://localhost:5173', 'http://127.0.0.1:5173', 'http://localhost:5174', 'http://127.0.0.1:5174']\nexport const DEV_ORIGIN_ALLOWLIST: string[] = [\n  ...devOrigins,\n  process.env.VITE_ALLOWED_ORIGIN ?? '',\n].filter(Boolean)\n\nThen update src/__tests__/server/security.test.ts (the cases at lines 81-100 assume the localhost entries are always present — split them into a dev-mode block and add a production-mode case asserting the localhost entries are absent). Since this project is pre-release and single-tenant self-hosted, this is a defense-in-depth cleanup rather than a required security patch; do not over-prioritize it."},{"id":"ISS-002","finder":"sec-auth","title":"MFA/step-up rate-limit bucket collapses to a single shared 'unknown' key when no client IP is available","category":"security","provisionalSeverity":"low","severity":"low","status":"false-positive","confidence":"high","replicated":false,"cwe":"CWE-770","file":"server/handlers/cms/auth.ts","lineStart":417,"lineEnd":419,"description":"In handleMfaVerify (and verifyStepUpMfa at lines 704-705) the MFA limiter key is `ip ?? 'unknown'`. On any deployment where clientIp(req) returns null — i.e. a self-hosted install not fronted by a proxy that sets X-Forwarded-For, which is the documented `bun run dev` default and a supported production topology per server/auth/security.ts — every user's MFA attempts share the single bucket keyed 'unknown'. The same collapse applies to the per-IP login limiter ('unknown' tuple), but there the per-account lockout still backstops the password path; the MFA path has no such backstop (see related finding), so the shared bucket is the only limiter and it is shared across all users.","impact":"Two opposing failure modes on no-proxy installs: (a) availability — one user (or attacker) exhausting the shared 'unknown' MFA bucket locks out MFA verification for every other user for up to 10 minutes; (b) weakened throttling — the global 10/10min ceiling is trivially diluted across many concurrent legitimate users, and an attacker's guesses are indistinguishable from legitimate traffic in the same bucket.","reproduction":"Run the server without a proxy setting X-Forwarded-For (default `bun run dev`). clientIp() falls back to the synthetic socket header; on any path where that is also absent the key is 'unknown'. From one client, send 10 MFA verify attempts within 10 minutes — a second user's legitimate MFA verification then returns 429 until the window slides.","evidence":"const ip = clientIp(req)\n  const rateLimitKey = ip ?? 'unknown'\n  const decision = mfaRateLimit.consume(rateLimitKey)","suggestedFix":"Key the MFA/step-up limiter on the authenticated/pending user id (always available at this point) rather than IP, optionally combined with IP. The pending-MFA session already identifies the user, so `${user.id}` (or `${ip ?? 'unknown'}|${user.id}`) is both available and correct.","assessment":"The report's central premise is factually false. It claims clientIp(req) returns null on a no-proxy self-hosted/`bun run dev` install, collapsing the MFA limiter to a single shared 'unknown' bucket. But clientIp (server/auth/security.ts:110-119) has a THREE-tier fallback, not two: (1) X-Forwarded-For, (2) the synthetic x-bun-socket-ip header, (3) null. Tier 2 is stamped on EVERY request at the Bun.serve fetch boundary via `stampSocketIp(req, server.requestIP(req)?.address ?? null)` (server/index.ts:83). `server.requestIP(req)` returns the real TCP socket peer address for any genuine network HTTP connection in Bun — precisely covering the no-proxy/dev topology the report claims is vulnerable. The code comments at security.ts:86-90 and rateLimit.ts state this explicitly: 'This is how clientIp(req) can return a real address in dev or any self-hosted deployment that isn't fronted by a proxy.' security.test.ts:157-177 verifies clientIp falls back to the socket stamp (e.g. 127.0.0.1, ::1) when XFF is absent, and only returns null (test line 144,184,205) when BOTH headers are absent — which does not happen for real client requests. handleMfaVerify (auth.ts:411) and verifyStepUpMfa (auth.ts:690) are reached only via HTTP routes, so requestIP is populated and clientIp is non-null. The 'unknown' branch is therefore only reachable for non-socket-backed in-process calls, of which none route to these handlers. The reported availability DoS and throttle-dilution scenarios do not occur on the supported topologies. The suggested fix (key on user id) has independent merit as defense-in-depth, but the reported bug as described is not real.","replicationSteps":"Replication fails at the first step. The claimed repro ('run server without a proxy; clientIp falls back to synthetic socket header; on any path where that is also absent the key is unknown') contradicts the code: on a real HTTP request the synthetic x-bun-socket-ip header is ALWAYS present because server/index.ts:83 stamps it from server.requestIP(req) for every request before any handler runs. To reach the 'unknown' bucket you would need server.requestIP(req)?.address to be null for a request that nonetheless reaches POST /auth/mfa/verify or POST /auth/step-up. Bun's requestIP returns the socket peer for any normal TCP-backed HTTP connection, so this only yields null for non-network/in-process invocations — none of which dispatch to these auth handlers. I could not construct a concrete network request that makes clientIp return null while still reaching the MFA limiter. Tests security.test.ts:157-177 confirm the socket-stamp fallback produces a real IP (127.0.0.1/::1) absent XFF.","falsePositiveReason":"The finding assumes clientIp returns null on no-proxy installs, but the synthetic x-bun-socket-ip header (stamped from server.requestIP at the fetch boundary on every request) makes clientIp return the real socket IP in exactly that topology. The 'unknown' fallback is unreachable for real client HTTP requests hitting the MFA/step-up handlers, so the shared-bucket collapse the finding describes does not occur. The finder misread clientIp as a two-tier (XFF-or-null) function when it is three-tier.","refinedFix":"No fix required to close a real vulnerability. As optional defense-in-depth (and a genuinely more-correct key) — since the pending-MFA session already identifies the user at this point — the limiter could be keyed on user id: in handleMfaVerify use `user.id` (or `${user.id}|${ip ?? 'unknown'}`) instead of `ip ?? 'unknown'`, and pass `user.id` into verifyStepUpMfa for the same. This bounds attempts per account regardless of IP availability and prevents cross-account interference in the (currently non-occurring) event that requestIP ever returns null. This is a hardening nicety, not a bug fix."},{"id":"ISS-003","finder":"sec-sqli","title":"listPluginRecords interpolates ORDER BY direction without normalizing it (defense-in-depth gap)","category":"security","provisionalSeverity":"low","severity":"low","status":"false-positive","confidence":"high","replicated":false,"cwe":"CWE-89: SQL Injection","file":"server/repositories/plugins.ts","lineStart":345,"lineEnd":352,"description":"The plugin-storage list query builder interpolates the order-by direction string `dir` directly into the SQL ORDER BY clause without normalizing or whitelisting it: `parts.push(`${fragment} ${dir}`)`. The field key is validated with FIELD_KEY_RE and `jsonField()`, and all filter values are parameterized via addParam, but `dir` is spliced in raw. Its sibling builder `listDataRowsWithFilter` in server/repositories/data/rows.ts:550 defensively normalizes the same value with `const normalizedDir = dir === 'desc' ? 'desc' : 'asc'`, so the two builders disagree on how much they trust their input. listPluginRecords trusts an un-normalized SQL keyword interpolated into the statement. The only thing preventing arbitrary SQL injection through the ORDER BY clause is the TypeBox boundary schema (StorageListOptionsSchema), which constrains orderBy values to the literal union 'asc' | 'desc' and is enforced on every current caller (HTTP handler via parseValue at server/handlers/cms/plugins/records.ts:100, and the plugin worker via Value.Check in server/plugins/protocol/parser.ts:63). Because both reaching paths validate against that schema, this is NOT currently exploitable — but it is a latent injection sink that would become live if any future caller invoked listPluginRecords with un-validated options, or if the schema's dir union were ever loosened.","impact":"No current exploit path: both the HTTP and QuickJS-plugin-worker call paths validate orderBy against a strict 'asc'|'desc' literal union before reaching the repository, so a malicious dir value is rejected at the boundary. The risk is purely defensive: the repository function trusts an interpolated SQL keyword, so a new internal caller that forgets to pre-validate (or a relaxation of the schema) would open a SQL injection in the plugin_records query for the self-hosted operator's own database.","reproduction":"Not reachable through the shipped boundaries (StorageListOptionsSchema constrains dir to 'asc'|'desc' and is checked by both records.ts:100 and parser.ts:63). It would become reproducible only if listPluginRecords were called with options that did not pass StorageListOptionsSchema, e.g. a future direct internal caller passing `{ orderBy: { name: 'asc; DROP TABLE plugin_records; --' } }` — the raw string would be spliced into the ORDER BY clause and executed.","evidence":"  // --- ORDER BY clause ---\n  let orderBySql = 'created_at desc'\n  if (orderBy && Object.keys(orderBy).length > 0) {\n    const parts: string[] = []\n    for (const [key, dir] of Object.entries(orderBy)) {\n      if (!FIELD_KEY_RE.test(key)) {\n        throw new Error(`[plugin:storage] invalid orderBy field name: ${JSON.stringify(key)}`)\n      }\n      const fragment = jsonField('data_json', key, db.dialect).sql\n      parts.push(`${fragment} ${dir}`)\n    }\n    orderBySql = parts.join(', ')\n  }","suggestedFix":"Normalize the direction in the repository the same way the sibling builder does, so the SQL builder never trusts the raw value: `const normalizedDir = dir === 'desc' ? 'desc' : 'asc'; parts.push(`${fragment} ${normalizedDir}`)`. This makes the two builders consistent and removes the latent sink regardless of what the boundary schema allows in the future.","assessment":"The code observation is factually correct: server/repositories/plugins.ts:350 does `parts.push(`${fragment} ${dir}`)` with `dir` interpolated raw, while the sibling builder server/repositories/data/rows.ts:550 defensively normalizes via `const normalizedDir = dir === 'desc' ? 'desc' : 'asc'`. The two builders genuinely disagree on trust level. However, this is NOT a real, exploitable vulnerability. The finder itself concedes \"this is NOT currently exploitable.\" I independently confirmed that both — and the only two — callers validate options against StorageListOptionsSchema, whose `orderBy` values are a strict `'asc' | 'desc'` TypeBox literal union, before reaching the repository. The HTTP handler validates via parseValue (records.ts:100); the plugin worker validates via the tuple schema embedded in ApiCallSchemas['cms.storage.list'] checked by parseApiCall (parser.ts:63). There is no code path that delivers a non-literal `dir` to line 350. The `key` is also separately guarded by FIELD_KEY_RE. This is a defense-in-depth / consistency gap, not a triggerable injection. Per the adversarial mandate (default isReal=false unless a concrete triggering path exists, and downgrade theoretical concerns), this is a false positive as a security vulnerability. The suggested hardening is still cheap and worth doing for builder consistency.","replicationSteps":"I traced both — and the only two — callers of listPluginRecords end-to-end and could not construct a triggering path:\n\n1. HTTP path: server/handlers/cms/plugins/records.ts reads the `orderBy` query param as JSON (line 62), then at line 100 runs `parseValue(StorageListOptionsSchema, parsed.options)` BEFORE calling listPluginRecords at line 105. StorageListOptionsSchema (src/core/plugin-sdk/storageSchemas.ts:81-83) defines `orderBy` as `Type.Record(Type.String(), Type.Union([Type.Literal('asc'), Type.Literal('desc')]))`. Any `dir` other than the literals 'asc'/'desc' is rejected with a 400 (\"Invalid list options\") before the repository runs. A payload like `{orderBy:{name:'asc; DROP TABLE plugin_records; --'}}` fails Value.Check and never reaches line 350.\n\n2. Plugin worker path: server/plugins/host/handlers/storage.ts:38 calls listPluginRecords with `options` from `msg.args`. The api-call message is parsed by parseApiCall (server/plugins/protocol/parser.ts:52-71), which at line 63 runs `Value.Check(ApiCallSchemas['cms.storage.list'], value)`. That schema (server/plugins/protocol/apiCallSchema.ts:75-78) is `Type.Tuple([Type.String, StorageListOptionsSchema])` — the same strict 'asc'|'desc' union. Malicious dir is rejected before dispatch.\n\nNo third caller exists (grep for listPluginRecords confirms exactly these two non-test references plus the definition). Both boundaries strictly validate, so the raw interpolation at plugins.ts:350 is never reached with attacker-controlled non-literal input. Replication blocked.","falsePositiveReason":"No concrete triggering path exists. Both (and the only) callers of listPluginRecords validate the options object against StorageListOptionsSchema before the call, and that schema constrains orderBy direction to the literal union 'asc'|'desc'. A malicious direction string is rejected at the TypeBox boundary (HTTP: parseValue at records.ts:100 returns 400; plugin worker: Value.Check in parser.ts:63 throws ApiCallValidationError) and never reaches the raw interpolation at plugins.ts:350. The vulnerability is latent/theoretical — exploitable only by a hypothetical future caller that bypasses the schema, which does not exist in the shipped code.","refinedFix":"Worthwhile defense-in-depth hardening even though not currently exploitable: normalize the direction inside the repository so the SQL builder never trusts the raw value, matching the sibling builder in server/repositories/data/rows.ts:550. In server/repositories/plugins.ts, change the loop body at lines 345-351 to:\n\n  for (const [key, dir] of Object.entries(orderBy)) {\n    if (!FIELD_KEY_RE.test(key)) {\n      throw new Error(`[plugin:storage] invalid orderBy field name: ${JSON.stringify(key)}`)\n    }\n    const normalizedDir = dir === 'desc' ? 'desc' : 'asc'\n    const fragment = jsonField('data_json', key, db.dialect).sql\n    parts.push(`${fragment} ${normalizedDir}`)\n  }\n\nThis removes the latent sink, makes the two ORDER BY builders consistent (per the project's no-band-aids/cleanup-at-source rules), and keeps the query safe regardless of any future change to StorageListOptionsSchema or a new internal caller. It is a one-line, behavior-preserving change for valid input."},{"id":"ISS-015","finder":"bug-pagetree","title":"duplicateNode/pasteSubtree/duplicatePage clones share inlineStyles and propBindings object references with the source","category":"data-integrity","provisionalSeverity":"low","severity":"low","status":"false-positive","confidence":"high","replicated":false,"cwe":"CWE-1059","file":"src/core/page-tree/mutations.ts","lineStart":254,"lineEnd":269,"description":"The clone constructors spread `...original` and then deliberately deep-copy `props`, `breakpointOverrides`, and `classIds` to give the clone independent objects (this is the documented F-0005 contract that scopedClassClone.ts also follows). However `inlineStyles` (BaseNode field, an object bag — baseNode.ts line 85) and `propBindings` (object map — baseNode.ts line 96) are NOT re-copied, so they ride through the `...original` spread as shared references. The same omission exists in pasteSubtree (lines 364-375) and duplicatePage (lines 837-848). After the clone, source.inlineStyles === clone.inlineStyles (same for propBindings).","impact":"A mutation that edits one node's inlineStyles or propBindings in place would silently restyle/rebind its duplicate — the exact class of bug the deep-copy of props/classIds was added to prevent. In current callers this is masked: the editor runs these inside Immer (copy-on-write), setNodeInlineStyles reassigns a fresh bag rather than mutating in place, and the plugin path (server/plugins/host/handlers/content.ts line 695/712) structuredClones on read and JSON-serializes on save, which severs aliasing before persistence. So there is no confirmed corruption path today, but the invariant the code intends to uphold (each cloned node owns independent mutable bags) is violated, and any future in-place inlineStyles/propBindings mutation outside Immer would corrupt the sibling.","reproduction":"Outside Immer (e.g. a pure use of duplicateNode on a plain structuredCloned tree held in memory, then an in-place `tree.nodes[newId].inlineStyles[key]=...`): the source node's inlineStyles bag changes too because both nodes reference the same object. Same for propBindings via `delete clone.propBindings[k]`.","evidence":"    tree.nodes[newId] = {\n      ...original,\n      id: newId,\n      props: { ...original.props },\n      breakpointOverrides: Object.fromEntries(\n        Object.entries(original.breakpointOverrides).map(([k, v]) => [k, { ...v }])\n      ),\n      children: original.children.map((childId) => idMap.get(childId) ?? childId),\n      classIds: classIdRemap\n        ? original.classIds.map((cid) => classIdRemap.get(cid) ?? cid)\n        : [...original.classIds],\n    }","suggestedFix":"In all three clone constructors, add `...(original.inlineStyles ? { inlineStyles: { ...original.inlineStyles } } : {})` and `...(original.propBindings ? { propBindings: Object.fromEntries(Object.entries(original.propBindings).map(([k, v]) => [k, { ...v }])) } : {})` so every cloned node owns independent mutable bags, matching the deep-copy treatment already applied to props/breakpointOverrides/classIds.","assessment":"The code defect is accurately described: in mutations.ts the clone constructors at lines 257-268 (duplicateNode), 364-375 (pasteSubtree), and 837-848 (duplicatePage) spread ...original and explicitly deep-copy props/breakpointOverrides/children/classIds but NOT inlineStyles (baseNode.ts:85) or propBindings (baseNode.ts:96), so a clone shares those two object references with its source. However this is a latent invariant violation, not an exploitable bug. Every code path that reaches these constructors runs either inside Zustand's immer() middleware (which copy-on-writes and auto-freezes, so no in-place mutation of an aliased bag can leak to the sibling) or through the plugin handler that structuredClones up front and JSON-serializes on save. The two style/binding mutation surfaces behave safely: setNodeInlineStyles reassigns a fresh bag rather than mutating in place, and the propBindings in-place mutations all occur inside Immer producers. The report itself admits there is no confirmed corruption path today. There is no privilege boundary crossed, no public/unauthenticated reachability, no data loss, no sandbox concern. It is a defensive correctness/data-integrity footgun worth fixing to harden the clone invariant against a future non-Immer caller, but it is not a real vulnerability as reported.","replicationSteps":"No end-to-end corruption path exists. Traced every caller of the three clone functions:\n\n1. duplicateNode/duplicateNodes: src/admin/pages/site/store/slices/site/nodeActions.ts:377,392 -> mutateActiveTree -> set((state)=>...) under Zustand immer() middleware (src/admin/pages/site/store/store.ts:2,54). Immer copy-on-writes and auto-freezes drafts.\n2. duplicatePage: src/admin/pages/site/store/slices/site/pageActions.ts:70 -> mutateSiteState (Immer producer).\n3. pasteSubtree: src/admin/pages/site/store/slices/clipboardSlice.ts:425 (Immer producer).\n4. Plugin path: server/plugins/host/handlers/content.ts:695 structuredClone()s the tree before applyTreeOperation and JSON-serializes on save (line 712) — aliasing is severed before persistence.\n\nThe only in-place mutations of the aliased bags are node.propBindings[k]=... / delete node.propBindings[k] in src/admin/pages/site/store/slices/visualComponentsSlice.ts:649,659,679,703 — all inside Immer producers, so they create a fresh node object for the mutated node only; the aliased duplicate keeps the (frozen) original bag and is unaffected. setNodeInlineStyles (nodeActions.ts:274,290-291) never mutates the bag in place — it builds a fresh object and reassigns/deletes the field, so it would not corrupt the alias even outside Immer. No pure/non-Immer caller of duplicateNode/pasteSubtree/duplicatePage exists, so the report's proposed reproduction does not match any real code path.","falsePositiveReason":"No concrete triggering path exists. All callers run inside Immer producers (which copy-on-write and freeze, neutralizing the shared reference) or through the plugin RPC that structuredClones before mutating and JSON-serializes on persist. The only in-place mutations target propBindings and all run inside Immer; setNodeInlineStyles never mutates a bag in place. The report concedes no corruption path exists today and its proposed reproduction (a pure non-Immer duplicateNode + in-place inlineStyles write) corresponds to no code in the repository.","refinedFix":"Defensive hardening only (not a security fix). To uphold the clone-owns-independent-mutable-bags invariant against a future non-Immer caller, add independent copies of inlineStyles and propBindings to all three clone object literals in src/core/page-tree/mutations.ts (duplicateNode ~257-268, pasteSubtree ~364-375, duplicatePage ~837-848), e.g.:\n\n  ...(original.inlineStyles ? { inlineStyles: { ...original.inlineStyles } } : {}),\n  ...(original.propBindings ? { propBindings: Object.fromEntries(Object.entries(original.propBindings).map(([k, v]) => [k, { ...v }])) } : {}),\n\nThis matches the existing F-0005 deep-copy treatment already applied to props/breakpointOverrides/classIds and to scopedClassClone.ts. Cleaner still: extract a single cloneNodeShallowOwnBags(node, { id, children, classIds }) helper so all three constructors share one source of truth for which fields are deep-copied, eliminating the chance of a fourth field being forgotten next time."},{"id":"ISS-020","finder":"bug-moduleengine","title":"Editor inline VC preview renders module components with raw, un-validated props (no validateNodeProps / defaults)","category":"bug","provisionalSeverity":"low","severity":"low","status":"false-positive","confidence":"high","replicated":false,"cwe":"","file":"src/modules/base/visualComponentRef/VCInlineTree.tsx","lineStart":96,"lineEnd":106,"description":"VCNodeRenderer passes node.props straight to a module's editor component (props={node.props as never}) without running validateNodeProps(definition, node.props). The publisher's renderStandardNode path always coerces and default-fills props through validateNodeProps before invoking a module, so a node with missing or lightly-malformed props (e.g. a number prop persisted as a string, or a prop key absent because the module schema changed) is normalized in the published output. Inside an instantiated Visual Component preview it is not — the editor component receives whatever shape is stored. Editor components that index into props without their own per-field fallback will render differently from the published page, or in the worst case throw and blank the canvas (a definition.component is fetched from the registry and rendered directly with no error boundary inside VCNodeRenderer).","impact":"A VC instance whose inner node has stale/partial props renders one way in the canvas (raw props) and another way when published (coerced/defaulted), so what the author sees in the inline preview does not match the published page. If an inner module component dereferences a prop that the publisher would have defaulted, the preview can crash the surrounding canvas render.","reproduction":"Create a Visual Component containing a module instance, then hand-edit (or migrate) the stored tree so an inner node is missing a prop the module's schema declares with a default. Drop a ref to that VC on a page. The inline preview renders with the missing prop (no default applied), while publishing the same page applies validateNodeProps and emits the defaulted value — the two diverge.","evidence":"const definition = registry.get(node.moduleId)\nif (!definition) return null\nconst ComponentType = definition.component\n...\nreturn (\n  \u003cComponentType\n    props={node.props as never}\n    nodeId={node.id}\n    isSelected={false}\n    mcClassName={mcClassName}\n    nodeWrapperProps={extraNodeWrapperProps}\n  >","suggestedFix":"Run props through the same coercion the publisher uses before handing them to the component: const def = registry.get(node.moduleId); const safe = validateNodeProps(def, node.props); ... props={safe as never}. validateNodeProps is exported from @core/module-engine and is a soft boundary (never throws), so this only normalizes the preview to match the published output.","assessment":"False positive on its two load-bearing claims. (1) Crash risk: VCInlineTree is reached only through VisualComponentRefEditor, which is the registered module component rendered by the main NodeRenderer inside a per-node ErrorBoundary (NodeRenderer.tsx:295-321). A throw inside an inner VC node is caught there; it cannot blank the surrounding canvas. (2) Divergence: the report assumes the editor standard-node path runs validateNodeProps and only the VC inline path skips it. The opposite is true — validateNodeProps runs ONLY in the publisher (renderNode.ts:148). The editor's main NodeRenderer passes raw props via resolveProps (selectors.ts:134, breakpoint-merge only, no coercion/defaults). So VCInlineTree is fully consistent with the rest of the editor; it is not skipping a step that peers perform. Entry point is admin-only (trusted operator), the input (stored page tree) is authored by that same trusted admin, and no privilege boundary is crossed. Adding validateNodeProps in VCInlineTree alone would in fact make the VC preview INCONSISTENT with the rest of the editor canvas, which the report did not realize.","replicationSteps":"Tried to trace a divergence/crash path; the report's premise does not hold. Path: admin opens visual editor -> page tree rendered by src/admin/pages/site/canvas/NodeRenderer.tsx. For a base.visual-component-ref node, definition.component = VisualComponentRefEditor (src/modules/base/visualComponentRef/index.ts:52). NodeRenderer renders that component at NodeRenderer.tsx:311, wrapped in \u003cErrorBoundary location=\"node-renderer\" resetKeys={[node.moduleId, nodeId]} silentToast> (NodeRenderer.tsx:295-300). VisualComponentRefEditor calls instantiateVCAtRef and renders VCInlineTree -> VCNodeRenderer (the reported lines 96-106). Therefore the entire VCInlineTree subtree executes INSIDE the per-node ErrorBoundary; a throw from any inner module component is caught and shows the silent fallback, NOT a blanked canvas. The report's claim \"no error boundary inside VCNodeRenderer ... can crash the surrounding canvas\" is refuted by the enclosing boundary.\n\nThe divergence claim is also refuted: the report asserts the editor's standard node path \"always coerces and default-fills props through validateNodeProps.\" It does not. grep shows validateNodeProps is invoked only in src/core/publisher/renderNode.ts:148 (the PUBLISHER). The editor canvas NodeRenderer feeds module components effectiveProps built from resolveProps + resolveDynamicProps + addEditorFormPreviewProps (NodeRenderer.tsx:164-173). resolveProps (src/core/page-tree/selectors.ts:134-154) only merges breakpoint overrides; it performs no TypeBox Default/Convert/Clean. So the regular editor canvas ALSO passes raw, un-validated node.props to every module component. VCInlineTree behaves identically to the rest of the editor — it is not an anomalous unvalidated outlier. Any editor-vs-published prop divergence is a deliberate, codebase-wide property of the editor preview, not a VC-specific bug.","falsePositiveReason":"The two concrete harms are not reachable. Crash-the-canvas is blocked by the ErrorBoundary wrapping the base.visual-component-ref component (NodeRenderer.tsx:295-300), which encloses the whole VCInlineTree. The unique-divergence premise is factually wrong: the editor never calls validateNodeProps anywhere (only the publisher does, renderNode.ts:148), so the main canvas renders raw props too — VCInlineTree is consistent with editor-wide behavior, not an outlier. There is no privilege boundary crossed (admin-only editor, admin-authored data).","refinedFix":"No fix required for correctness or security. The suggested fix (calling validateNodeProps only inside VCInlineTree) would actually introduce inconsistency, since the regular canvas NodeRenderer deliberately does NOT coerce/default props in the preview. If the project later decides the editor preview should match published output byte-for-byte for all nodes, the correct change is a single, codebase-wide one: route every editor module render (the effectiveProps in NodeRenderer.tsx:164 AND the VCInlineTree path) through validateNodeProps in one shared helper, so the canvas and publisher share identical prop normalization. Do not patch VCInlineTree in isolation. No CWE applies."}]};
const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const SEVS = ['critical','high','medium','low'];
const cats = [...new Set(REPORT.findings.map(f => f.category))].sort();

const state = {
  sev: new Set(SEVS),
  cat: new Set(cats),
  showFP: false,
  onlyReplicated: false,
  q: '',
};

// header
document.getElementById('method').textContent = REPORT.meta.method;
document.getElementById('metaline').textContent =
  REPORT.meta.project + ' · generated ' + REPORT.meta.generatedAt.slice(0,10) +
  ' · ' + (REPORT.meta.finderAgents ?? '?') + ' finder agents · ' + (REPORT.meta.totalAgents ?? '?') + ' total agents';

// stats
const s = REPORT.stats;
const statCards = [
  { l: 'Confirmed', n: s.confirmed, cls: '' },
  { l: 'Critical', n: s.bySeverity.critical, cls: 'crit' },
  { l: 'High', n: s.bySeverity.high, cls: 'high' },
  { l: 'Medium', n: s.bySeverity.medium, cls: 'med' },
  { l: 'Low', n: s.bySeverity.low, cls: 'low' },
  { l: 'Replicated', n: s.replicated, cls: 'ok' },
  { l: 'False positives', n: s.falsePositive, cls: '' },
];
document.getElementById('stats').innerHTML = statCards.map(c =>
  '<div class="stat ' + c.cls + '"><div class="n">' + c.n + '</div><div class="l">' + c.l + '</div></div>').join('');

// controls
const ctl = document.getElementById('controls');
function chip(cls, label, on) { return '<span class="chip ' + cls + '" data-on="' + (on?1:0) + '">' + esc(label) + '</span>'; }
ctl.innerHTML =
  '<div class="group"><label class="gl">Severity</label>' + SEVS.map(v => chip('sev-' + v + ' f-sev', v, true)).join('') + '</div>' +
  '<div class="group"><label class="gl">Category</label>' + cats.map(c => chip('f-cat', c, true)).join('') + '</div>' +
  '<div class="group">' + chip('f-rep', 'replicated only', false) + chip('f-fp', 'show false positives', false) + '</div>' +
  '<div class="group"><input type="search" id="q" placeholder="Search title, file, CWE, text…" /></div>';

ctl.querySelectorAll('.f-sev').forEach(el => el.addEventListener('click', () => {
  const v = el.textContent; const on = el.dataset.on === '1';
  el.dataset.on = on ? '0' : '1'; on ? state.sev.delete(v) : state.sev.add(v); render();
}));
ctl.querySelectorAll('.f-cat').forEach(el => el.addEventListener('click', () => {
  const v = el.textContent; const on = el.dataset.on === '1';
  el.dataset.on = on ? '0' : '1'; on ? state.cat.delete(v) : state.cat.add(v); render();
}));
const repChip = ctl.querySelector('.f-rep');
repChip.addEventListener('click', () => { state.onlyReplicated = !state.onlyReplicated; repChip.dataset.on = state.onlyReplicated?1:0; render(); });
const fpChip = ctl.querySelector('.f-fp');
fpChip.addEventListener('click', () => { state.showFP = !state.showFP; fpChip.dataset.on = state.showFP?1:0; render(); });
document.getElementById('q').addEventListener('input', (e) => { state.q = e.target.value.toLowerCase(); render(); });

function matches(f) {
  if (!state.sev.has(f.severity)) return false;
  if (!state.cat.has(f.category)) return false;
  if (f.status === 'false-positive' && !state.showFP) return false;
  if (state.onlyReplicated && !f.replicated) return false;
  if (state.q) {
    const hay = (f.title + ' ' + f.file + ' ' + f.cwe + ' ' + f.description + ' ' + f.impact + ' ' + f.id + ' ' + f.finder).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function section(title, body, cls) {
  if (!body) return '';
  return '<div class="sec ' + (cls||'') + '"><h4>' + title + '</h4><p>' + esc(body) + '</p></div>';
}

function card(f) {
  const fpCls = f.status === 'false-positive' ? ' fp' : '';
  const sevBadge = '<span class="badge b-' + f.severity + '">' + f.severity + '</span>';
  const catBadge = '<span class="badge b-cat">' + esc(f.category) + '</span>';
  const repBadge = f.replicated ? '<span class="badge b-rep">replicated</span>' : '';
  const fpBadge = f.status === 'false-positive' ? '<span class="badge b-fp">false positive</span>' : '';
  const confBadge = f.confidence ? '<span class="badge b-conf">' + f.confidence + ' conf</span>' : '';
  const cweBadge = f.cwe ? '<span class="badge b-conf">' + esc(f.cwe.split(' ')[0]) + '</span>' : '';
  const sevNote = f.status === 'confirmed' && f.severity !== f.provisionalSeverity
    ? ' <span style="color:var(--faint)">(was ' + f.provisionalSeverity + ')</span>' : '';

  const body =
    section('Description', f.description) +
    section('Impact', f.impact) +
    '<div class="grid2">' +
      section('Reproduction (claimed)', f.reproduction) +
      section('Verifier — replication', f.replicationSteps) +
    '</div>' +
    section('Verifier assessment', f.assessment) +
    (f.falsePositiveReason ? section('Why false positive', f.falsePositiveReason) : '') +
    section('Suggested fix', f.suggestedFix, 'fix') +
    (f.refinedFix && f.refinedFix !== f.suggestedFix ? section('Refined fix (verifier)', f.refinedFix, 'fix') : '') +
    (f.evidence ? '<div class="sec"><h4>Evidence</h4><pre class="code">' + esc(f.evidence) + '</pre></div>' : '');

  return '<div class="issue sev-' + f.severity + fpCls + '" data-id="' + f.id + '">' +
    '<div class="ihead">' +
      '<span class="id-tag">' + f.id + '</span>' +
      '<div class="badges">' + sevBadge + catBadge + repBadge + confBadge + cweBadge + fpBadge + '</div>' +
      '<div class="ititle"><div class="t">' + esc(f.title) + sevNote + '</div>' +
        '<div class="loc">' + esc(f.file) + ':' + f.lineStart + (f.lineEnd && f.lineEnd!==f.lineStart ? '-' + f.lineEnd : '') +
        '  ·  ' + esc(f.finder) + '</div></div>' +
      '<span class="caret">▶</span>' +
    '</div>' +
    '<div class="ibody">' + body + '</div>' +
  '</div>';
}

function render() {
  const shown = REPORT.findings.filter(matches);
  const list = document.getElementById('list');
  list.innerHTML = shown.length ? shown.map(card).join('') : '<div class="empty">No findings match the current filters.</div>';
  document.getElementById('countline').textContent = 'Showing ' + shown.length + ' of ' + REPORT.findings.length + ' findings';
  list.querySelectorAll('.ihead').forEach(h => h.addEventListener('click', () => h.parentElement.classList.toggle('open')));
}
render();
</script>
</body>
</html>
