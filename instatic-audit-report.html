to-end:\n1. Entry point: POST /admin/api/ai/chat/:scope -> tryHandleAiChat -> handleAiChat (server/ai/handlers/chat.ts). Gated by requireCapability(req, db, 'ai.chat') (admin-only).\n2. handleAiChat builds AiStreamRequest with signal: req.signal (chat.ts:212) and runs runChat({ driver, request, persister, emit }) inside a ReadableStream.start() body (chat.ts:227). Note the ReadableStream has NO cancel() handler defined.\n3. runChat (server/ai/runtime/runner.ts:56) iterates `for await (const event of driver.stream(request))`.\n4. For an Anthropic credential, driver.stream -> runAnthropicStream (anthropic.ts:121) -> `for await (const message of query({ prompt, options }))` (anthropic.ts:139). options is built by buildQueryOptions (anthropic.ts:205-231), which never sets Options.abortController and never calls query().interrupt(). req.signal is only threaded into the per-tool ToolContext.signal (anthropic.ts:134/263/294), not into the agent loop.\n5. Confirmed the SDK supports cancellation: node_modules/@anthropic-ai/claude-agent-sdk/sdk.d.ts:1143 `abortController?: AbortController` (\"When aborted, the query will stop and clean up resources\") and :2027 `interrupt(): Promise\u003cvoid>`.\n6. Confirmed the contrast: the OpenAI driver passes `signal: req.signal` to runner.run(...) at server/ai/drivers/openai.ts:161, so client-disconnect cancels the OpenAI agent loop but NOT the Anthropic one.\n7. On client disconnect/abort: Bun aborts req.signal and the ReadableStream's controller becomes unusable. In chat.ts the emit() wrapper catches the failing controller.enqueue and just sets streamClosed=true (chat.ts:196-198) — it does NOT break the loop or signal the driver. runChat keeps iterating the async generator, and the underlying Anthropic SDK query keeps running turns, calling the model and recording usage. With no maxTurns set in buildQueryOptions and canUseTool auto-approving every tool (anthropic.ts:219), the loop runs to natural completion with no cancellation path.","falsePositiveReason":"","refinedFix":"In server/ai/drivers/anthropic.ts wire req.signal into the SDK so a client disconnect cancels the agent loop:\n\n1. In buildQueryOptions, accept req (already has it) and attach an AbortController bound to req.signal:\n   const controller = new AbortController()\n   if (req.signal.aborted) controller.abort()\n   else req.signal.addEventListener('abort', () => controller.abort(), { once: true })\n   options.abortController = controller\n   Then return both options and controller (or set abortController inside the existing options object before returning).\n\n2. Optionally also guard the consumption loop in runAnthropicStream: when req.signal aborts, break out of the `for await (const message of query(...))` loop and return, so the generator is disposed promptly (the async iterator's return() will run SDK cleanup). Since options.abortController is now set, the SDK will stop and clean up resources on abort.\n\n3. Belt-and-braces at the handler boundary (chat.ts): give the ReadableStream a cancel() handler so a consumer-side cancel (client disconnect) is observable, and rely on req.signal as the single source of truth for abort. This makes Anthropic behave like the OpenAI driver (openai.ts:161 passes signal: req.signal).\n\nKeep the existing options shape otherwise. No backward-compat concerns (pre-release). Also consider matching maxTurns intent with the OpenAI driver's documented stance, but that is orthogonal to the abort fix."},{"id":"ISS-030","finder":"bug-ai","title":"Browser tool bridge has no timeout and ignores the abort signal — a non-responding browser hangs the stream forever and leaks the bridge","category":"memory-leak","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-772: Missing Release of Resource after Effective Lifetime (also CWE-400: Uncontrolled Resource Consumption)","file":"server/ai/runtime/transport.ts","lineStart":70,"lineEnd":99,"description":"`callBrowser` returns a Promise that can ONLY be resolved by a matching `/admin/api/ai/tool-result` POST or rejected by `destroy()`. It has no timeout and never listens to the request abort signal. `destroy()` is invoked from the chat handler's `finally` block (server/ai/handlers/chat.ts:238), but that finally only runs after `runChat` returns. `runChat` is blocked in `for await (driver.stream())`, which (for Anthropic) is blocked inside the MCP tool callback awaiting `callBrowser`. So if the browser never POSTs back a tool result (tab closed, JS error, network drop), the entire chain deadlocks: the SDK awaits the tool, `callBrowser` never settles, `runChat` never returns, `destroy()` never runs, and the `BridgeEntry` stays in `activeBridges` permanently.","impact":"Each affected chat permanently leaks one `activeBridges` map entry plus the held NDJSON `ReadableStream`/HTTP connection and (for Anthropic) a stuck SDK query process. A user who closes the tab mid-write-tool, or any flaky browser, accumulates leaked bridges and connections over the server's lifetime — unbounded memory/connection growth on a long-running self-hosted server. Combined with the Anthropic abort gap above, abort cannot rescue these.","reproduction":"1. Open an AI chat with `ai.tools.write` so browser-execution write tools are registered. 2. Prompt the model to perform an edit so it emits a browser tool call (server emits `toolRequest`). 3. Before the browser POSTs the result, close the tab / kill the network. 4. Server-side: the bridge entry stays in `activeBridges` and the SDK query stays blocked indefinitely; repeat to accumulate leaks.","evidence":"callBrowser(toolName, input) {\n      const requestId = nanoid()\n      return new Promise\u003cAiToolOutput>((resolve, reject) => {\n        entry.pending.set(requestId, { resolve, reject })\n        emit({ type: 'toolRequest', requestId, toolName, input })\n      })\n    },","suggestedFix":"In `callBrowser`, attach a timeout (reject after N seconds) and an abort listener on the request signal that rejects the pending promise and removes it from `entry.pending`; pass the request `AbortSignal` into `createBridge`/`callBrowser` so a client disconnect immediately unblocks the awaiting tool handler.","assessment":"The report is accurate. I independently confirmed every link in the chain. callBrowser (transport.ts:71-77) returns a Promise with no timeout and no abort listener; it can only be settled by resolveBridgeToolResult (browser POST) or destroy(). destroy() runs only in the chat.ts:238 finally, which is gated behind runChat returning. runChat (runner.ts:56) is blocked in `for await (driver.stream())`, and for the Anthropic driver the stream is blocked inside the MCP tool callback awaiting callBrowser. The Anthropic driver never wires req.signal into the SDK query() (buildQueryOptions has no abort handling), and the browser-execution branch (anthropic.ts:304-312) ignores the signal, so client disconnect cannot rescue it. The chat handler's ReadableStream has no cancel() handler, so disconnect triggers no server-side cleanup. Result: a permanent activeBridges leak plus a held connection plus a stuck SDK query. This is a genuine resource leak (CWE-400/CWE-772). I downgraded the provisional severity from high to medium because the trigger requires an authenticated admin holding ai.tools.write (a trusted operator) and a configured provider; it is not reachable by unauthenticated/public requests, untrusted plugins, or untrusted imported content, and crosses no privilege boundary. It is still a real availability concern: it is triggered by routine accidental behavior (closing a tab mid-tool-call, a browser crash, a flaky network), accumulates unboundedly over the server's lifetime, and is only recoverable by restart. The 'diagnostic surface only' comment in destroy() (transport.ts:83-89) acknowledges the dangling-pending scenario but only handles it when destroy() actually runs — which is exactly what never happens in this deadlock.","replicationSteps":"Traced end-to-end:\n1. An admin with `ai.tools.write` opens an AI chat (POST /admin/api/ai/chat/site). selectToolsForScope registers browser-execution write tools (chat.ts:145).\n2. The handler builds an AiStreamRequest with `bridge` (from createBridge) and `signal: req.signal`, then awaits runChat (chat.ts:202-227).\n3. The model emits a browser-execution tool call. For Anthropic, the MCP tool callback runs callTool (anthropic.ts:263 -> 304-312), which does `await bridge.callBrowser(name, input)`. callBrowser (transport.ts:71-77) creates a Promise stored in entry.pending and emits a `toolRequest` event. The Promise is settleable ONLY by resolveBridgeToolResult (a matching /admin/api/ai/tool-result POST) or by destroy().\n4. The browser never POSTs the tool-result (tab closed, JS error, network drop). \n5. Nothing settles callBrowser: (a) callBrowser does not register any timeout or signal listener; (b) anthropic.ts buildQueryOptions (205-231) never passes req.signal to the SDK query(), so a client disconnect cannot abort the SDK loop; (c) the browser-execution branch (anthropic.ts:304-312) ignores `signal` entirely; (d) the chat handler's ReadableStream defines only start(), no cancel(), so a client disconnect runs no cleanup.\n6. Therefore driver.stream() never yields/returns, runChat (runner.ts:56) stays blocked in the for-await, runChat never returns, the chat.ts finally (line 238) that calls destroyBridge() never runs. The BridgeEntry stays in activeBridges permanently, the NDJSON ReadableStream controller / HTTP connection stays held, and the Anthropic SDK query() stays blocked. Repeating accumulates leaked bridges/connections unbounded.\n\nNote: the OpenAI driver DOES pass req.signal to runner.run (openai.ts:161), so a disconnect that fires req.signal can throw out of driver.stream() and let the finally run destroyBridge — but the in-flight callBrowser still ignores the signal, so whether the SDK can cancel a tool execute() mid-await is SDK-dependent. The Anthropic path has no such escape and leaks deterministically.","falsePositiveReason":"","refinedFix":"Two coordinated fixes:\n\n1. Make callBrowser settleable independently of the browser POST. In createBridge/callBrowser (transport.ts), accept the request AbortSignal and a timeout, and register both so a pending tool wait is rejected and removed from entry.pending on either:\n   - signal abort (client disconnect): `signal.addEventListener('abort', () => { const p = entry.pending.get(requestId); if (p) { entry.pending.delete(requestId); p.reject(new Error('AI chat stream aborted before tool result arrived.')) } }, { once: true })`\n   - timeout: `const t = setTimeout(() => { const p = entry.pending.get(requestId); if (p) { entry.pending.delete(requestId); p.reject(new Error('Browser tool result timed out.')) } }, BROWSER_TOOL_TIMEOUT_MS)`; clear the timeout and remove the abort listener in resolveBridgeToolResult and in destroy() to avoid leaking timers/listeners. Thread the signal in via AiBrowserBridge.callBrowser already having access to req.signal (pass it through createBridge(emit, signal) since the handler has req.signal in scope at chat.ts:202).\n\n2. Ensure the SDK loop is actually abortable so the for-await unblocks on disconnect. Wire req.signal into the Anthropic SDK call: pass an abortController / signal through Options in buildQueryOptions (anthropic.ts:205-231) using whatever the @anthropic-ai/claude-agent-sdk query() supports for cancellation, mirroring the OpenAI driver's runner.run({ signal: req.signal }) (openai.ts:161). The drivers/types.ts:142 contract already states the driver MUST honour signal — the Anthropic driver currently violates it.\n\n3. Defense in depth: give the chat handler's ReadableStream a cancel() method that calls destroyBridge()/closeStream() so a consumer-side cancel (client disconnect) deterministically tears down the bridge even if signal propagation is racy.\n\nPick a conservative timeout (e.g. 60-120s) so a slow-but-legitimate editor write still completes, but a dead tab is reclaimed."},{"id":"ISS-031","finder":"bug-ai","title":"Anthropic driver drops all conversation history on multi-turn chats — model loses prior context","category":"bug","provisionalSeverity":"medium","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-665","file":"server/ai/drivers/anthropic.ts","lineStart":350,"lineEnd":359,"description":"`serialiseMessagesAsPrompt` sends only the last user message (or, when the last message isn't a user message, the concatenation of just the user-role texts) as the SDK `prompt`. Assistant replies and prior tool results in `req.messages` are discarded. The intended history mechanism is the SDK's `Options.resume` keyed on `session_id`, but `buildQueryOptions` never sets `resume`, and the runner never persists the emitted `session` event back onto the conversation (server/ai/runtime/runner.ts:119 treats `session` as nothing-to-persist; the `session_id` column stored in conversations/store.ts is never read into `Options.resume`). So the resume path is entirely unwired.","impact":"On the second and later turns of any Anthropic conversation the model receives only the newest user prompt with no prior assistant/tool context — it effectively has amnesia, producing incoherent or repeated answers and re-doing work. This is a silent correctness failure of the core agent loop for the default provider, not a visible error.","reproduction":"1. Open an Anthropic chat. 2. Turn 1: \"My name is Alice.\" (works). 3. Turn 2: \"What is my name?\" — the driver passes only \"What is my name?\" with no resume/session and no history, so the model cannot answer from context.","evidence":"function serialiseMessagesAsPrompt(messages: AiMessage[]): string {\n  const last = messages.at(-1)\n  if (!last || last.role !== 'user') {\n    return messages\n      .filter((m): m is Extract\u003cAiMessage, { role: 'user' }> => m.role === 'user')\n      .map((m) => contentBlocksToText(m.content))\n      .join('\\n')\n  }\n  return contentBlocksToText(last.content)\n}","suggestedFix":"Either set `options.resume = conversation.sessionId` (and persist the `session` event from the runner back onto the conversation row so subsequent turns resume), or serialise the full `req.messages` history into the SDK's structured input instead of only the last user message.","assessment":"The report is accurate. I read anthropic.ts (serialiseMessagesAsPrompt 350-359, buildQueryOptions 205-231, runAnthropicStream 121-177), runner.ts (session is unhandled, falls to default:break at 119-121), chat.ts (full history is built and threaded into req.messages but sessionId is never read into the request), drivers/types.ts (AiStreamRequest has no resume/sessionId field), and confirmed store.ts persists/reads session_id but nothing in the chat loop writes the emitted session id. The full multi-turn history is reconstructed by buildMessageHistory and placed on req.messages, but the Anthropic driver collapses it to just the last user message's text, and the alternative resume mechanism is never connected. The function's own docstring admits this: \"Phase 3 will wire the session id end-to-end\" and \"This intentionally only handles the simplest case for v1.\" So it is a known-unfinished area, but the defect is real and concretely triggers on every second-and-later turn. This is a functional correctness bug, not a security issue: it requires a trusted admin (ai.chat capability), crosses no privilege boundary, and causes no data loss or RCE. The downgrade-on-trusted-admin guidance applies, but the bug breaks the core agent loop for the default provider silently, so medium is the right level (not low — it is a default-path correctness failure, not a minor edge case). Note the report scopes it to Anthropic; the same bug also exists in the OpenAI driver, so a complete fix should address both.","replicationSteps":"Traced end-to-end through the chat handler and driver:\n\n1. Admin user with `ai.chat` creates an Anthropic conversation (credentialId + modelId set on the row).\n2. Turn 1: POST /admin/api/ai/chat/site with body { conversationId, prompt: \"My name is Alice.\" }. handleAiChat (server/ai/handlers/chat.ts:149) persists the user message, listMessagesForConversation + buildMessageHistory produces messages = [user \"My name is Alice.\"], and builds AiStreamRequest with that messages array (chat.ts:206). runAnthropicStream calls serialiseMessagesAsPrompt(req.messages) (anthropic.ts:136) -> \"My name is Alice.\" Assistant reply streams; runner persists the assistant text (runner.ts:52). The emitted `session` event hits the runner's `default: break` (runner.ts:119-121) and is NOT persisted.\n3. Turn 2: POST same route, prompt: \"What is my name?\". User message persisted. listMessagesForConversation now returns [user1, assistant1, user2]; buildMessageHistory builds 3 AiMessages and they ARE put on req.messages. BUT serialiseMessagesAsPrompt (anthropic.ts:350-359) returns only contentBlocksToText(last.content) = \"What is my name?\" because last.role === 'user'. buildQueryOptions (anthropic.ts:205-231) never sets Options.resume, and AiStreamRequest (server/ai/drivers/types.ts:76-100) has no sessionId/resume field, so the handler cannot pass conversation.sessionId even though store.ts persists/reads the session_id column. Result: the SDK starts a fresh session containing only \"What is my name?\" with zero prior context — the model cannot answer.\n\nConfirmed the resume path is fully unwired: grep shows session_id is stored (conversations/store.ts) and patchable via the conversations PATCH endpoint, but nothing in the chat stream writes the emitted session id back, the chat handler never reads conversation.sessionId, and AiStreamRequest carries no field for it. The same defect exists in the OpenAI driver (serialiseLastUserMessage, openai.ts:411-426).","falsePositiveReason":"","refinedFix":"Wire conversation history through the SDK. Two viable approaches; the resume approach is cleanest given the SDK is the Claude Agent SDK and session_id plumbing already half-exists:\n\nOption A (preferred — resume): \n1. Add `readonly resumeSessionId?: string | null` to AiStreamRequest (server/ai/drivers/types.ts).\n2. In chat.ts, set `resumeSessionId: conversation.sessionId` when building the request (chat.ts:206).\n3. In buildQueryOptions (anthropic.ts:205), set `options.resume = req.resumeSessionId ?? undefined`.\n4. In runner.ts, handle the `session` event: add a `persister.recordSession(event.sessionId)` call (new persister method) instead of letting it fall through `default:` (runner.ts:119); the persister calls updateConversation(..., { sessionId }) so the next turn resumes. Verify the Agent SDK actually replays history server-side for `resume` (it stores transcripts under cwd/session); if it does not in this deployment model, fall back to Option B.\n\nOption B (structured input — provider-agnostic, no reliance on SDK session storage): change serialiseMessagesAsPrompt to emit the SDK's structured multi-turn input form (an array of user/assistant/tool messages built from req.messages via contentBlocksToText for each, preserving roles and tool_use/tool_result pairing) rather than a single string. Apply the identical fix to the OpenAI driver's serialiseLastUserMessage (openai.ts:411). Option B is more robust because it does not depend on SDK-side transcript persistence and fixes both drivers uniformly.\n\nEither way, also delete the stale \"Phase 3 will wire\" / \"v1 simplest case\" docstrings once history is actually wired. Per repo CLAUDE.md (no half-finished abstractions), prefer Option B if SDK resume semantics are uncertain."},{"id":"ISS-032","finder":"leak-rendercache","title":"Unauthenticated query-string key explosion thrashes the shared Layer B render LRU (cache-eviction + render-amplification DoS)","category":"performance","provisionalSeverity":"medium","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-770: Allocation of Resources Without Limits or Throttling (cache key-space exhaustion / uncontrolled resource consumption; related CWE-405)","file":"server/publish/publicRouter.ts","lineStart":233,"lineEnd":244,"description":"The Layer B render LRU key is `(urlPath, queryString)` where `queryString` is the RAW, unnormalized `url.search` taken verbatim from the visitor request (see `renderPublicResolution` -> `getOrRender({ urlPath: url.pathname, queryString: url.search }, ...)`). The published-page renderer ignores arbitrary query params (only `?loop_\u003cid>_page=` and route-frame bindings are read), so `GET /about?junk=1`, `/about?junk=2`, ... `/about?junk=N` all produce byte-identical HTML but each gets its own distinct cache slot. Because the request has a query string, it also skips the Layer A disk fast-path (`if (uploadsDir && url.search === '')` at line 213), so every distinct junk query forces a full DB lookup + `publishPage` render + `applyPublishedHtmlPipeline` (DOMPurify, plugin filters) and then inserts an entry, evicting the least-recently-used legitimate entry. The cap (`RENDER_CACHE_MAX_ENTRIES`, default 1000, renderCache.ts:48-53) bounds total memory, so this is not unbounded memory growth — but it is an unbounded *key space* over a single global LRU that an unauthenticated client fully controls. The hole endpoint (`server/handlers/cms/hole.ts:296-300`) shares the SAME global `map` and also folds an attacker-controlled value (the `u=` page-URL query) into its key, so flooding either endpoint evicts the other's hot entries. There is no rate limiting on the public render path (rate limiting exists only for `server/forms/`).","impact":"An unauthenticated visitor can defeat Layer B caching entirely with a trivial loop of distinct query strings: after ~1000 junk requests every legitimate cache entry is evicted, and every subsequent real page view re-runs the full DB + render + sanitize + plugin-filter pipeline. On a single-host self-hosted CMS this drives CPU and DB load up and tail latency for genuine visitors, amounting to an easy availability/DoS amplification (one cheap GET per expensive server render). Sustained, it keeps the cache hit rate at ~0% indefinitely.","reproduction":"With a published page at /about, run: `for i in $(seq 1 5000); do curl -s \"http://host/about?x=$i\" >/dev/null; done`. Each request misses Layer A (has a query string), misses Layer B (new key), forces a full render, and evicts a real entry. Observe `getStats()` size pinned at maxEntries with hits≈0 and CPU/DB load tracking request rate. The same works against `/_instatic/hole/\u003cnodeId>?v=\u003ccurrent>&u=/about?x=$i`.","evidence":"const cached = await getOrRender(\n    { urlPath: url.pathname, queryString: url.search },\n    async () => {\n      const rendered = resolution.kind === 'page' ? ... });","suggestedFix":"Normalize/allowlist the query string before it becomes a cache key in `renderPublicResolution`: strip all params except those the renderer actually consumes (the `loop_\u003cid>_page` pagination params), sort them for a stable key (the hole endpoint already does this via `normalizeQuery`), and treat the now-empty query as the Layer A / canonical key. This collapses junk-query requests onto the canonical cached entry instead of minting a fresh slot per request. Optionally also add a per-IP rate limit to the public render path like `server/forms/rateLimit.ts`.","assessment":"The report's code reading is accurate on every cited point. The Layer B cache key is the raw, unnormalized url.search; the published renderer ignores all query params except the loop pagination params; query-string requests deterministically bypass the Layer A disk fast-path; the LRU is a single global map shared with the hole endpoint; and there is no rate limiting on the public render path. An unauthenticated client fully controls the key space and can defeat the cache and force the full DB+render+DOMPurify+plugin-filter pipeline on every request, evicting legitimate hot entries. This is a real, concretely reachable render-amplification / cache-eviction availability issue (CWE-770 / CWE-405). I downgrade from any higher rating because: (a) memory is bounded by the LRU cap, so no unbounded growth; (b) impact is purely availability/performance degradation — no data loss, integrity, RCE, or sandbox-escape; (c) on a self-hosted single-tenant deployment the operator can mitigate at a reverse proxy/CDN. It stays at medium (lower end) rather than being dismissed because it IS reachable by unauthenticated public traffic with one-cheap-GET-to-one-expensive-render amplification and the app ships zero in-process protection. Not a false positive.","replicationSteps":"Verified by reading the code end-to-end:\n\n1. Entry point: unauthenticated GET to any published route reaches `tryServePublicRoute` (server/router.ts:421-424), which calls `renderPublicResolution(runtime.db, url, runtime.uploadsDir)`. No auth, no rate limit on this path (rate limiting exists only in server/forms/rateLimit.ts and server/auth/rateLimit.ts).\n\n2. Layer A skip: publicRouter.ts:213 `if (uploadsDir && url.search === '')`. Any non-empty query string (`/about?x=1`) makes `url.search !== ''`, so the disk fast-path is bypassed -> always proceeds to resolve + render.\n\n3. Resolution: `resolvePublicRoute` returns kind 'page'/'row' for a real published path (publicRouter.ts:224). not-found/redirect would bail, but a valid published route proceeds.\n\n4. Layer B key: publicRouter.ts:234-235 `getOrRender({ urlPath: url.pathname, queryString: url.search }, ...)`. The key is the RAW url.search (renderCache.ts:66 `${urlPath}\\0${queryString}`). Confirmed the renderer only consumes `?loop_\u003cid>_page=` params (loopPrefetch.ts:173); all other params are ignored, so `/about?x=1`, `/about?x=2`... produce byte-identical HTML under distinct keys.\n\n5. Miss path: each new key is a miss (renderCache.ts:142-152), runs the factory = full snapshot render + applyPublishedHtmlPipeline (DOMPurify + plugin filters, publicRouter.ts:237-241), then inserts; at capacity (maxEntries default 1000, renderCache.ts:48-53,179-181) it evicts the least-recently-used key — which is a legitimate hot entry.\n\nConcrete trigger: `for i in $(seq 1 5000); do curl -s \"http://host/about?x=$i\" >/dev/null; done`. Each request misses A and B, forces a full render+sanitize, and evicts a real cache entry. getStats() size pins at maxEntries with near-zero hit rate. The hole endpoint (hole.ts:296-300) shares the same global `map`; it sorts params via normalizeQuery (hole.ts:144-147) but does NOT allowlist them, so junk `u=`/extra params still mint distinct slots and evict the page cache's entries (and vice-versa). Single-flight (renderCache.ts:156-159) only collapses concurrent IDENTICAL keys, so distinct-key floods are unaffected.","falsePositiveReason":"","refinedFix":"Normalize the query string to a canonical, allowlisted form before it becomes part of the Layer B cache key, mirroring what already exists conceptually for holes but going further (allowlist, not just sort).\n\n1. In renderPublicResolution (publicRouter.ts), derive a canonical cache query from url.searchParams that retains ONLY params the renderer actually consumes — i.e. keys matching the `loop_\u003cnodeId>_page` pattern (loopPrefetch.ts:loopPageQueryKey). Drop everything else, then sort and re-serialize for a stable key. Pass that canonical string as `queryString` to getOrRender instead of raw `url.search`.\n\n2. As a direct consequence, when the canonicalized query is empty, treat the request as the canonical URL: it should be eligible for the Layer A disk fast-path. Change the line at publicRouter.ts:213 to test the CANONICAL query being empty rather than `url.search === ''`, so `/about?utm=foo` serves the baked artefact and never mints a render slot. Keep real pagination (`?loop_x_page=2`) on the slow path with its own distinct, but bounded, key.\n\n3. Apply the same allowlist in the hole endpoint (hole.ts:299): replace `normalizeQuery(pageUrl.searchParams)` with an allowlisted-then-sorted serialization so junk `u=`/extra params collapse onto the canonical hole entry too. (normalizeQuery currently only sorts; it should also filter to the loop pagination keys.) Factor the allowlist+sort into one shared helper (e.g. in loopPrefetch or a small query-canonicalization module) used by both publicRouter and hole.\n\n4. Optional defense-in-depth: add a per-IP token-bucket rate limit to the public render slow path (the post-Layer-A miss branch), reusing the pattern in server/forms/rateLimit.ts, so even legitimately-distinct pagination keys cannot be flooded. This is secondary; the allowlist fix removes the unbounded-key-space primitive entirely.\n\nAfter (1)-(3), arbitrary junk query strings collapse onto one canonical cache entry (or the disk artefact), eliminating the attacker-controlled key explosion against the shared LRU."},{"id":"ISS-033","finder":"leak-sandbox","title":"Server-side module-pack QuickJS contexts are never disposed — leaked on every plugin activate/upgrade/restart cycle","category":"memory-leak","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-401: Missing Release of Memory after Effective Lifetime","file":"src/core/plugins/modulePackLoader.ts","lineStart":92,"lineEnd":189,"description":"`createModulePackVm` (server/plugins/modulePackVm.ts) allocates a fresh QuickJS-WASM context per call and exposes a `dispose()` that frees it (`ctx.dispose()`, modulePackVm.ts:304-306). But `dispose()` is NEVER called anywhere in the server. `activateSandboxedPluginModulePack(manifest, pack)` stores only `pack.render`/`pack.preview` closures into the module registry and records module ids in `registeredByPlugin`; it does not retain the `pack` object for later disposal. `deactivatePluginModulePack` and `resetPluginModulePacks` only call `registry.unregister(id)` — they never call `pack.dispose()`. A QuickJS context's underlying emscripten runtime is NOT reclaimed by JS GC; it must be explicitly disposed. So every time `loadPluginModulePack` is invoked, the previously-created context is orphaned with its WASM heap (reserved up to the 64 MB `DEFAULT_MEMORY_LIMIT_BYTES` per VM, plus retained module-definition objects in `globalThis.__modules`) leaked for the lifetime of the host process.","impact":"Unbounded host-process memory growth on a long-running self-hosted server. Each plugin install, upgrade, enable/disable cycle, settings-driven re-activation, manual 'Restart Plugin', crash auto-respawn (`reloadAndActivatePlugin`), and every `bun --watch` re-bind (`activateInstalledServerPlugins` calls `resetPluginModulePacks()` which drops the registry entries but leaks the contexts, then re-creates them) accumulates one orphaned QuickJS context per module-pack plugin. Over the server's uptime this is an ever-growing native-heap leak that can OOM the host. Note: `resetPluginModulePacks()` makes the boot/re-bind path leak too — it tears down registry entries but has no handle on the live VMs to dispose them.","reproduction":"Install a plugin with `entrypoints.modules` + `modules.register` permission, then repeatedly toggle it: deactivate → activate (admin Plugins page), or change a plugin setting that triggers re-activation, or hit 'Restart Plugin'. Each cycle runs `loadPluginModulePack` → `createModulePackVm` (new `wasm.newContext()`) while `deactivatePluginModulePack` only unregisters module ids. Monitor RSS / native heap: it grows by roughly one QuickJS context per cycle and never shrinks. `bun --watch` reloads during development reproduce it on every save via `activateInstalledServerPlugins`.","evidence":"export function deactivatePluginModulePack(pluginId: string): void {\n  const ids = registeredByPlugin.get(pluginId)\n  if (!ids) return\n  for (const id of ids) registry.unregister(id)\n  registeredByPlugin.delete(pluginId)\n}\n...\nexport function resetPluginModulePacks(): void {\n  for (const ids of registeredByPlugin.values()) {\n    for (const id of ids) registry.unregister(id)\n  }\n  registeredByPlugin.clear()\n}\n...\nexport function activateSandboxedPluginModulePack(manifest, pack): void {\n  ...\n  deactivatePluginModulePack(manifest.id)  // does NOT dispose the prior pack's VM\n  ... registry.registerOrReplace(hostModule) ...  // pack never stored for disposal\n}","suggestedFix":"Retain the live `SandboxedModulePack` per plugin id (e.g. a `packsByPlugin = new Map\u003cstring, SandboxedModulePack>()` in modulePackLoader.ts) and call `pack.dispose()` in `deactivatePluginModulePack` (before deleting the entry) and for every pack in `resetPluginModulePacks`. In `activateSandboxedPluginModulePack`, the existing `deactivatePluginModulePack(manifest.id)` call will then dispose the prior VM before the new one replaces it. This makes `ModulePackVm.dispose()` actually reachable on the server.","assessment":"Real memory/resource leak. The QuickJS-WASM context created per module-pack VM is never disposed in any production code path. The codebase's own sibling module (pluginWorker.ts) demonstrates the required pattern (track-by-id + dispose on reload/unload), and the module-pack loader fails to do it. dispose() is reachable only from tests. This is a genuine native-heap leak that accumulates over the host process lifetime on legitimate admin plugin lifecycle operations and on every bun --watch re-bind in development.","replicationSteps":"Confirmed end-to-end by reading the code. createModulePackVm (server/plugins/modulePackVm.ts:249-312) allocates a fresh QuickJS context per call (wasm.newContext(), line 254) and exposes dispose() that calls ctx.dispose() (lines 304-306). The render/preview thunks close over ctx. loadPluginModulePack (server/plugins/runtime.ts:207-216) calls createModulePackVm. activateSandboxedPluginModulePack (src/core/plugins/modulePackLoader.ts:152-189) captures only pack.render/pack.preview into closures registered in the module registry (lines 179-185); it never stores the pack object. deactivatePluginModulePack (lines 92-97) and resetPluginModulePacks (lines 103-108) only call registry.unregister(id) — they have no handle to the VM and never call pack.dispose().\n\nA grep across server/ and src/ confirms ModulePackVm.dispose() is invoked ONLY from *.test.ts files, never in any production lifecycle path. Production callers that create or tear down packs without ever disposing:\n- Boot / bun --watch re-bind: runtime.ts:401 resetPluginModulePacks() (drops registry entries, no VM handle) then runtime.ts:456-457 creates a fresh VM per module-pack plugin. Every dev hot-reload leaks one context per such plugin.\n- Activate/enable: lifecycle.ts:62-63 -> activateSandboxedPluginModulePack -> internal deactivatePluginModulePack (unregister only) before re-register. Prior VM leaked.\n- Deactivate/uninstall: lifecycle.ts:69, 94 deactivatePluginModulePack — unregister only; VM leaked.\n- Upgrade: install.ts:330-331 (new pack), 419 (pre-upgrade teardown), 463/471-472 (rollback) — all leak.\n\nConcrete trigger: install a plugin with entrypoints.modules + modules.register grant, then repeatedly disable->enable it from the admin Plugins page (or Restart Plugin, or change a setting that re-activates). Each cycle runs loadPluginModulePack -> createModulePackVm (new wasm.newContext) while teardown only unregisters ids. The QuickJS emscripten runtime is not reclaimed by JS GC, so the native heap for each orphaned context persists for the host process lifetime. The contrast is explicit in pluginWorker.ts:166-228, which tracks VMs in vmsByPluginId and DOES call vm.dispose() on both reload (line 171) and unload (line 224) — the module-pack loader simply omits the equivalent bookkeeping.\n\nNote on amplification: the public published-page render path (publicRouter.ts) reuses the single long-lived registered VM per module and does NOT create a new context per request, so unauthenticated public traffic does not multiply the leak. Accumulation is driven by admin lifecycle actions and bun --watch reloads.","falsePositiveReason":"","refinedFix":"In src/core/plugins/modulePackLoader.ts, keep a live-pack registry alongside the id set:\n\nconst packsByPlugin = new Map\u003cstring, SandboxedModulePack>()\n\nIn activateSandboxedPluginModulePack, the existing deactivatePluginModulePack(manifest.id) call (line 159) will then dispose the prior VM before the new one replaces it; after building the registrations, store the new pack: packsByPlugin.set(manifest.id, pack).\n\nIn deactivatePluginModulePack, before deleting the entry, dispose the live pack:\n  const pack = packsByPlugin.get(pluginId)\n  if (pack) { try { pack.dispose() } catch (err) { console.error('[plugin:'+pluginId+'] module pack dispose failed', err) } packsByPlugin.delete(pluginId) }\n\nIn resetPluginModulePacks, dispose every live pack before clearing:\n  for (const pack of packsByPlugin.values()) { try { pack.dispose() } catch { /* already disposed */ } }\n  packsByPlugin.clear()\n\nThis makes ModulePackVm.dispose() (modulePackVm.ts:304-306, ctx.dispose()) actually reachable on the server and mirrors the lifecycle discipline already used in pluginWorker.ts (vmsByPluginId + dispose on reload/unload). Note resetPluginModulePacks is in src/core but is invoked server-side (runtime.ts:401) and editor-side (editorPluginLoader.ts:112); the browser editor path uses activatePluginModulePack (no VM), so its packs map stays empty there and dispose() is a no-op — safe. Add a regression test that activates a sandboxed pack, deactivates it, and asserts dispose() was called (extend src/__tests__/plugins/pluginModulePack.test.ts with a stub SandboxedModulePack tracking dispose())."},{"id":"ISS-038","finder":"conc-publish","title":"Publish version stamping races: baked hole shells get rejected as stale under concurrent publishes","category":"concurrency","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization ('Race Condition')","file":"server/repositories/publish.ts","lineStart":304,"lineEnd":362,"description":"The publish version is read with `nextPublishVersion = getPublishVersion() + 1`, used to stamp every baked hole shell's `data-instatic-version`, and the version is only actually advanced by `bumpPublishVersion()` (a ++ at the end). This is a read-modify-write split across many awaits. publishDataRow (server/repositories/data/publish.ts:207,215) and updateDataRowStatus (rows.ts:786) do the same `getPublishVersion()+1` ... `bumpPublishVersion()` dance. If two publishes overlap, both read version N, both stamp shells with N+1, but the two independent `bumpPublishVersion()` calls advance the counter to N+2. The shells baked by both publishes carry version N+1 while the live counter is N+2.","impact":"Every `\u003cinstatic-hole data-instatic-version=N+1>` baked during the race is rejected as stale by the hole endpoint (which compares against getPublishVersion()==N+2), so every dynamic fragment on every affected page fails to hydrate — visitors see empty hole placeholders for request-dependent content (loops, dynamic widgets) until a clean publish re-bakes them with a matching version.","reproduction":"Two overlapping publishes (e.g. publishDraftSite + a publishDataRow from a scheduled tick). Both call getPublishVersion()->N, bake holes stamped N+1, then both call bumpPublishVersion() leaving the counter at N+2. The last-swapped slot's hole shells now carry N+1 != N+2 and are served stale.","evidence":"const nextPublishVersion = getPublishVersion() + 1\n... renderPublishedSnapshot(snapshot, { ..., publishVersion: nextPublishVersion })\n... await swapSlot(uploadsDir, slot)\nbumpPublishVersion()","suggestedFix":"Make version allocation atomic with the bake: either serialize publishes (see the slot-race finding — one mutex fixes both), or change bumpPublishVersion() to return the new version and have the publish reserve the version up front (allocate-then-bake-then-commit) so the stamped version always equals the post-bump live version.","assessment":"The bug is real and replicable. The version-allocation pattern (synchronous read of getPublishVersion()+1, long awaited bake, then a separate non-atomic bumpPublishVersion()) is a textbook split read-modify-write race, and there is genuinely no serialization between publishes on the shared single-threaded event loop. The internal 10s publish scheduler makes the race reachable without any concurrent human action — an admin publish overlapping the scheduler's publishDataRow bake window is plausible. The downstream consequence is correctly described: mis-stamped disk shells serve the stale sentinel forever (no client retry), so dynamic content silently fails to hydrate on affected pages until a clean re-publish.\n\nHowever, severity is overstated as high for a single-tenant CMS. There is no security-boundary crossing: every trigger is either a trusted operator's authenticated publish (requireCapability + step-up) or the in-process scheduler. No unauthenticated/public request, untrusted plugin, or untrusted imported content can initiate the version allocation. There is no data corruption (the DB publish transaction is correct; only on-disk derived artefacts are mis-stamped, and the codebase explicitly treats disk artefacts as rebuildable derived state — comments at publish.ts:285-303 and data/publish.ts:200-202). The damage is a transient, fully self-healing availability/correctness degradation of dynamic fragments on public pages, recoverable by any subsequent clean publish. That places it at medium: a genuine correctness bug worth fixing, but not high/critical absent any privilege escalation, RCE, sandbox escape, or persistent data loss.","replicationSteps":"Confirmed end-to-end. publishVersion is a plain module-level counter in server/publish/renderCache.ts:55. The publish version is allocated via a non-atomic read-modify-write split across awaits:\n\n- publishDraftSite (server/repositories/publish.ts): synchronous read `nextPublishVersion = getPublishVersion() + 1` at line 304, then a LONG async chain (prepareInactiveSlot, per-page renderPublishedSnapshot/applyPublishedHtmlPipeline/writeArtefact loop, swapSlot — all awaited, lines 307-351), then the synchronous `bumpPublishVersion()` (publishVersion++) at line 362.\n- publishDataRow (server/repositories/data/publish.ts): read at line 207, `await writeDataRowArtefact(...)` at 208, `bumpPublishVersion()` at 215.\n\nBun.serve handles requests concurrently and the scheduler runs on the same single JS thread, so two publishes interleave at any await. There is NO mutex/semaphore serializing publishes (confirmed by grep — none exists).\n\nConcrete trigger requiring NO simultaneous human action: the publish scheduler (server/publish/publishScheduler.ts) ticks every 10s and fires publishDataRow for due rows. If an operator clicks Publish (handlers/cms/publish.ts:43 -> publishDraftSite, whose per-page bake loop yields many times) while a scheduled publishDataRow is mid-bake, both read version N and stamp every \u003cinstatic-hole data-instatic-version=N+1> shell (renderNode.ts:201), then both call bumpPublishVersion() independently, leaving the live counter at N+2.\n\nImpact confirmed via the hole endpoint and client runtime: handleHoleRequest (server/handlers/cms/hole.ts:225-234) compares the shell's v=N+1 against getPublishVersion()=N+2, mismatches, and returns the `\u003cinstatic-hole-stale>` sentinel. The client runtime (server/publish/holeRuntime.ts:41) does `el.outerHTML = html`, replacing the placeholder with the empty stale element — NO retry, NO reload. Because the mis-stamped shell is baked to disk (derived state), the broken hole persists across visitor reloads until the next clean publish re-bakes the page with a matching version.\n\nNote: the report's claim that updateDataRowStatus (rows.ts:786) does the same getPublishVersion()+1 ... bumpPublishVersion() dance is inaccurate — it only calls bumpPublishVersion() and bakes no shells, so it cannot mis-stamp; it can only contribute the bump that desyncs a concurrent shell-baking publish.","falsePositiveReason":"","refinedFix":"Make version allocation atomic with the bake by serializing all publish operations through a single in-process async mutex AND reserving the version up front (allocate-then-bake-then-commit), so the stamped version always equals the post-commit live version. Concretely:\n\n1. Change bumpPublishVersion() in server/publish/renderCache.ts to `return ++publishVersion` so the commit returns the value it actually set.\n2. Add a single shared publish mutex (a simple promise-chain lock) and wrap the entire publish body of publishDraftSite, publishDataRow, AND updateDataRowStatus (since its bump also participates in the counter). Because JS is single-threaded, a minimal serializer is: keep a module-level `let publishChain = Promise.resolve()` and run each publish as `publishChain = publishChain.then(() => doPublish())`. This guarantees no two publishes' read/bake/bump windows overlap.\n3. With serialization in place, the read-then-bump within a single publish can no longer interleave, so `getPublishVersion() + 1` reliably equals the value bumpPublishVersion() produces. Optionally tighten further by computing the target version as the return of a pre-bump reservation rather than `+1`.\n\nSerializing also fixes the related slot-swap race (two publishes both calling prepareInactiveSlot/swapSlot can clobber each other's slot) — one mutex addresses both. Add an architecture/integration test that fires two overlapping publishes (one publishDraftSite, one publishDataRow) and asserts every baked shell's data-instatic-version equals the final getPublishVersion()."},{"id":"ISS-041","finder":"conc-data","title":"Page-roster save (PUT /pages) is a read-reconcile-delete with no optimistic concurrency — concurrent editors silently lose pages","category":"data-integrity","provisionalSeverity":"high","severity":"medium","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-362: Concurrent Execution using Shared Resource with Improper Synchronization ('Race Condition') (related: CWE-820 Missing Synchronization)","file":"server/handlers/cms/pages.ts","lineStart":94,"lineEnd":114,"description":"The PUT /pages reconcile loads the current page rows inside the transaction, then upserts every incoming page and soft-deletes any existing row whose id is NOT in the incoming set. The incoming set is the full client-side page roster the editor loaded earlier; there is no version/etag/updated_at precondition. Even on Postgres (where each transaction gets its own connection), the `listDataRows` SELECT takes no row locks and runs at READ COMMITTED, so two editors who both loaded the roster before either saved will each send a set that omits the other's newly-created pages. Whichever commits second soft-deletes the pages the first editor just added, and overwrites shared pages last-writer-wins. saveDataRowDraft (server/repositories/data/rows.ts:432) likewise blind-overwrites cells_json with no `updated_at`/version guard.","impact":"Two admins (or one admin in two tabs) editing the site concurrently silently lose work: pages created by one are soft-deleted by the other's save, and overlapping page-tree edits are clobbered with no conflict detection or warning. For a CMS this is real content/data loss, not a transient error.","reproduction":"Open the editor in two browser tabs (both load the same page roster). In tab A, create page X and save (PUT /pages includes X). In tab B (still holding the pre-X roster), make any edit and save: B's incoming set lacks X, so the reconcile soft-deletes X. X is gone with no error shown to either user.","evidence":"await db.transaction(async (tx) => {\n      const existingRows = await listDataRows(tx, 'pages')\n      const existingById = new Map(existingRows.map((r) => [r.id, r]))\n      const incomingIds = new Set(pages.map((p) => p.id))\n      for (const page of pages) { /* upsert */ }\n      // Soft-delete rows that are no longer in the incoming set\n      for (const [rowId] of existingById) {\n        if (!incomingIds.has(rowId)) {\n          await softDeleteDataRow(tx, rowId, user.id)\n        }\n      }\n    })","suggestedFix":"Add optimistic concurrency: store a monotonically increasing site/page-roster version (or per-row updated_at) and require the client to send the version it loaded; reject the save with 409 Conflict if it no longer matches, forcing a reload/merge. Alternatively scope the reconcile so it cannot delete rows created after the client's load timestamp (compare created_at against a client-supplied baseline), and never soft-delete a row the incoming set never had a chance to see.","assessment":"The report's code-level claims are all accurate and I verified each: (1) the reconcile loads existing rows in-transaction and soft-deletes any id absent from the incoming full roster (pages.ts:94-114); (2) there is no optimistic-concurrency token anywhere — the body schema carries none, the client (cms.ts:36-66) sends the full roster with no precondition, and saveDataRowDraft (rows.ts:432-451) sets updated_at but never checks it; (3) Postgres uses sql.begin at default READ COMMITTED with no row locks on the SELECT, so the read-reconcile-delete is not atomic against a concurrently-committed save. The race is real and the data loss (silent soft-delete of a sibling editor's newly created page, plus last-writer-wins on overlapping edits) genuinely occurs. So isReal=true.\n\nHowever, severity must be re-scored for this product. CLAUDE.md states the product is self-hosted, single-tenant, with admin users as trusted operators. The trigger requires the site.structure.edit capability — a trusted, fully-privileged admin. No privilege boundary is crossed: it is not reachable by unauthenticated/public requests, untrusted plugins, or untrusted imported content. The realistic single-operator self-hosting model makes the two-concurrent-admins case uncommon; the one-admin-two-tabs case is plausible but operator-self-inflicted and requires a precise save interleaving. This is a genuine data-integrity weakness worth fixing, but it is not a public/unauthenticated/sandbox-escape/RCE issue, so the finder's 'high' overstates it. Downgrade to medium.","replicationSteps":"Traced end-to-end. Entry point: an authenticated admin holding the `site.structure.edit` capability calls saveSite() in src/core/persistence/cms.ts (lines 36-66), which issues PUT /admin/api/cms/pages with body `{ pages: Page[] }` — the FULL in-memory roster the editor loaded earlier (loadSite, lines 78-120). No version/etag/precondition header is sent; the body schema (PagesBodySchema = Type.Object({ pages: Type.Array(Type.Unknown()) })) carries no concurrency token.\n\nServer handler server/handlers/cms/pages.ts:60-117 validates capability, validates pages, then runs the reconcile transaction (lines 94-114): it SELECTs existing rows via listDataRows(tx,'pages'), upserts every incoming page, and soft-deletes every existing row whose id is NOT in the incoming set (lines 108-113).\n\nTransaction isolation confirmed: postgres.ts:43-45 uses sql.begin with no isolation override (defaults to READ COMMITTED); the listDataRows SELECT takes no row locks (FOR UPDATE not used). So the read-reconcile-delete is not atomic against a concurrent committed save.\n\nConcrete race: Tab/admin A loads roster {P1}, creates page X, saves -> rows now {P1,X}. Tab/admin B loaded roster {P1} before X existed; B edits P1 and saves with incoming set {P1}. B's transaction SELECTs {P1,X}, finds X not in incomingIds, and soft-deletes X (softDeleteDataRow at line 111). X is gone; no error returned to either user (handler returns { ok: true }). Also confirmed saveDataRowDraft (rows.ts:432-451) overwrites cells_json with no updated_at/version guard — last-writer-wins on overlapping page edits.\n\nReproduction is fully constructible but requires two authenticated admin sessions (or one admin in two tabs) both holding site.structure.edit and a save interleaving.","falsePositiveReason":"","refinedFix":"Add optimistic concurrency to the page roster save. Two concrete options:\n\n1) Roster-level version (simplest, matches the bulk-PUT shape): maintain a monotonically increasing draft-roster version (e.g. a column on the draft site row, or max(updated_at) across pages). loadSite returns it; the client echoes it in the PUT body (extend PagesBodySchema with `expectedVersion`). Inside the transaction, re-read the current version and 409-Conflict if it differs, forcing the client to reload/merge before retrying. This closes both the silent-delete and the last-writer-wins overwrite.\n\n2) Per-row precondition (finer-grained): each Page already maps to a data_row with updated_at. Have the client send the loaded updated_at per page; saveDataRowDraft gains a `where updated_at = $expected` guard and returns null (-> 409) on mismatch. For deletes, never soft-delete a row whose created_at is newer than the client's load baseline (client supplies a baseline timestamp), so a sibling editor's just-created page is never reaped.\n\nEither option should also raise the transaction isolation or take row locks so the read-reconcile-delete is atomic: in Postgres wrap with `set transaction isolation level serializable` (sql.begin supports an options arg) OR `select ... for update` the existing rows before reconciling — but note the dialect-naive repository rule (db-postgres-isms.test.ts) bans Postgres-isms in DbClient-importing files, so prefer the version/etag precondition (ANSI-portable) over SERIALIZABLE/FOR UPDATE. Combine the version check with a single re-read inside the existing transaction. Update src/core/persistence/cms.ts (send/echo the token) and docs/server.md in the same change."},{"id":"ISS-006","finder":"sec-sandbox","title":"Plugins with cms.hooks can emit arbitrary core/system event names (cross-plugin event spoofing)","category":"security","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-345: Insufficient Verification of Data Authenticity","file":"server/plugins/host/handlers/hooks.ts","lineStart":46,"lineEnd":55,"description":"handleHooksEmit forwards the plugin-supplied `event` string verbatim to hookBus.emit(event, payload) with no namespacing or allowlist. The emit arg schema (server/plugins/protocol/schemas/hooks.ts:23) accepts any non-empty string. Core code emits well-known system events (content.entry.created/updated/deleted in server/plugins/host/handlers/content.ts and server/publish/contentEvents.ts, settings.changed, publish.before/after) and other plugins register listeners for them via cms.hooks.on. A plugin holding only cms.hooks can therefore forge these system events with attacker-chosen payloads, including a forged `actor: { kind: 'plugin', pluginId: \u003cvictim> }` field, and fire them into every other plugin's listeners.","impact":"One installed plugin can drive the side effects of other plugins (e.g. an audit-log, mailer, or sync plugin that reacts to content.entry.deleted/settings.changed) using fabricated payloads, misattribute actions to another plugin via the actor field, and trigger workflows that were never supposed to run. Breaks integrity of the hook event stream that plugins are documented to trust.","reproduction":"1. Install plugin A (cms.hooks) and plugin B that does api.cms.hooks.on('content.entry.deleted', handler) to, say, purge a CDN or send a notification. 2. From A's activate(): api.cms.hooks.emit('content.entry.deleted', { tableSlug: 'posts', entryId: '\u003cid>', actor: { kind: 'plugin', pluginId: 'B' } }). 3. B's listener fires on the forged event with A-controlled payload, attributed to B.","evidence":"export async function handleHooksEmit(\n  msg: HookEmitApiCall,\n  entry: HostPluginRecord,\n  _db: DbClient,\n): Promise\u003cvoid> {\n  assertHostPluginPermission(entry, 'cms.hooks')\n  const [{ event, payload }] = msg.args\n  await hookBus.emit(event, payload)\n  replyApiOk(msg.pluginId, msg.correlationId)\n}","suggestedFix":"Restrict cms.hooks.emit to a namespaced, plugin-owned event prefix (e.g. require events to start with `\u003cpluginId>.`) and reject emission of reserved core event names (content.entry.*, settings.changed, publish.*). System events should only be emitted by the host's own code paths, never by plugin-issued emit calls.","assessment":"The reported behavior is factually accurate: handleHooksEmit forwards the plugin-supplied event name to hookBus.emit with no namespacing or reserved-name guard, and hookBus dispatches by event name only, so a plugin holding cms.hooks can fire core/system event names with attacker-chosen payloads into every other plugin's listeners. I confirmed each cited fact directly. However, the security significance is much lower than 'medium' for this product's threat model. (1) No privilege boundary is crossed. cms.hooks is a High-risk permission that the single trusted site owner explicitly grants at install time; emitting events IS the documented capability that permission confers (docs/features/plugin-system.md:251 even shows api.cms.hooks.emit). Plugin A and plugin B are both installed by the SAME operator on a single-tenant, self-hosted instance — there is no inter-plugin tenancy boundary, no untrusted-third-party isolation guarantee being violated. (2) No escalation: a malicious A could already emit arbitrary CUSTOM events; reusing core event names only lets it reach listeners that happen to subscribe to those names. B's listener still executes with B's own permissions and can do nothing it could not otherwise be made to do. (3) The forged actor field is informational only — used by plugins to avoid feedback loops (see contentEvents.ts header comment); no core code makes a trust/auth decision on it, and core never listens to these events at all. (4) This is not reachable by unauthenticated/public requests, untrusted imported content, or RCE/sandbox-escape — it requires an operator to install a malicious plugin AND a victim plugin that reacts to core events. So this is a genuine integrity/robustness weakness in the hook event stream (a plugin can confuse other plugins by impersonating system events), worth hardening, but it is not an exploitable security boundary violation in a single-tenant CMS. Real-but-low.","replicationSteps":"The mechanism is real and traceable end to end. (1) A plugin's QuickJS bootstrap exposes api.cms.hooks.emit (server/plugins/quickjs/bootstrap/api.ts:129-130), which after assertPermission('cms.hooks') issues the RPC target 'cms.hooks.emit' with { event: String(event), payload }. (2) The arg schema HookEmitArgSchema (server/plugins/protocol/schemas/hooks.ts:23-29) accepts event: Type.String({ minLength: 1 }) and payload: Type.Unknown() — any non-empty string, any payload. (3) apiDispatch.ts:71 routes 'cms.hooks.emit' to handleHooksEmit (server/plugins/host/handlers/hooks.ts:46-55), which checks only the cms.hooks permission, then calls hookBus.emit(event, payload) verbatim — no namespace prefix, no reserved-name allowlist. (4) hookBus.emit (src/core/plugins/hookBus.ts) looks up listeners purely by event-name string and invokes each in registration order; it does not check which plugin emitted. (5) Core code emits the same well-known names: content.entry.created/updated/deleted (server/publish/contentEvents.ts, server/plugins/host/handlers/content.ts:226/239/244), settings.changed (server/plugins/host/handlers/settings.ts:31 and server/handlers/cms/plugins/settings.ts:69), publish.before/after (server/publish/publishedHtmlPipeline.ts:42/54). So plugin A (cms.hooks) can fire content.entry.deleted with a fabricated payload including actor:{kind:'plugin',pluginId:'B'} and plugin B's listener registered via handleHooksOn fires on it. CONFIRMED. What it CANNOT do: there are NO host/core-side listeners on the hookBus — only plugin-registered listeners (handleHooksOn -> runHookListenerInWorker). Core only emits, never consumes, these events. So a forged emit cannot drive any host access-control or persistence behavior; it can only feed other plugins' listeners, which still run inside their own sandbox with their own permissions.","falsePositiveReason":"Not a false positive on mechanism — the code path is real and exactly as described. The downgrade rationale: it requires an operator to install a malicious plugin granted the High-risk cms.hooks permission, no privilege boundary is crossed (both plugins are operator-trusted on a single-tenant instance), no host-side consumer makes a security decision on these events (core only emits, never listens), the forged actor is informational, and the malicious plugin gains no capability beyond what cms.hooks already grants. It is a hygiene/integrity hardening item, not an exploitable vulnerability raising effective privilege.","refinedFix":"Harden the hook namespace contract in handleHooksEmit (server/plugins/host/handlers/hooks.ts). Maintain a single source-of-truth set of reserved core channel prefixes/names — content.entry.*, settings.changed, publish.* (and any future host-emitted channels) — colocated with the hookBus or in a small shared constant. In handleHooksEmit, after assertHostPluginPermission, reject any event matching a reserved name/prefix and require plugin-emitted events to be namespaced under the emitting plugin's id (e.g. event must equal or start with `${msg.pluginId}.`). Throw a typed error so the RPC layer surfaces it to the plugin. This keeps system channels host-only (the documented convention `api.cms.hooks.emit('my.plugin.signal', …)` already nudges plugins toward namespacing). Optionally, when delivering events to listeners, the hookBus could stamp a trusted source identifier so listeners can distinguish host-emitted from plugin-emitted events, but the namespace guard alone closes the spoofing path. No migration concerns (pre-release); update docs/features/plugin-system.md hooks section to state that core channels are reserved and plugin emits must be namespaced."},{"id":"ISS-008","finder":"sec-upload","title":"Regex-based SVG upload sanitizer is bypassable (slash-separated event handlers, SMIL href, entity-encoded javascript:)","category":"security","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-79","file":"server/handlers/cms/svgSanitize.ts","lineStart":42,"lineEnd":63,"description":"`sanitizeSvgBytes` is the documented content-security boundary for every SVG written to the media library (\"the sanitised bytes are what hit disk AND what the browser receives\"). It strips dangerous SVG vectors with regexes. Two of those regexes are unsound:\n\n1. `EVENT_HANDLER_RE = /\\son[a-z0-9_-]+\\s*=.../` requires a *whitespace* character before the `on...` attribute name. HTML/SVG parsers also accept `/` as an attribute separator after a tag/attribute, so `\u003csvg/onload=alert(1)>` and `\u003ctext/onload=alert(1)>` pass through untouched. I confirmed this by running the exact regexes from this file against `\u003csvg/onload=alert(document.domain)>` — the output is identical to the input.\n\n2. `JS_URL_ATTR_RE` only matches literal `javascript:` in `href`/`xlink:href`/`src`. It misses (a) SMIL animation that sets a navigable URL, e.g. `\u003canimate attributeName=\"href\" values=\"javascript:alert(1)\"/>` / `\u003cset attributeName=\"href\" to=\"javascript:...\"/>`, and (b) HTML-entity-encoded schemes such as `href=\"&#106;avascript:alert(1)\"`. Both survive sanitization (verified with the file's own regexes).\n\nThe two-pass `stripVectors` only defeats split-tag obfuscation; it does not address any of the above because the surviving constructs are never partially matched in the first place.","impact":"Stored, attacker-controlled SVG bytes that still contain active script vectors can be persisted to `uploads/`. In any consumer that renders these bytes in a *scripted* SVG context (inline `\u003csvg>` injection, `\u003cobject>`/`\u003cembed>`, or future top-level navigation if the `attachment` hardening regresses), the `onload`/SMIL/entity vector executes as stored XSS on the admin/publisher origin. Practical impact is reduced today because `hardenUploadResponse` forces `Content-Disposition: attachment` on `image/svg+xml` (blocking top-level navigation) and the image module embeds SVG via `\u003cimg src>` (a non-scripted context where these handlers do not fire). The sanitizer nonetheless fails to provide the guarantee its own comments assert, leaving the system one rendering-path change (or one missing `attachment` header) away from stored XSS.","reproduction":"1. Authenticate with `media.write`. 2. POST `/admin/api/cms/media` with a multipart `file=` whose bytes start with `\u003csvg/onload=alert(document.domain)>` (passes `detectSvgMime`, which only checks the prefix). 3. `validateUploadedMedia` calls `sanitizeSvgBytes`; the `onload` handler survives because there is no whitespace before `onload`. 4. The unsanitized payload is written to `uploads/\u003cid>-\u003cstem>.svg`. Equivalent payloads: `\u003csvg>\u003canimate attributeName=\"href\" values=\"javascript:alert(1)\"/>\u003c/svg>` and `href=\"&#106;avascript:...\"`. Any scripted-context render of the stored bytes executes the script.","evidence":"const EVENT_HANDLER_RE = /\\son[a-z0-9_-]+\\s*=\\s*(?:\"[^\"]*\"|'[^']*'|[^\\s>]+)/gi\n...\nconst JS_URL_ATTR_RE =\n  /\\s(?:xlink:href|href|src)\\s*=\\s*(?:\"\\s*javascript:[^\"]*\"|'\\s*javascript:[^']*'|javascript:[^\\s>]*)/gi","suggestedFix":"Stop relying on hand-written regexes for SVG security. Either (a) parse the SVG with a real XML/DOM parser and walk the element tree, removing every `on*` attribute regardless of separator, every `\u003cscript>`/`\u003cforeignObject>`/`\u003canimate>`/`\u003cset>` with a navigable attribute, and decoding HTML entities before scheme-matching; or (b) use a maintained SVG sanitizer. As a minimum hardening of the existing approach: change `EVENT_HANDLER_RE` to match `[\\s/]` (and tag-internal) separators before `on`, add `\u003canimate>`/`\u003cset>` with `attributeName` in {href,xlink:href} to the stripped set, and decode numeric/named HTML entities prior to the `javascript:` scheme check (and re-run the passes to a fixed point).","assessment":"The sanitizer's regex defects are genuinely present and I reproduced the three claimed bypasses against the file's own code. The file's header comment over-promises (\"the sanitised bytes are what hit disk AND what the browser receives\" as a content-security guarantee), and sanitizeSvgBytes does not deliver that guarantee for slash-separated handlers, SMIL animation of href, or entity-encoded schemes. That makes the report's *factual* claim about the sanitizer correct, so isReal=true for the defect.\n\nHowever, the reported security impact (stored XSS reachable by an attacker) does not hold for a self-hosted single-tenant CMS in the current code. Three independent factors neutralize it: (1) every /uploads/*.svg is served with Content-Disposition: attachment + X-Content-Type-Options: nosniff because svg is excluded from INERT_UPLOAD_MIMES, so direct navigation downloads rather than renders; (2) the only render consumer of media-library SVG is `\u003cimg src>`, a non-scripted context where onload/SMIL/script do not execute; (3) the only scripted inline-SVG surface (base.svg module) is sanitized by DOMPurify, an entirely separate, sound path, and cannot pull these upload bytes. Additionally, the upload endpoint requires an authenticated operator with media.write — a trusted admin in this single-tenant model — so even a future regression would require both a trusted-user upload and a rendering-context change. The report itself concedes practical impact is reduced today; the honest characterization is a latent defense-in-depth weakness / code-quality bug, not an exploitable stored-XSS vulnerability. Severity downgraded from medium to low: real defect, no triggering path, gated behind trusted access and two protective layers.","replicationSteps":"The regex bypasses are real and I reproduced all three by running sanitizeSvgBytes directly (server/handlers/cms/svgSanitize.ts):\n- IN `\u003csvg/onload=alert(document.domain)>` -> OUT unchanged (EVENT_HANDLER_RE requires leading \\s, not `/`).\n- IN `\u003csvg>\u003canimate attributeName=\"href\" values=\"javascript:alert(1)\"/>\u003c/svg>` -> OUT unchanged (SMIL/no href= attr matched by JS_URL_ATTR_RE).\n- IN `\u003csvg>\u003ca href=\"&#106;avascript:alert(1)\">x\u003c/a>\u003c/svg>` -> OUT unchanged (entity-encoded scheme; no entity decoding before match).\n- Control: `\u003csvg onload=alert(1)>` IS stripped -> `\u003csvg>`.\n\nUpload path: authenticate with media.write, POST /admin/api/cms/media multipart file=`\u003csvg/onload=...>`. detectSvgMime (mediaUpload.ts:147) only checks the `\u003csvg`/`\u003c?xml` prefix, so it passes; validateUploadedMedia (line 249-257) calls sanitizeSvgBytes which leaves the payload intact; the unsanitized bytes are written to uploads/.\n\nBut the IMPACT path (stored XSS) is NOT replicable. The stored SVG is only ever (a) served from /uploads/* where router.ts:373 applies hardenUploadResponse, and since image/svg+xml is NOT in INERT_UPLOAD_MIMES (static.ts:617-624, only jpeg/png/gif/webp/mp4/webm), it gets `Content-Disposition: attachment` + `nosniff` — top-level navigation downloads it rather than executing; and (b) embedded by the image module via `\u003cimg src=\"/uploads/...\">`, a non-scripted SVG context where onload/SMIL/script never fire. The separate inline-SVG scripted path (src/modules/base/svg/index.ts, emits markup verbatim) is sanitized by DOMPurify's SVG profile (sanitizeSvg in src/core/sanitize.ts, FORBID_TAGS script/foreignObject/a + on* attr stripping), NOT by this regex sanitizer, and never sources media-library bytes. So no current code path turns the surviving payload into executed script.","falsePositiveReason":"The defect is real but the security impact is not exploitable on any current path. SVG uploads are served with Content-Disposition: attachment (svg not in INERT_UPLOAD_MIMES) which blocks top-level navigation execution, and are only embedded via `\u003cimg src>` which is a non-scripted SVG context. The scripted inline-SVG module uses DOMPurify, not this regex sanitizer. Reaching execution would require both a trusted media.write operator and a future rendering-context regression. So it is a defense-in-depth/code-quality issue, not a reachable stored XSS.","refinedFix":"Fix the sanitizer regardless, because its job is to be a sound content-level guard the rest of the system can rely on, and the file's comments assert a guarantee it does not currently meet. Per CLAUDE.md, fix at the source:\n\n1. EVENT_HANDLER_RE: match `/` (and start-of-tag-internal) separators before `on`, e.g. change the leading `\\s` to `[\\s/]`: /[\\s/]on[a-z0-9_-]+\\s*=\\s*(?:\"[^\"]*\"|'[^']*'|[^\\s>]+)/gi. Keep running stripVectors to a fixed point (loop until output stops changing) rather than a fixed 2 passes.\n2. Add SMIL/animation vectors: strip `\u003canimate>`, `\u003canimateTransform>`, `\u003canimateMotion>`, and `\u003cset>` elements (or at minimum those whose `attributeName` is href/xlink:href) — they can script navigable attributes.\n3. Decode numeric and named HTML entities before the javascript:-scheme check (and strip control chars/whitespace inside the scheme), then re-run. Also broaden JS_URL_ATTR_RE to catch `data:` text/html and the attributeName=href case.\n\nBetter long-term: since the inline-SVG path already uses DOMPurify successfully (src/core/sanitize.ts sanitizeSvg with the SVG profile) in the browser, and the comment claims happy-dom breaks DOMPurify's SVG profile on the server — re-validate that assumption on the current Bun/happy-dom versions; if DOMPurify now works server-side, replace the hand-written regex sanitizer with sanitizeSvg to converge on a single sound SVG sanitizer instead of two divergent implementations. Either way, soften the over-stated guarantee in the file header to match what the code actually enforces."},{"id":"ISS-014","finder":"bug-pagetree","title":"Multi-select reorder within the same parent lands at the wrong index (off-by-N)","category":"bug","provisionalSeverity":"medium","severity":"low","status":"confirmed","confidence":"high","replicated":true,"cwe":"CWE-193: Off-by-one Error","file":"src/core/page-tree/mutations.ts","lineStart":582,"lineEnd":594,"description":"moveNodes() first detaches EVERY top-level id from its parent (lines 584-589), then splices all of them back in at the caller-supplied newIndex (line 592-593). For a multi-select drag whose members live in the same parent as the drop target, the index the caller computes is only compensated for ONE removal. resolvePageTreeDropTarget()/normalizeIndexAfterRemoval() (src/core/page-tree/dnd.ts lines 119-131) decrements rawIndex by exactly 1 — and only when the single pivot draggedId precedes the drop. It does not account for the other selected siblings (also in the same parent and also preceding the drop) that moveNodes will additionally remove. Each extra removed sibling that precedes the target shifts the post-removal array left by one more slot, so the moved block is inserted N-1 positions too late relative to where the user dropped it.","impact":"Dragging a multi-selection of 2+ siblings to reorder them within the same container drops them at the wrong position (one slot off per extra preceding selected sibling). Visible content-ordering corruption in the editor; the user must manually re-drag to fix. No data loss — it is a same-tree reshuffle — but the published page order is wrong until corrected.","reproduction":"In the editor, select 3 contiguous siblings A,B,C (in that order) plus do NOT select sibling D that sits before them in a parent with children [X, A, B, C, D]. Actually simpler: parent children = [A, B, C, D, E]; multi-select A and B; drag them to drop AFTER D. dnd computes rawIndex against original array and subtracts 1 only for the pivot, but moveNodes removes both A and B, so the post-removal array is [C, D, E] and the block is spliced one slot earlier than intended. Repro shows the [A,B] block landing before E instead of after D.","evidence":"  // Detach each moved id from its current parent (top-down). ...\n  for (const id of topLevel) {\n    const oldParent = getParent(tree, id)\n    if (oldParent) {\n      oldParent.children = oldParent.children.filter((childId) => childId !== id)\n    }\n  }\n\n  // Insert into newParent at newIndex, preserving topLevel order.\n  const clamped = Math.max(0, Math.min(newIndex, newParent.children.length))\n  newParent.children.splice(clamped, 0, ...topLevel)","suggestedFix":"Compute the insertion index inside moveNodes() against the post-removal array rather than trusting a single-pivot-normalized index: after detaching the top-level ids, count how many removed siblings had an original index \u003c the requested target position within newParent and subtract that count. Equivalently, capture the target node's identity (not its numeric index) at the dnd layer and resolve the splice position after all removals. The single-node normalizeIndexAfterRemoval contract must be generalized to the full draggedIds set when the drop parent equals the shared current parent.","assessment":"Real bug, confirmed by reproduction. The dnd layer's normalizeIndexAfterRemoval only compensates the post-removal array shift for the single pivot id, but moveNodes removes ALL top-level selected ids. When 2+ selected siblings share the drop target's parent and precede the insertion point, the post-removal array shrinks by N (not 1), so the spliced block lands N-1 slots too late. The single-node path (moveNode) is unaffected because removal count == 1 == the compensation. The existing test (multiSelect.test.ts:206-217) only moves to a DIFFERENT parent at index 0, so it never exercises the same-parent reorder where the shift compounds. This is a genuine, reachable correctness bug — not a false positive. Severity, however, is overstated. It is editor-only visible ordering corruption, fully reversible by the trusted operator re-dragging, no persistence/data-loss beyond what the operator then saves, and no security boundary crossed (single-tenant, admin-only visual editor). That puts it at low for this product, not medium.","replicationSteps":"Traced end-to-end and reproduced with a unit test against the real exported functions.\n\nEntry points (both reachable via normal admin UI multi-select drag):\n- src/admin/pages/site/canvas/useCanvasReorderDrag.ts:222 resolves draggedIds = resolveDraggedIds(tree, selectedNodeIds) (the full multi-selection), passes them to resolvePageTreeDropTarget, then line 202 calls moveNodes(target.draggedIds, target.parentId, target.index).\n- src/admin/pages/site/panels/DomPanel/DomPanel.tsx:337 does the same.\n\nIndex math (verified):\n1. resolvePageTreeDropTarget (src/core/page-tree/dnd.ts) computes rawIndex from the over-row, then calls normalizeIndexAfterRemoval(tree, draggedId /* pivot only */, parent.id, rawIndex) at line 104.\n2. normalizeIndexAfterRemoval (lines 119-131) subtracts exactly 1, and ONLY for the single pivot draggedId when it precedes the drop. It ignores all other selected siblings in draggedIds.\n3. moveNodes (mutations.ts:582-593) detaches EVERY top-level id (filter loop 584-589), then splices the whole block at the caller index (line 592-593).\n\nConcrete repro (confirmed by running a bun test against the real code):\n- parent.children = [A, B, C, D, E]; multi-select draggedIds = [A, B], pivot draggedId = A; drop AFTER D (overId = D, zone = 'after').\n- overIndex = 3, rawIndex = 4. normalizeIndexAfterRemoval subtracts 1 only for A => target.index = 3.\n- moveNodes([A,B], root, 3): detaching A and B leaves [C, D, E]; splice at 3 => [C, D, E, A, B].\n- User intent was [C, D, A, B, E] (block after D). Test asserted [C,D,A,B,E] and got [C,D,E,A,B] — off by one (off-by-N for N selected siblings preceding the target). Test output: \"resolved target index = 3\", \"result children = [C, D, E, A, B]\".","falsePositiveReason":"","refinedFix":"Unify the index contract so the full removal count is compensated in ONE place. Cleanest: stop pre-compensating in the dnd layer and do all compensation inside moveNodes, with moveNode as the degenerate single-id case.\n\nIn src/core/page-tree/mutations.ts moveNodes, after computing topLevel and BEFORE detaching, count how many top-level ids that currently live in newParent have an original index strictly less than newIndex, then subtract that count from the clamp target:\n\n  const removedBefore = topLevel.reduce((n, id) => {\n    const p = getParent(tree, id)\n    if (p && p.id === newParentId) {\n      const i = p.children.indexOf(id)\n      if (i !== -1 && i \u003c newIndex) return n + 1\n    }\n    return n\n  }, 0)\n  // ...detach loop...\n  const target = newIndex - removedBefore\n  const clamped = Math.max(0, Math.min(target, newParent.children.length))\n  newParent.children.splice(clamped, 0, ...topLevel)\n\nCorrespondingly, change resolvePageTreeDropTarget (src/core/page-tree/dnd.ts) to return the raw (pre-removal) index — i.e. delete normalizeIndexAfterRemoval and the noOp self-drop short-circuit that depends on the normalized single-pivot index, and have moveNode (the single path) perform the same removal-count compensation so both single and multi share one rule. moveNode currently presumably relies on the dnd-normalized index; align it to compensate for its own removal s
